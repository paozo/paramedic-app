<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>救急隊員向け臨床推論サポートアプリ</title>
    
    <!-- スタイルシートとフォント -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        :root {
            --font-size-base: 14px;
            --font-size-sm: 12px;
            --font-size-xs: 11px;
            --font-size-lg: 16px;
            --font-size-xl: 18px;
            --font-size-2xl: 20px;
        }
        html.text-sm {
            --font-size-base: 13px; --font-size-sm: 11px; --font-size-xs: 10px; --font-size-lg: 15px; --font-size-xl: 17px; --font-size-2xl: 19px;
        }
        html.text-lg {
             --font-size-base: 16px; --font-size-sm: 14px; --font-size-xs: 13px; --font-size-lg: 18px; --font-size-xl: 20px; --font-size-2xl: 22px;
        }
        body { font-family: 'Inter', 'Noto Sans JP', sans-serif; -webkit-tap-highlight-color: transparent; font-size: var(--font-size-base); }
        h2 { font-size: var(--font-size-xl); } h3 { font-size: var(--font-size-lg); }
        .text-xs { font-size: var(--font-size-xs); } .text-sm { font-size: var(--font-size-sm); }
        
        ::-webkit-scrollbar { width: 8px; } ::-webkit-scrollbar-track { background: #1f2937; } ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; } ::-webkit-scrollbar-thumb:hover { background: #6b7280; }
        
        .modal, .content-card { transition: all 0.3s ease-in-out; }
        .modal.hidden { opacity: 0; transform: scale(0.95); pointer-events: none; }
        
        .highlight { background-color: yellow; color: #1f2937; padding: 0 2px; border-radius: 2px; }
        .current-highlight { outline: 2px solid #f97316; scroll-margin-top: 150px; }
        
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .item-checkbox, .nav-item-checkbox { transform: scale(1.2); margin-right: 12px; accent-color: #3b82f6; }
        
        .keyword-tag, .content-keyword-tag { cursor: pointer; transition: background-color 0.2s ease, color 0.2s ease; }
        .keyword-tag.active, .content-keyword-tag.active { background-color: yellow; color: #1f2937; font-weight: bold; }
        
        .nav-item { padding-left: 0.75rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: background-color 0.2s ease, color 0.2s ease; }
        .nav-item.active-nav { background-color: #2563eb; color: white; }
        
        #logic-switch-container { position: relative; display: inline-flex; background-color: #374151; border-radius: 9999px; padding: 2px; cursor: pointer; }
        .switch-label { padding: 2px 10px; font-weight: 500; color: #d1d5db; transition: color 0.2s ease-in-out; z-index: 10; }
        .switch-label.active-logic { color: #111827; }
        #switch-bg { position: absolute; top: 2px; bottom: 2px; left: 2px; width: calc(50% - 2px); background-color: #fBBF24; border-radius: 9999px; transition: transform 0.2s ease-in-out; }
        #logic-switch-container[data-mode="AND"] #switch-bg { transform: translateX(100%); }
        
        #filter-favorites-btn.active, #mobile-filter-favorites-btn.active, #keywords-panel-toggle-btn.active { color: #fBBF24; }
        .gender-btn.active, .vitals-btn.active, .pupil-btn.active, .pupil-reflex-btn.active, .jcs-btn.active { background-color: #3b82f6; color: white; }
        .font-size-btn.active { background-color: #2563eb; }

        #stopwatch.running { background-color: #166534; }
        
        .toggle-chevron { transition: transform 0.2s ease-in-out; }
        .toggle-chevron.collapsed { transform: rotate(180deg); }

        select.gcs-select { -webkit-appearance: none; appearance: none; background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%239ca3af' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e"); background-position: right 0.5rem center; background-repeat: no-repeat; background-size: 1.5em 1.5em; padding-right: 2.5rem; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 antialiased text-sm">

    <div id="app" class="flex h-screen overflow-hidden">
        <nav id="jump-nav" class="w-48 bg-gray-800 p-2 overflow-y-auto fixed top-0 left-0 h-full z-40 transform -translate-x-full transition-transform md:relative md:w-28 md:translate-x-0 shadow-lg"></nav>
        <div id="sidebar-backdrop" class="hidden fixed inset-0 bg-black bg-opacity-50 z-30 md:hidden"></div>

        <main class="flex-1 flex flex-col">
            <header class="bg-gray-800/50 backdrop-blur-sm p-2 md:p-3 sticky top-0 z-20 shadow-lg">
                <div class="flex flex-wrap items-center gap-2">
                    <button id="sidebar-toggle-btn" class="p-2 text-white hover:text-blue-400 flex-shrink-0" aria-label="ナビゲーションを開く"><i class="fas fa-bars fa-lg"></i></button>
                    
                    <div class="flex items-center space-x-2 bg-gray-700 p-1 rounded-lg flex-shrink-0">
                        <input type="number" id="age-input" placeholder="年齢" min="0" max="130" class="w-14 bg-gray-600 text-white placeholder-gray-400 text-center rounded-md p-1 focus:outline-none focus:ring-2 focus:ring-blue-500" aria-label="年齢">
                        <button id="dob-btn" class="p-1 text-white hover:text-blue-400" aria-label="生年月日から年齢を計算"><i class="fas fa-calendar-alt"></i></button>
                        <div class="flex">
                           <button class="gender-btn bg-gray-600 hover:bg-gray-500 text-white font-bold py-1 px-2 md:px-3 rounded-l-md" data-gender="male">男</button>
                           <button class="gender-btn bg-gray-600 hover:bg-gray-500 text-white font-bold py-1 px-2 md:px-3 rounded-r-md" data-gender="female">女</button>
                        </div>
                    </div>
                    
                    <input type="text" id="temp-memo" placeholder="一時メモ..." class="flex-grow min-w-[120px] bg-gray-700 text-white placeholder-gray-400 rounded-lg p-2 focus:outline-none focus:ring-2 focus:ring-blue-500" aria-label="一時メモ">

                    <div class="w-24 md:w-48 flex items-center bg-gray-700 rounded-lg relative">
                        <input type="text" id="search-input" placeholder="検索..." class="w-full bg-transparent text-white placeholder-gray-400 rounded-lg py-2 px-4 focus:outline-none" aria-label="鑑別検索">
                        <button id="search-history-btn" class="text-gray-400 hover:text-white px-2" title="検索履歴の表示" aria-label="検索履歴の表示"><i class="fas fa-history"></i></button>
                        <button id="search-clear-btn" class="text-gray-400 hover:text-white pr-2" title="検索文字のクリア" aria-label="検索文字のクリア"><i class="fas fa-times"></i></button>
                        <div id="search-history-dropdown" class="hidden absolute top-full left-0 mt-2 w-full bg-gray-800 border border-gray-700 rounded-lg shadow-xl z-30"></div>
                    </div>

                    <button id="search-exec-btn" class="bg-blue-600 hover:bg-blue-700 text-white p-2 rounded-lg flex-shrink-0 w-10 h-10 flex items-center justify-center" title="検索実行" aria-label="検索実行"><i class="fas fa-search"></i></button>

                    <div id="stopwatch" class="bg-gray-700 text-white font-mono text-lg p-2 rounded-lg cursor-pointer flex-shrink-0" title="クリック: スタート/ストップ | 長押し: リセット">00:00</div>
                    <button id="vitals-btn" class="bg-cyan-600 hover:bg-cyan-700 text-white font-bold py-2 px-3 rounded-lg flex-shrink-0" title="バイタル入力" aria-label="バイタル入力モーダルを開く"><i class="fas fa-wave-square"></i></button>
                    
                    <div class="relative md:hidden">
                         <button id="menu-btn" class="bg-gray-600 hover:bg-gray-500 text-white font-bold p-2 rounded-lg w-10 h-10 flex items-center justify-center" aria-label="メニューを開く"><i class="fas fa-ellipsis-v"></i></button>
                         <div id="mobile-menu" class="hidden absolute right-0 mt-2 w-48 bg-gray-800 rounded-lg shadow-xl z-30">
                             <a href="#" id="mobile-keywords-panel-toggle-btn" class="block px-4 py-2 text-white hover:bg-gray-700"><i class="fas fa-tags w-6"></i> キーワード</a>
                             <a href="#" id="mobile-add-new-btn" class="block px-4 py-2 text-white hover:bg-gray-700"><i class="fas fa-plus w-6"></i> 新規追加</a>
                             <a href="#" id="mobile-filter-favorites-btn" class="block px-4 py-2 text-white hover:bg-gray-700"><i class="fas fa-star w-6"></i> お気に入り</a>
                             <a href="#" id="mobile-random-btn" class="block px-4 py-2 text-white hover:bg-gray-700"><i class="fas fa-dice w-6"></i> ランダム表示</a>
                             <a href="#" id="mobile-settings-btn" class="block px-4 py-2 text-white hover:bg-gray-700"><i class="fas fa-cog w-6"></i> 設定</a>
                         </div>
                    </div>

                    <div class="hidden md:flex items-center space-x-2">
                        <button id="filter-favorites-btn" class="bg-gray-600 hover:bg-gray-500 text-white font-bold py-2 px-3 rounded-lg flex-shrink-0" title="お気に入りフィルター" aria-label="お気に入りフィルター"><i class="fas fa-star"></i></button>
                        <button id="random-btn" class="bg-purple-600 hover:bg-purple-700 text-white font-bold py-2 px-3 rounded-lg flex-shrink-0" title="ランダム表示" aria-label="ランダム表示"><i class="fas fa-dice"></i></button>
                        <button id="add-new-btn" class="bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-3 rounded-lg flex-shrink-0"><i class="fas fa-plus"></i> <span class="hidden lg:inline">新規</span></button>
                        <button id="settings-btn" class="bg-gray-600 hover:bg-gray-500 text-white font-bold py-2 px-3 rounded-lg flex-shrink-0" title="データ管理" aria-label="データ管理"><i class="fas fa-cog"></i></button>
                        <button id="keywords-panel-toggle-btn" class="p-2 text-white hover:text-blue-400 flex-shrink-0" aria-label="キーワードパネルを開く"><i class="fas fa-tags fa-lg"></i></button>
                    </div>
                </div>

                <div id="keywords-container" class="mt-2 hidden">
                    <div id="selected-keywords-area" class="p-2 bg-gray-900/50 rounded-lg border border-gray-700 space-y-2"></div>
                </div>
                
                <div id="vitals-summary-container" class="w-full mt-2 hidden">
                     <div class="flex items-start">
                        <div id="vitals-summary-area" class="flex flex-wrap gap-x-4 gap-y-1 items-center flex-grow text-gray-300 bg-gray-900/50 p-2 rounded-lg border border-gray-700"></div>
                         <button id="toggle-vitals-summary-btn" class="ml-2 text-gray-400 hover:text-white p-2 flex-shrink-0" title="バイタル概要の表示切替" aria-label="バイタル概要の表示切替"><i class="fas fa-chevron-up toggle-chevron"></i></button>
                    </div>
                 </div>
            </header>

            <div id="content-area" class="flex-1 overflow-y-auto p-2 sm:p-4">
                 <div id="loading" class="text-center p-8">
                    <i class="fas fa-spinner fa-spin text-4xl text-blue-500"></i>
                    <p class="mt-4 text-gray-400">データを読み込んでいます...</p>
                </div>
            </div>
            
            <footer class="bg-gray-800 p-2 text-center text-xs text-gray-500">
                UserID: <span id="user-id-display">未ログイン</span>
            </footer>
        </main>

        <aside id="keywords-panel" class="w-64 bg-gray-800 flex flex-col fixed top-0 right-0 h-full z-40 transform translate-x-full transition-transform shadow-lg">
            <div class="p-4 border-b border-gray-700 flex justify-between items-center">
                <h3 class="text-lg font-bold text-white">キーワードフィルター</h3>
                <button id="keywords-panel-close-btn" class="text-gray-400 hover:text-white"><i class="fas fa-times fa-lg"></i></button>
            </div>
            <div id="selected-keywords-area" class="flex-1 p-2 space-y-4 overflow-y-auto"></div>
        </aside>
        <div id="keywords-panel-backdrop" class="hidden fixed inset-0 bg-black bg-opacity-50 z-30"></div>
    </div>

    <!-- Modals -->
    <div id="vitals-modal" class="modal hidden fixed inset-0 bg-black bg-opacity-80 flex items-center justify-center z-50 p-4">...</div>
    <div id="settings-modal" class="modal hidden fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center z-50 p-4">...</div>
    <div id="data-modal" class="modal hidden fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center z-50 p-4">...</div>
    <div id="confirm-modal" class="modal hidden fixed inset-0 bg-black bg-opacity-80 flex items-center justify-center z-50 p-4">...</div>
    <div id="compare-modal" class="modal hidden fixed inset-0 bg-black bg-opacity-80 flex items-center justify-center z-50 p-4">...</div>
    <div id="dob-era-modal" class="modal hidden fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center z-50 p-4">...</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, addDoc, setDoc, deleteDoc, getDocs, writeBatch, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        document.addEventListener('DOMContentLoaded', () => {
            const App = {
                config: {
                    collectionName: 'clinical_cases',
                    maxHistoryItems: 15,
                    storageKeys: {
                        showRandomBtn: `paramedic_app_show_random_button`,
                        fontSize: `paramedic_app_font_size`,
                        vitals: `paramedic_app_vitals`,
                    },
                    stopwatchResetDelay: 700,
                    vitalsClearResetDelay: 700,
                    swipeThreshold: 50,
                    firebaseConfig: null,
                    appId: 'default-app-id',
                    gcsOptions: {
                        E: [ {v:4,t:"4:自発的に"}, {v:3,t:"3:呼びかけで"}, {v:2,t:"2:痛み刺激で"}, {v:1,t:"1:開眼せず"} ],
                        V: [ {v:5,t:"5:見当識良好"}, {v:4,t:"4:混乱した会話"}, {v:3,t:"3:不適切な発語"}, {v:2,t:"2:理解不能な音声"}, {v:1,t:"1:発語せず"} ],
                        M: [ {v:6,t:"6:命令に従う"}, {v:5,t:"5:痛み刺激に手で払う"}, {v:4,t:"4:痛み刺激で逃避"}, {v:3,t:"3:異常屈曲"}, {v:2,t:"2:異常伸展"}, {v:1,t:"1:全く動かず"} ],
                    },
                    jcsOptions: ["清明", "1", "2", "3", "10", "20", "30", "100", "200", "300"],
                    appearanceOptions: ["起坐呼吸", "喘鳴", "顔面蒼白", "頸静脈怒張", "冷や汗"],
                    pupilSizeOptions: [1, 1.5, 2, 2.5, 3, 3.5, 4, 4.5, 5, 5.5, 6],
                    pupilReflexOptions: ["迅速(+)", "鈍", "なし(-)"],
                },
                state: {
                    db: null, auth: null, userId: null, dataStore: [], originalDataOrder: [], isLoading: true,
                    intersectionObserver: null,
                    filters: { searchTerm: '', activeKeywords: new Set(), keywordMode: 'OR', isFavoritesOnly: false },
                    ui: { selectedItems: new Set(), highlightedElements: [], currentHighlightIndex: -1 },
                    stopwatch: { interval: null, isRunning: false, elapsedSeconds: 0, pressTimer: null },
                    vitals: {},
                    sidebar: { touchStartX: 0, touchCurrentX: 0, isDragging: false },
                },
                init() {
                    this.cacheDomElements();
                    this.utils.initFirebaseConfig();
                    this.services.auth.init();
                    this.bindEventListeners();
                    Object.values(this.components).forEach(component => component.init?.());
                },
                cacheDomElements() {
                    const D = document;
                    this.elements = {
                        html: D.documentElement, body: D.body, app: D.getElementById('app'),
                        contentArea: D.getElementById('content-area'),
                        jumpNav: D.getElementById('jump-nav'),
                        loading: D.getElementById('loading'),
                        userIdDisplay: D.getElementById('user-id-display'),
                        sidebarToggleBtn: D.getElementById('sidebar-toggle-btn'),
                        sidebarBackdrop: D.getElementById('sidebar-backdrop'),
                        keywordsPanel: D.getElementById('keywords-panel'),
                        keywordsPanelToggleBtn: D.getElementById('keywords-panel-toggle-btn'),
                        keywordsPanelCloseBtn: D.getElementById('keywords-panel-close-btn'),
                        keywordsPanelBackdrop: D.getElementById('keywords-panel-backdrop'),
                        
                        stopwatch: D.getElementById('stopwatch'),
                        ageInput: D.getElementById('age-input'),
                        dobBtn: D.getElementById('dob-btn'),
                        genderBtns: D.querySelectorAll('.gender-btn'),
                        vitalsBtn: D.getElementById('vitals-btn'),
                        tempMemo: D.getElementById('temp-memo'),

                        searchInput: D.getElementById('search-input'),
                        searchExecBtn: D.getElementById('search-exec-btn'),
                        searchClearBtn: D.getElementById('search-clear-btn'),
                        searchHistoryBtn: D.getElementById('search-history-btn'),
                        searchHistoryDropdown: D.getElementById('search-history-dropdown'),
                        searchCount: D.getElementById('search-count'),
                        searchPrevBtn: D.getElementById('search-prev-btn'),
                        searchNextBtn: D.getElementById('search-next-btn'),

                        filterFavoritesBtn: D.getElementById('filter-favorites-btn'),
                        randomBtn: D.getElementById('random-btn'),
                        addNewBtn: D.getElementById('add-new-btn'),
                        settingsBtn: D.getElementById('settings-btn'),
                        
                        menuBtn: D.getElementById('menu-btn'),
                        mobileMenu: D.getElementById('mobile-menu'),
                        mobileKeywordsPanelToggleBtn: D.getElementById('mobile-keywords-panel-toggle-btn'),
                        mobileAddNewBtn: D.getElementById('mobile-add-new-btn'),
                        mobileFilterFavoritesBtn: D.getElementById('mobile-filter-favorites-btn'),
                        mobileRandomBtn: D.getElementById('mobile-random-btn'),
                        mobileSettingsBtn: D.getElementById('mobile-settings-btn'),

                        selectedKeywordsArea: D.getElementById('selected-keywords-area'),
                        vitalsSummaryContainer: D.getElementById('vitals-summary-container'),
                        vitalsSummaryArea: D.getElementById('vitals-summary-area'),
                        toggleVitalsSummaryBtn: D.getElementById('toggle-vitals-summary-btn'),
                        
                        vitalsModal: D.getElementById('vitals-modal'),
                        vitalsModalCloseBtn: D.getElementById('vitals-modal-close-btn'),
                        vitalsSaveBtn: D.getElementById('vitals-save-btn'),
                        vitalsClearBtn: D.getElementById('vitals-clear-btn'),
                        vitalsForm: D.getElementById('vitals-form'),
                        vitalsAppearance: D.getElementById('vitals-appearance'),
                        gcsTotalEl: D.getElementById('gcs-total'),
                        gcsESelect: D.getElementById('gcs-e-select'),
                        gcsVSelect: D.getElementById('gcs-v-select'),
                        gcsMSelect: D.getElementById('gcs-m-select'),
                        pupilR: D.getElementById('pupil-r'),
                        pupilL: D.getElementById('pupil-l'),
                        pupilSizeGroupR: D.getElementById('pupil-size-group-r'),
                        pupilReflexGroupR: D.getElementById('pupil-reflex-group-r'),
                        pupilSizeGroupL: D.getElementById('pupil-size-group-l'),
                        pupilReflexGroupL: D.getElementById('pupil-reflex-group-l'),
                        vitalsAppearanceTags: D.getElementById('vitals-appearance-tags'),
                        vitalsJcsGroup: D.getElementById('vitals-jcs-group'),
                        
                        settingsModal: D.getElementById('settings-modal'),
                        settingsModalCloseBtn: D.getElementById('settings-modal-close-btn'),
                        exportDataBtn: D.getElementById('export-data-btn'),
                        importDataBtn: D.getElementById('import-data-btn'),
                        importFileInput: D.getElementById('import-file-input'),
                        showRandomBtnToggle: D.getElementById('show-random-btn-toggle'),
                        fontSizeControls: D.getElementById('font-size-controls'),

                        confirmModal: D.getElementById('confirm-modal'),
                        confirmTitle: D.getElementById('confirm-title'),
                        confirmMessage: D.getElementById('confirm-message'),
                        confirmButtons: D.getElementById('confirm-buttons'),
                        alertIcon: D.getElementById('alert-icon'),
                        
                        dataModal: D.getElementById('data-modal'),
                        dobEraModal: D.getElementById('dob-era-modal'),
                    };
                },
                bindEventListeners() {
                    const { elements: el, handlers: h } = this;
                    
                    el.searchExecBtn.addEventListener('click', () => h.handleSearch());
                    el.searchInput.addEventListener('keypress', e => { if (e.key === 'Enter') h.handleSearch(); });
                    el.searchClearBtn.addEventListener('click', () => h.handleSearchClear());
                    el.searchNextBtn.addEventListener('click', () => this.renderer.search.navigateToHighlight(1));
                    el.searchPrevBtn.addEventListener('click', () => this.renderer.search.navigateToHighlight(-1));
                    
                    el.contentArea.addEventListener('click', e => h.handleContentAreaClick(e));
                    el.contentArea.addEventListener('change', e => h.handleCheckboxChange(e));
                    el.jumpNav.addEventListener('change', e => h.handleCheckboxChange(e));

                    el.filterFavoritesBtn.addEventListener('click', () => h.handleToggleFavoritesFilter());
                    el.randomBtn.addEventListener('click', () => h.handleRandomSelect());
                    
                    el.menuBtn.addEventListener('click', e => { e.stopPropagation(); el.mobileMenu.classList.toggle('hidden'); });
                    
                    document.addEventListener('click', e => {
                        if (el.searchHistoryBtn && !el.searchHistoryBtn.parentElement.contains(e.target)) this.utils.hide(el.searchHistoryDropdown);
                        if (el.menuBtn && !el.menuBtn.contains(e.target) && !el.mobileMenu.contains(e.target)) this.utils.hide(el.mobileMenu);
                    });
                    
                    Object.values(this.components).forEach(component => component.bindEventListeners?.());
                },
                handlers: {
                    handleSearch() {
                        App.state.filters.activeKeywords.clear();
                        const searchTerm = App.elements.searchInput.value.trim();
                        App.state.filters.searchTerm = searchTerm;
                        App.components.searchHistory.save(searchTerm);
                        App.renderer.renderAll();
                    },
                    handleSearchClear() {
                        App.elements.searchInput.value = '';
                        this.handleSearch();
                    },
                    handleToggleFavoritesFilter() {
                        App.state.filters.isFavoritesOnly = !App.state.filters.isFavoritesOnly;
                        App.elements.filterFavoritesBtn.classList.toggle('active', App.state.filters.isFavoritesOnly);
                        App.elements.mobileFilterFavoritesBtn.classList.toggle('active', App.state.filters.isFavoritesOnly);
                        App.renderer.renderAll();
                    },
                    handleToggleVisibility(area, button, isCollapsed = false) {
                        const isHidden = area.classList.toggle('hidden');
                        const chevron = button.querySelector('.toggle-chevron');
                        if (isCollapsed) {
                            chevron.classList.toggle('collapsed');
                        } else {
                           chevron.classList.toggle('fa-chevron-down', isHidden);
                           chevron.classList.toggle('fa-chevron-up', !isHidden);
                        }
                    },
                    handleRandomSelect() {
                        const allComplaintCards = App.elements.contentArea.querySelectorAll('.content-card');
                        if (allComplaintCards.length > 0) {
                            const randomIndex = Math.floor(Math.random() * allComplaintCards.length);
                            allComplaintCards[randomIndex].scrollIntoView({ behavior: 'smooth', block: 'center' });
                        }
                    },
                    handleContentAreaClick(event) {
                        const { target } = event;
                        const actions = {
                            'edit-btn': el => App.components.dataModal.openForEdit(el.dataset.id),
                            'favorite-btn': el => App.services.db.toggleFavorite('complaint', el.dataset.id),
                            'favorite-disease-btn': el => App.services.db.toggleFavorite('disease', el.dataset.complaintId, el.dataset.diseaseName),
                            'content-keyword-tag': el => this.handleKeywordTagClick(el.textContent),
                        };
                        for (const className in actions) {
                            const el = target.closest(`.${className}`);
                            if (el) {
                                actions[className](el);
                                return;
                            }
                        }
                    },
                    handleKeywordTagClick(keyword) {
                        const { activeKeywords } = App.state.filters;
                        if (activeKeywords.has(keyword)) activeKeywords.delete(keyword);
                        else activeKeywords.add(keyword);
                        App.state.filters.searchTerm = '';
                        App.elements.searchInput.value = '';
                        App.renderer.renderAll();
                    },
                    handleCheckboxChange(event) {
                        const checkbox = event.target;
                        if (!checkbox.classList.contains('item-checkbox') && !checkbox.classList.contains('nav-item-checkbox')) return;
                        
                        const { type, id, name } = checkbox.dataset;
                        const uniqueId = type === 'complaint' ? `c_${id}` : `d_${id}_${name.replace(/\s/g, '_')}`;
                        
                        if (checkbox.checked) {
                            App.state.ui.selectedItems.add(uniqueId);
                        } else {
                            App.state.ui.selectedItems.delete(uniqueId);
                        }
                        
                        const mainCheckbox = App.elements.contentArea.querySelector(`.item-checkbox[data-id='${id}']${name ? `[data-name='${name}']` : ''}`);
                        const navCheckbox = App.elements.jumpNav.querySelector(`.nav-item-checkbox[data-id='${id}']`);

                        if (mainCheckbox && mainCheckbox.checked !== checkbox.checked) mainCheckbox.checked = checkbox.checked;
                        if (navCheckbox && navCheckbox.checked !== checkbox.checked) navCheckbox.checked = checkbox.checked;
                        
                        App.renderer.renderSelectedKeywords();
                    },
                },
                services: {
                    auth: {
                        init() {
                            try {
                                const app = initializeApp(App.config.firebaseConfig);
                                App.state.db = getFirestore(app);
                                App.state.auth = getAuth(app);
                                this.listen();
                            } catch (error) {
                                console.error("Firebase Initialization Failed:", error);
                                App.elements.loading.innerHTML = `<p class="text-red-500 p-8">アプリケーションの初期化に失敗しました。</p>`;
                            }
                        },
                        listen() {
                            onAuthStateChanged(App.state.auth, async (user) => {
                                if (user) {
                                    App.state.userId = user.uid;
                                    App.elements.userIdDisplay.textContent = user.uid;
                                    App.services.db.listenForChanges();
                                } else {
                                    App.elements.userIdDisplay.textContent = "匿名ログイン中...";
                                    await this.signIn();
                                }
                            });
                        },
                        async signIn() {
                             try {
                                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                                    await signInWithCustomToken(App.state.auth, __initial_auth_token);
                                } else {
                                    await signInAnonymously(App.state.auth);
                                }
                            } catch (error) {
                                console.error("Authentication failed:", error);
                                if (App.elements.loading) App.elements.loading.innerHTML = '<p class="text-red-500">Authentication Failed.</p>';
                            }
                        }
                    },
                    db: {
                        getCollectionRef() {
                            const { db, userId } = App.state;
                            const { appId, collectionName } = App.config;
                            return collection(db, 'artifacts', appId, 'users', userId, collectionName);
                        },
                        listenForChanges() {
                            onSnapshot(this.getCollectionRef(), (snapshot) => {
                                App.utils.hide(App.elements.loading);
                                App.state.isLoading = false;
                                
                                App.state.originalDataOrder = snapshot.docs.map(doc => doc.id);
                                App.state.dataStore = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                
                                if (snapshot.empty && App.state.dataStore.length === 0) { 
                                    this.seedInitialData(); 
                                    return; 
                                }
                                
                                App.renderer.renderAll();
                            }, (error) => {
                                console.error("Error fetching data:", error);
                                if (App.elements.loading) App.elements.loading.innerHTML = '<p class="text-red-500">データの取得に失敗しました。</p>';
                            });
                        },
                        async seedInitialData() {
                            const initialData = [ { chiefComplaint: "気分不良", diseases: [ { name: "脳血管障害", keywords: ["突然の片麻痺", "顔面神経麻痺", "言語障害", "意識障害"], pitfalls: ["TIAの見過ごし"] }, { name: "急性冠症候群", keywords: ["胸痛", "放散痛", "冷や汗"], pitfalls: ["非典型的な胸痛"] } ] }, { chiefComplaint: "呼吸困難", diseases: [ { name: "心不全", keywords: ["起坐呼吸", "下腿浮腫"], pitfalls: ["喘息との鑑別困難"] } ] }];
                            try {
                                const batch = writeBatch(App.state.db);
                                initialData.forEach(item => {
                                    const docRef = doc(this.getCollectionRef());
                                    batch.set(docRef, item);
                                });
                                await batch.commit();
                            } catch (error) { console.error("Error seeding data:", error); }
                        },
                        async toggleFavorite(type, id, diseaseName = null) {
                            const entryIndex = App.state.dataStore.findIndex(e => e.id === id);
                            if (entryIndex === -1) return;
                            
                            const entry = App.state.dataStore[entryIndex];
                            let newFavoriteStatus;
                            let docRef = doc(this.getCollectionRef(), id);
                            let updatePayload = {};

                            if(type === 'complaint') {
                                newFavoriteStatus = !entry.isFavorite;
                                entry.isFavorite = newFavoriteStatus;
                                updatePayload = { isFavorite: newFavoriteStatus };
                            } else {
                                const diseaseIndex = entry.diseases.findIndex(d => d.name === diseaseName);
                                if(diseaseIndex === -1) return;
                                newFavoriteStatus = !entry.diseases[diseaseIndex].isFavorite;
                                entry.diseases[diseaseIndex].isFavorite = newFavoriteStatus;
                                updatePayload = { diseases: entry.diseases };
                            }

                            App.renderer.renderAll();
                
                            try {
                                await updateDoc(docRef, updatePayload);
                            } catch (error) {
                                console.error("Error updating favorite status:", error);
                                if(type === 'complaint') entry.isFavorite = !newFavoriteStatus;
                                else entry.diseases.find(d => d.name === diseaseName).isFavorite = !newFavoriteStatus;
                                App.renderer.renderAll();
                                App.utils.customAlert("お気に入り状態の更新に失敗しました。");
                            }
                        },
                    }
                },
                renderer: {
                    renderAll() {
                        this.search.unhighlight();
                        const dataToRender = this.filterAndSortData();
                        this.renderContent(dataToRender);
                        this.renderNav(dataToRender);
                        this.renderSelectedKeywords();
                        this.renderVitalsSummary();
                        this.search.updateNav();
                        this.search.applyHighlights();
                        this.setupIntersectionObserver();
                    },
                    filterAndSortData() {
                        const { dataStore, filters } = App.state;
                        let processedData = [...dataStore];

                        if (filters.isFavoritesOnly) {
                             processedData = processedData.map(entry => {
                                const favoriteDiseases = (entry.diseases || []).filter(d => d.isFavorite);
                                if (entry.isFavorite) return entry;
                                if (favoriteDiseases.length > 0) return { ...entry, diseases: favoriteDiseases };
                                return null;
                            }).filter(Boolean);
                        }
                        
                        if (filters.activeKeywords.size > 0) {
                            const activeKeywords = Array.from(filters.activeKeywords);
                             processedData = processedData.map(entry => {
                                const matchingDiseases = (entry.diseases || []).filter(d => {
                                    const keywords = d.keywords || [];
                                    if (filters.keywordMode === 'OR') {
                                        return activeKeywords.some(filter => keywords.includes(filter));
                                    } else {
                                        return activeKeywords.every(filter => keywords.includes(filter));
                                    }
                                });
                                if (matchingDiseases.length > 0) return { ...entry, diseases: matchingDiseases };
                                return null;
                            }).filter(Boolean);
                        } else if (filters.searchTerm) {
                            const regex = new RegExp(filters.searchTerm.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'i');
                            processedData = processedData.filter(entry => 
                                regex.test(entry.chiefComplaint) || 
                                (entry.diseases || []).some(d => regex.test(d.name) || (d.keywords && d.keywords.some(k => regex.test(k))) || (d.pitfalls && d.pitfalls.some(p => regex.test(p))))
                            );
                        }

                        processedData.sort((a, b) => {
                            if (a.isFavorite && !b.isFavorite) return -1;
                            if (!a.isFavorite && b.isFavorite) return 1;
                            const indexA = App.state.originalDataOrder.indexOf(a.id);
                            const indexB = App.state.originalDataOrder.indexOf(b.id);
                            return indexA - indexB;
                        });
                        
                        return processedData;
                    },
                    renderNav(data) {
                        const { jumpNav } = App.elements;
                        jumpNav.innerHTML = '';
                        data.forEach(entry => {
                            const complaintId = `complaint-${entry.id}`;
                            const originalIndex = App.state.originalDataOrder.indexOf(entry.id);
                            const navItem = document.createElement('a');
                            navItem.href = `#${complaintId}`;
                            navItem.className = 'nav-item block text-gray-300 hover:bg-blue-600 hover:text-white font-bold py-3 px-2 rounded-lg transition-colors flex items-center';
                            const starIcon = entry.isFavorite ? `<i class="fas fa-star text-yellow-400 mr-2"></i>` : '';
                            navItem.innerHTML = `<input type="checkbox" class="nav-item-checkbox" data-type="complaint" data-id="${entry.id}"> ${starIcon}${(originalIndex + 1).toString().padStart(2, '0')}. ${entry.chiefComplaint}`;
                            navItem.title = entry.chiefComplaint;
                            navItem.querySelector('.nav-item-checkbox').addEventListener('click', e => e.stopPropagation());
                            navItem.onclick = (e) => { 
                                e.preventDefault(); 
                                document.getElementById(complaintId)?.scrollIntoView({ behavior: 'smooth' }); 
                                App.components.sidebar.toggle(false);
                            };
                            jumpNav.appendChild(navItem);
                        });
                    },
                    renderContent(data) {
                        const { contentArea } = App.elements;
                        contentArea.innerHTML = '';
                        if (data.length === 0) {
                            contentArea.innerHTML = `<div class="text-center p-8 text-gray-400"><i class="fas fa-search-minus fa-3x mb-4"></i><p>該当するデータが見つかりませんでした。</p></div>`;
                            return;
                        }
                        
                        const fragment = document.createDocumentFragment();
                        data.forEach(entry => {
                            const originalIndex = App.state.originalDataOrder.indexOf(entry.id);
                            const complaintId = `complaint-${entry.id}`;
                            const isComplaintChecked = App.state.ui.selectedItems.has(`c_${entry.id}`);
                            const entryDiv = document.createElement('div');
                            entryDiv.className = 'content-card mb-6 bg-gray-800 rounded-xl shadow-md p-5';
                            entryDiv.id = complaintId;
                            
                            const memoHTML = entry.memo ? `<div class="mt-4 pl-6 text-sm text-amber-300 bg-gray-900/50 p-3 rounded-lg border-l-4 border-amber-400"><div class="font-bold mb-1 flex items-center"><i class="fas fa-pencil-alt mr-2"></i>主訴メモ</div><div>${entry.memo.replace(/\n/g, '<br>')}</div></div>` : '';
                            const favoriteClass = entry.isFavorite ? 'fas text-yellow-400' : 'far text-gray-500';
            
                            const diseasesHTML = (entry.diseases || []).map(disease => { 
                                const isDiseaseChecked = App.state.ui.selectedItems.has(`d_${entry.id}_${disease.name.replace(/\s/g, '_')}`);
                                const diseaseFavoriteClass = disease.isFavorite ? 'fas text-yellow-400' : 'far text-gray-500';
                                const diseaseMemoHTML = disease.memo ? `<div class="mt-3 text-sm text-amber-300 bg-gray-900/50 p-2 rounded-lg"><div class="font-bold mb-1 flex items-center"><i class="fas fa-pencil-alt mr-2"></i>疾患メモ</div><div>${disease.memo.replace(/\n/g, '<br>')}</div></div>` : '';
                                return `
                                    <div class="pl-4 border-l-4 border-gray-700">
                                        <div class="flex items-center justify-between">
                                            <div class="flex items-center">
                                                <input type="checkbox" class="item-checkbox" data-type="disease" data-id="${entry.id}" data-name="${disease.name}" ${isDiseaseChecked ? 'checked' : ''}>
                                                <h3 class="text-lg font-semibold text-teal-400">${disease.name}</h3>
                                            </div>
                                            <button class="favorite-disease-btn text-lg" data-complaint-id="${entry.id}" data-disease-name="${disease.name}" title="お気に入り登録"><i class="${diseaseFavoriteClass} fa-star"></i></button>
                                        </div>
                                        <div class="mt-2 pl-8">
                                            <p class="text-sm text-gray-400 mt-1">${disease.description || ''}</p>
                                            ${diseaseMemoHTML}
                                            <h4 class="font-bold text-sm text-gray-300 mt-3"><i class="fas fa-lightbulb text-yellow-400 mr-2"></i>キーワード</h4><div class="flex flex-wrap gap-2 mt-1">${(disease.keywords || []).map(k => `<span class="content-keyword-tag bg-gray-700 text-sm text-gray-200 rounded-full px-3 py-1 hover:bg-gray-500 ${App.state.filters.activeKeywords.has(k) ? 'active' : ''}">${k}</span>`).join('')}</div>
                                            <h4 class="font-bold text-sm text-gray-300 mt-3"><i class="fas fa-exclamation-triangle text-red-400 mr-2"></i>落とし穴</h4><ul class="list-disc list-inside mt-1 text-sm text-gray-300 space-y-1">${(disease.pitfalls || []).map(p => `<li>${p}</li>`).join('')}</ul>
                                        </div>
                                    </div>`;
                            }).join('');

                            entryDiv.innerHTML = `
                                <div class="flex justify-between items-center">
                                    <div class="flex items-center">
                                        <input type="checkbox" class="item-checkbox" data-type="complaint" data-id="${entry.id}" ${isComplaintChecked ? 'checked' : ''}>
                                        <h2 class="text-xl md:text-2xl font-bold text-blue-400">${(originalIndex + 1).toString().padStart(2, '0')}. ${entry.chiefComplaint}</h2>
                                    </div>
                                    <div class="flex items-center">
                                        <button class="favorite-btn text-xl mr-4" data-id="${entry.id}" title="お気に入り登録"><i class="${favoriteClass} fa-star"></i></button>
                                        <button class="edit-btn text-gray-400 hover:text-white" data-id="${entry.id}"><i class="fas fa-edit"></i></button>
                                    </div>
                                </div>
                                <p class="text-sm text-gray-400 mt-1 ml-10">${entry.description || ''}</p>
                                ${memoHTML}
                                <div class="mt-4 space-y-4 pl-6">${diseasesHTML}</div>`;
                            fragment.appendChild(entryDiv);
                        });
                        contentArea.appendChild(fragment);
                    },
                    renderSelectedKeywords() {
                        const { selectedKeywordsArea, keywordsContainer } = App.elements;
                        selectedKeywordsArea.innerHTML = '';
                        
                        const allAvailableKeywords = new Set();
                        if (App.state.ui.selectedItems.size === 0) {
                            App.state.dataStore.forEach(entry => (entry.diseases || []).forEach(d => (d.keywords || []).forEach(k => allAvailableKeywords.add(k))));
                        } else {
                            App.state.ui.selectedItems.forEach(itemId => {
                                const parts = itemId.split('_'); const type = parts[0]; const entryId = parts[1];
                                const entry = App.state.dataStore.find(e => e.id === entryId); if (!entry) return;
                                if (type === 'c') { (entry.diseases || []).forEach(d => (d.keywords || []).forEach(k => allAvailableKeywords.add(k))); } 
                                else if (type === 'd') { const diseaseName = parts.slice(2).join(' ').replace(/_/g, ' '); const disease = (entry.diseases || []).find(d => d.name === diseaseName); if (disease) { (disease.keywords || []).forEach(k => allAvailableKeywords.add(k)); } }
                            });
                        }
                        
                        App.utils.hide(keywordsContainer);
                        if(allAvailableKeywords.size === 0) return;
                        
                        App.utils.show(keywordsContainer);

                        const keywordTags = document.createElement('div');
                        keywordTags.className = 'flex flex-wrap gap-2';
                        [...allAvailableKeywords].sort((a,b) => a.localeCompare(b, 'ja')).forEach(keyword => { 
                            const tag = document.createElement('span'); 
                            tag.className = `keyword-tag bg-gray-700 hover:bg-gray-600 text-sm py-1 px-3 rounded-full transition-colors ${App.state.filters.activeKeywords.has(keyword) ? 'active' : ''}`;
                            tag.textContent = keyword; 
                            tag.onclick = () => App.handlers.handleKeywordTagClick(keyword);
                            keywordTags.appendChild(tag); 
                        });
                        selectedKeywordsArea.appendChild(keywordTags);

                        const controlsContainer = document.createElement('div');
                        controlsContainer.className = "mt-4 pt-4 border-t border-gray-700 flex flex-col gap-3";
                        
                        if (App.state.filters.activeKeywords.size > 0) {
                            if (App.state.filters.activeKeywords.size > 1) {
                                const switchContainer = document.createElement('div');
                                switchContainer.id = 'logic-switch-container';
                                switchContainer.dataset.mode = App.state.filters.keywordMode;
                                switchContainer.title = "検索ロジックを切り替え";
                                switchContainer.innerHTML = `<div id="switch-bg"></div><span class="switch-label ${App.state.filters.keywordMode === 'OR' ? 'active-logic' : ''}">OR</span><span class="switch-label ${App.state.filters.keywordMode === 'AND' ? 'active-logic' : ''}">AND</span>`;
                                switchContainer.onclick = () => App.handlers.handleKeywordLogicToggle();
                                controlsContainer.appendChild(switchContainer);
                            }
                            const clearBtn = App.utils.createButton('<i class="fas fa-times-circle mr-1"></i> フィルター解除', 'text-sm text-red-500 hover:text-red-400 flex items-center', () => App.handlers.handleClearKeywordFilter());
                            controlsContainer.appendChild(clearBtn);
                        }
                        
                        let diseaseCount = 0;
                        App.state.ui.selectedItems.forEach(itemId => { if(itemId.startsWith('d_')) diseaseCount++; });
                
                        if (diseaseCount >= 2) {
                            const compareBtn = App.utils.createButton('<i class="fas fa-exchange-alt mr-2"></i>選択した疾患を比較', 'text-sm bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-4 rounded-lg flex items-center justify-center', () => App.components.compareModal.render());
                            controlsContainer.appendChild(compareBtn);
                        }
                
                        if(App.state.ui.selectedItems.size > 0){
                            const clearSelectionBtn = App.utils.createButton('<i class="fas fa-times mr-2"></i>選択をすべて解除', 'text-sm bg-gray-500 hover:bg-gray-600 text-white font-bold py-2 px-4 rounded-lg flex items-center justify-center', () => App.handlers.handleClearAllSelections());
                            controlsContainer.appendChild(clearSelectionBtn);
                        }

                        if(controlsContainer.children.length > 0) {
                           selectedKeywordsArea.appendChild(controlsContainer);
                        }
                    },
                    renderVitalsSummary() {
                        const { vitalsSummaryContainer, vitalsSummaryArea } = App.elements;
                        const vitals = App.state.vitals;
                        
                        if (!vitals || Object.keys(vitals).length === 0) {
                            App.utils.hide(vitalsSummaryContainer);
                            return;
                        }
                        
                        let html = '';
                        const format = (icon, label, value, unit = '') => (value !== null && value !== undefined && value !== '') ? `<span class="flex items-center gap-1"><i class="fa-solid ${icon} fa-fw text-gray-400"></i> ${label}: <b>${value}${unit}</b></span>` : '';
                        
                        html += format('fa-user', '患者', `${vitals.age || ''}歳 ${vitals.gender || ''}`.trim());
                        html += format('fa-brain', 'JCS', vitals.jcs);
                        if(vitals.gcs) html += format('fa-arrows-to-dot', 'GCS', vitals.gcs, ` (E${vitals.gcs_e}V${vitals.gcs_v}M${vitals.gcs_m})`);
                        html += format('fa-lungs', '呼吸', vitals.resp, '回');
                        html += format('fa-heart-pulse', '脈拍', vitals.pulse, '回');
                        html += format('fa-o', 'SpO2', vitals.spo2, '%');
                        html += format('fa-temperature-half', '体温', vitals.temp, '℃');
                        if (vitals.bp_sys_r || vitals.bp_dia_r) html += format('fa-droplet', '血圧(R)', `${vitals.bp_sys_r || '?'}/${vitals.bp_dia_r || '?'}`);
                        if (vitals.bp_sys_l || vitals.bp_dia_l) html += format('fa-droplet', '血圧(L)', `${vitals.bp_sys_l || '?'}/${vitals.bp_dia_l || '?'}`);
                        if (vitals.pupil_r || vitals.pupil_l) html += format('fa-eye', '瞳孔', `R:${vitals.pupil_r || '?'} L:${vitals.pupil_l || '?'}`);
                        
                        vitalsSummaryArea.innerHTML = html;
                        App.utils.show(vitalsSummaryContainer);
                    },
                    setupIntersectionObserver() {
                        if (App.state.intersectionObserver) App.state.intersectionObserver.disconnect();
                        
                        const options = { root: App.elements.contentArea, rootMargin: '-50% 0px -50% 0px', threshold: 0 };
                        
                        App.state.intersectionObserver = new IntersectionObserver((entries) => {
                            entries.forEach(entry => {
                                const navLink = App.elements.jumpNav.querySelector(`a[href="#${entry.target.id}"]`);
                                if (entry.isIntersecting && navLink) {
                                     document.querySelectorAll('.nav-item').forEach(link => link.classList.remove('active-nav'));
                                     navLink.classList.add('active-nav');
                                }
                            });
                        }, options);
                        document.querySelectorAll('.content-card').forEach(card => App.state.intersectionObserver.observe(card));
                    },
                    search: {
                        applyHighlights() {
                            const { filters, ui } = App.state;
                            let termToHighlight = [];
                            if (filters.activeKeywords.size > 0) termToHighlight = [...filters.activeKeywords];
                            else if (filters.searchTerm) termToHighlight = [filters.searchTerm];

                            if(termToHighlight.length > 0) {
                                const regex = new RegExp(`(${termToHighlight.map(t => t.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')).join('|')})`, 'gi');
                                App.elements.contentArea.innerHTML = App.elements.contentArea.innerHTML.replace(regex, `<mark class="highlight">$1</mark>`);
                            }
                            
                            ui.highlightedElements = App.elements.contentArea.querySelectorAll('.highlight');
                            if(ui.highlightedElements.length > 0) {
                                ui.currentHighlightIndex = 0;
                                this.navigateToHighlight(0, false);
                            } else {
                                ui.currentHighlightIndex = -1;
                            }
                            this.updateNav();
                        },
                        updateNav() {
                            const { ui } = App.state;
                            const { searchCount, searchPrevBtn, searchNextBtn } = App.elements;
                            const count = ui.highlightedElements.length;
                            searchCount.textContent = `${count > 0 ? ui.currentHighlightIndex + 1 : 0}/${count}`;
                            searchPrevBtn.disabled = count === 0;
                            searchNextBtn.disabled = count === 0;
                        },
                        navigateToHighlight(direction, shouldScroll = true) {
                            const { ui } = App.state;
                            const count = ui.highlightedElements.length;
                            if (count === 0) return;
                            
                            ui.currentHighlightIndex = (ui.currentHighlightIndex + direction + count) % count;

                            ui.highlightedElements.forEach(el => el.classList.remove('current-highlight'));
                            const currentEl = ui.highlightedElements[ui.currentHighlightIndex];
                            currentEl.classList.add('current-highlight');
                            if(shouldScroll) currentEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
                            this.updateNav();
                        },
                        unhighlight() {
                            App.state.ui.highlightedElements = [];
                            App.state.ui.currentHighlightIndex = -1;
                            App.elements.contentArea.querySelectorAll('mark.highlight').forEach(el => { el.outerHTML = el.innerHTML; });
                        },
                    },
                },
                components: {
                    sidebar: {
                        init() {
                            App.elements.body.addEventListener('touchstart', e => this.handleTouchStart(e), { passive: true });
                            App.elements.body.addEventListener('touchmove', e => this.handleTouchMove(e), { passive: true });
                            App.elements.body.addEventListener('touchend', e => this.handleTouchEnd(e));
                        },
                        bindEventListeners() {
                           App.elements.sidebarToggleBtn.addEventListener('click', () => this.toggle());
                           App.elements.sidebarBackdrop.addEventListener('click', () => this.toggle(false));
                        },
                        handleTouchStart(e) {
                            const s = App.state.sidebar;
                            if (e.touches[0].clientX < 40) {
                                s.isDragging = true;
                                s.touchStartX = e.touches[0].clientX;
                            }
                        },

                            const s = App.state.sidebar;
                            if (!s.isDragging) return;
                            s.touchCurrentX = e.touches[0].clientX;
                            const diff = s.touchCurrentX - s.touchStartX;
                            if (diff > 0) {
                                App.elements.jumpNav.style.transition = 'none';
                                App.elements.jumpNav.style.transform = `translateX(${Math.min(diff - 192, 0)}px)`;
                            }
                        },
                        handleTouchEnd() {
                            const s = App.state.sidebar;
                            if (!s.isDragging) return;
                            s.isDragging = false;
                            App.elements.jumpNav.style.transition = '';
                            App.elements.jumpNav.style.transform = '';
                            const diff = s.touchCurrentX - s.touchStartX;
                            if (diff > App.config.swipeThreshold) {
                                this.toggle(true);
                            } else {
                                this.toggle(false);
                            }

                        bindEventListeners() {

                           el.addEventListener('mouseleave', e => this.handleRelease(e));
                           el.addEventListener('touchstart', e => this.handlePress(e));
                           el.addEventListener('touchend', e => this.handleRelease(e));
                        },
                        handlePress(e) {
                            e.preventDefault();
                            App.state.stopwatch.pressTimer = setTimeout(() => this.reset(), App.config.stopwatchResetDelay);
                        },
                        handleRelease() {
                            if (App.state.stopwatch.pressTimer) {
                                clearTimeout(App.state.stopwatch.pressTimer);
                                App.state.stopwatch.pressTimer = null;
                                this.toggle();
                            }
                        },
                        toggle() {
                            const s = App.state.stopwatch;
                            if (s.isRunning) {
                                clearInterval(s.interval);
                                App.elements.stopwatch.classList.remove('running');
                            } else {
                                s.interval = setInterval(() => this.update(), 1000);
                                App.elements.stopwatch.classList.add('running');
                            }
                            s.isRunning = !s.isRunning;
                        },
                        update() {
                            App.state.stopwatch.elapsedSeconds++;
                            const time = App.state.stopwatch.elapsedSeconds;
                            const mins = Math.floor(time / 60).toString().padStart(2, '0');
                            const secs = (time % 60).toString().padStart(2, '0');
                            App.elements.stopwatch.textContent = `${mins}:${secs}`;
                        },
                        reset() {
                            const s = App.state.stopwatch;
                            clearInterval(s.interval);
                            s.isRunning = false;
                            s.elapsedSeconds = 0;
                            App.elements.stopwatch.textContent = "00:00";

                        get() { return JSON.parse(localStorage.getItem(this.getKey())) || []; },
                        save(term) {
                            if (!term) return;
                            let history = this.get();
                            history = history.filter(item => item !== term);

                            if (history.length > App.config.maxHistoryItems) history.pop();

                    loadFromStorage(key, defaultValue = null) {

                        if (item === null) return defaultValue;
                        try {

                        } catch (e) {
                            return item;
                        }
                    },
                    saveToStorage(key, value) {
                        if (typeof value === 'object') {
                            localStorage.setItem(key, JSON.stringify(value));
                        } else {
                            localStorage.setItem(key, value);
                        }
                    },
