<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>救急隊員向け臨床推論サポートアプリ</title>
    
    <!-- スタイルシートとフォント -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            -webkit-tap-highlight-color: transparent; /* iOSでのタップ時のハイライトを無効化 */
        }
        /* カスタムスクロールバー */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1f2937; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #6b7280; }
        
        /* 汎用スタイル */
        .modal, .content-card { transition: all 0.3s ease-in-out; }
        .modal.hidden { opacity: 0; transform: scale(0.95); pointer-events: none; }
        
        /* 検索ハイライト */
        .highlight { background-color: yellow; color: #1f2937; padding: 0 2px; border-radius: 2px; }
        .current-highlight { outline: 2px solid #f97316; scroll-margin-top: 150px; }
        
        /* ボタン無効化スタイル */
        .search-nav-btn:disabled, button:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .item-checkbox, .nav-item-checkbox { transform: scale(1.2); margin-right: 12px; accent-color: #3b82f6; }
        
        .keyword-tag, .content-keyword-tag { cursor: pointer; transition: background-color 0.2s ease, color 0.2s ease; }
        .keyword-tag.active { background-color: yellow; color: #1f2937; font-weight: bold; }
        
        .nav-item { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: background-color 0.2s ease, color 0.2s ease; }
        .nav-item.active-nav { background-color: #2563eb; color: white; }
        
        /* キーワードフィルターロジック切り替えスイッチ */
        #logic-switch-container { position: relative; display: inline-flex; background-color: #374151; border-radius: 9999px; padding: 2px; cursor: pointer; }
        .switch-label { padding: 2px 10px; font-size: 0.75rem; font-weight: 500; color: #d1d5db; transition: color 0.2s ease-in-out; z-index: 10; }
        .switch-label.active-logic { color: #111827; }
        #switch-bg { position: absolute; top: 2px; bottom: 2px; left: 2px; width: calc(50% - 2px); background-color: #fBBF24; border-radius: 9999px; transition: transform 0.2s ease-in-out; }
        #logic-switch-container[data-mode="AND"] #switch-bg { transform: translateX(100%); }
        
        /* アクティブ状態のボタンスタイル */
        #filter-favorites-btn.active, #mobile-filter-favorites-btn.active { color: #fBBF24; background-color: #374151; }
        .gender-btn.active, .vitals-btn.active { background-color: #3b82f6; color: white; }

        /* ストップウォッチ実行中スタイル */
        #stopwatch.running { background-color: #166534; }
        
        /* 開閉シェブロン */
        .toggle-chevron { transition: transform 0.2s ease-in-out; }
        .toggle-chevron.collapsed { transform: rotate(180deg); }

        /* バイタルアラートアニメーション */
        @keyframes flash-red-bg { 0%, 100% { background-color: transparent; } 50% { background-color: rgba(220, 38, 38, 0.4); } }
        @keyframes flash-red-text { 0%, 100% { color: inherit; } 50% { color: #f87171; } }
        .vitals-alert-bg { animation: flash-red-bg 1.5s infinite; }
        .vitals-alert-text { animation: flash-red-text 1.5s infinite; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 antialiased">

    <!-- メインレイアウト -->

                        <input type="text" id="temp-memo" placeholder="一時メモ..." class="flex-grow min-w-[100px] bg-gray-700 text-white placeholder-gray-400 rounded-lg p-2 focus:outline-none focus:ring-2 focus:ring-blue-500" aria-label="一時メモ">

                            <button id="search-history-btn" class="text-gray-400 hover:text-white px-2" title="検索履歴の表示" aria-label="検索履歴の表示"><i class="fas fa-history"></i></button>
                            <button id="search-clear-btn" class="text-gray-400 hover:text-white pr-2" title="検索文字のクリア" aria-label="検索文字のクリア"><i class="fas fa-times"></i></button>
                            <div id="search-history-dropdown" class="hidden absolute top-full left-0 mt-2 w-full bg-gray-800 border border-gray-700 rounded-lg shadow-xl z-30"></div>
                        </div>

                        </div>
                        
                        <!-- モバイル用ハンバーガーメニュー -->
                        <div class="relative md:hidden">
                             <button id="menu-btn" class="bg-gray-600 hover:bg-gray-500 text-white font-bold p-2 rounded-lg w-10 h-10 flex items-center justify-center" aria-label="メニューを開く"><i class="fas fa-ellipsis-v"></i></button>

                             </div>
                        </div>

                        <div class="hidden md:flex items-center space-x-2">

                            <button id="random-btn" class="bg-purple-600 hover:bg-purple-700 text-white font-bold py-2 px-3 rounded-lg flex-shrink-0" title="ランダム表示" aria-label="ランダム表示"><i class="fas fa-dice"></i></button>

                            <button id="settings-btn" class="bg-gray-600 hover:bg-gray-500 text-white font-bold py-2 px-3 rounded-lg flex-shrink-0" title="データ管理" aria-label="データ管理"><i class="fas fa-cog"></i></button>
                        </div>
                    </div>
                </div>
                
                 <!-- バイタルサマリー表示エリア -->

                         <button id="toggle-vitals-summary-btn" class="ml-2 text-gray-400 hover:text-white p-2 flex-shrink-0" title="バイタル概要の表示切替" aria-label="バイタル概要の表示切替"><i class="fas fa-chevron-up toggle-chevron"></i></button>
                    </div>

                <!-- 選択キーワード表示エリア -->

                    <div id="selected-keywords-area" class="flex-wrap gap-2 items-center flex-grow hidden"></div>

                </div>
            </header>

            <!-- メインコンテンツエリア -->

    <script type="module">
        // Firebase SDKのインポート
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, addDoc, setDoc, deleteDoc, getDocs, writeBatch, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        /**
         * =========================================================================
         * アプリケーションのメインオブジェクト (App)
         * =========================================================================
         * このオブジェクトは、アプリケーション全体のロジック、状態、設定を管理します。
         * 役割ごとにプロパティを分割することで、コードの見通しを良くし、保守性を高めています。
         *
         * - config: アプリケーションの基本設定
         * - state: アプリケーションの現在の状態（データ、フィルター条件など）
         * - elements: DOM要素のキャッシュ
         * - services: 外部サービス（Firebaseなど）との通信を担当
         * - handlers: ユーザーの操作（クリック、入力など）への応答を担当
         * - components: 特定のUI部品（モーダル、ストップウォッチなど）のロジックを担当
         * - renderer: stateに基づいてHTMLを生成し、画面を描画する担当
         * - utils: 汎用的な補助関数
         * - init: アプリケーションの初期化処理
         */
        document.addEventListener('DOMContentLoaded', () => {

            const App = {
                // -------------------------------------------------------------------------
                // 1. 設定 (Config)
                // -------------------------------------------------------------------------
                config: {
                    collectionName: 'clinical_cases', // Firestoreのコレクション名
                    maxHistoryItems: 15, // 検索履歴の最大保存数
                    showRandomBtnKey: `paramedic_app_show_random_button`, // ローカルストレージキー
                    stopwatchClickDelay: 300, // ストップウォッチのクリック判定遅延
                    vitalsClearClickDelay: 400, // バイタルクリアのクリック判定遅延
                    firebaseConfig: null, // Firebase設定
                    appId: 'default-app-id', // アプリID
                },

                // -------------------------------------------------------------------------
                // 2. 状態管理 (State)
                // -------------------------------------------------------------------------
                state: {
                    db: null, // Firestoreインスタンス
                    auth: null, // Authインスタンス
                    userId: null, // ユーザーID
                    dataStore: [], // Firestoreから取得した全データ
                    isLoading: true, // ローディング中か否か
                    intersectionObserver: null, // IntersectionObserverインスタンス
                    
                    // フィルター関連の状態
                    filters: {
                        searchTerm: '',
                        activeKeywords: new Set(),
                        keywordMode: 'OR', // 'OR' or 'AND'
                        isFavoritesOnly: false,
                    },
                    
                    // UI関連の状態
                    ui: {
                        selectedItems: new Set(), // 比較などで選択されたアイテム
                        highlightedElements: [],
                        currentHighlightIndex: -1,
                    },

                    // 各コンポーネントの状態
                    stopwatch: {
                        interval: null,
                        isRunning: false,
                        elapsedSeconds: 0,
                        clickCount: 0,
                        clickTimer: null,
                    },
                    vitals: {
                        clearClickCount: 0,
                        clearClickTimer: null,
                        gcs: { E: 0, V: 0, M: 0 },
                        pupil: { r: '', l: '' },
                        pupilReflex: { r: '', l: '' },
                    },
                },

                // -------------------------------------------------------------------------
                // 3. DOM要素のキャッシュ (Elements)
                // -------------------------------------------------------------------------
                elements: {},

                // -------------------------------------------------------------------------
                // 4. 初期化 (Initialization)
                // -------------------------------------------------------------------------
                init() {
                    this.cacheDomElements();
                    this.utils.initFirebaseConfig();
                    this.services.auth.init();
                    this.bindEventListeners();
                    this.components.searchHistory.init();
                    this.components.settings.init();
                    this.components.pupilSelector.init();
                },

                cacheDomElements() {
                    // この関数は、頻繁にアクセスするDOM要素を一度だけ取得し、
                    // `App.elements` オブジェクトに保存します。これにより、
                    // DOMへのアクセス回数が減り、パフォーマンスが向上します。
                    const D = document;
                    this.elements = {
                        // Main layout
                        contentArea: D.getElementById('content-area'),
                        jumpNav: D.getElementById('jump-nav'),
                        loading: D.getElementById('loading'),
                        userIdDisplay: D.getElementById('user-id-display'),
                        sidebarToggleBtn: D.getElementById('sidebar-toggle-btn'),
                        sidebarBackdrop: D.getElementById('sidebar-backdrop'),

                        // Header
                        stopwatch: D.getElementById('stopwatch'),
                        ageInput: D.getElementById('age-input'),
                        dobBtn: D.getElementById('dob-btn'),
                        genderBtns: D.querySelectorAll('.gender-btn'),
                        vitalsBtn: D.getElementById('vitals-btn'),
                        tempMemo: D.getElementById('temp-memo'),

                        // Search
                        searchInput: D.getElementById('search-input'),
                        searchExecBtn: D.getElementById('search-exec-btn'),
                        searchClearBtn: D.getElementById('search-clear-btn'),
                        searchHistoryBtn: D.getElementById('search-history-btn'),
                        searchHistoryDropdown: D.getElementById('search-history-dropdown'),
                        searchCount: D.getElementById('search-count'),
                        searchPrevBtn: D.getElementById('search-prev-btn'),
                        searchNextBtn: D.getElementById('search-next-btn'),

                        // Action buttons
                        filterFavoritesBtn: D.getElementById('filter-favorites-btn'),
                        randomBtn: D.getElementById('random-btn'),
                        addNewBtn: D.getElementById('add-new-btn'),
                        settingsBtn: D.getElementById('settings-btn'),
                        
                        // Mobile menu
                        menuBtn: D.getElementById('menu-btn'),
                        mobileMenu: D.getElementById('mobile-menu'),
                        mobileAddNewBtn: D.getElementById('mobile-add-new-btn'),
                        mobileFilterFavoritesBtn: D.getElementById('mobile-filter-favorites-btn'),
                        mobileRandomBtn: D.getElementById('mobile-random-btn'),
                        mobileSettingsBtn: D.getElementById('mobile-settings-btn'),

                        // Keywords & Vitals summary
                        selectedKeywordsArea: D.getElementById('selected-keywords-area'),
                        toggleKeywordsBtn: D.getElementById('toggle-keywords-btn'),
                        vitalsSummaryContainer: D.getElementById('vitals-summary-container'),
                        vitalsSummaryArea: D.getElementById('vitals-summary-area'),
                        toggleVitalsSummaryBtn: D.getElementById('toggle-vitals-summary-btn'),
                        
                        // Modals
                        dataModal: D.getElementById('data-modal'),
                        modalTitle: D.getElementById('modal-title'),
                        dataForm: D.getElementById('data-form'),
                        entryIdInput: D.getElementById('entry-id'),
                        chiefComplaintInput: D.getElementById('chiefComplaint'),
                        descriptionInput: D.getElementById('description'),
                        chiefComplaintMemoInput: D.getElementById('chiefComplaintMemo'),
                        diseasesContainer: D.getElementById('diseases-container'),
                        addDiseaseBtn: D.getElementById('add-disease-btn'),
                        deleteBtn: D.getElementById('delete-btn'),
                        modalCloseBtn: D.getElementById('modal-close-btn'),
                        
                        settingsModal: D.getElementById('settings-modal'),
                        settingsModalCloseBtn: D.getElementById('settings-modal-close-btn'),
                        exportDataBtn: D.getElementById('export-data-btn'),
                        importDataBtn: D.getElementById('import-data-btn'),
                        importFileInput: D.getElementById('import-file-input'),
                        showRandomBtnToggle: D.getElementById('show-random-btn-toggle'),
                        
                        confirmModal: D.getElementById('confirm-modal'),
                        confirmTitle: D.getElementById('confirm-title'),
                        confirmMessage: D.getElementById('confirm-message'),
                        confirmButtons: D.getElementById('confirm-buttons'),
                        alertIcon: D.getElementById('alert-icon'),

                        compareModal: D.getElementById('compare-modal'),
                        compareModalCloseBtn: D.getElementById('compare-modal-close-btn'),
                        compareContentArea: D.getElementById('compare-content-area'),
                        
                        dobEraModal: D.getElementById('dob-era-modal'),
                        dobEraOkBtn: D.getElementById('dob-era-ok-btn'),
                        dobEraCancelBtn: D.getElementById('dob-era-cancel-btn'),
                        eraSelect: D.getElementById('era-select'),
                        eraYearInput: D.getElementById('era-year-input'),
                        eraMonthInput: D.getElementById('era-month-input'),
                        eraDayInput: D.getElementById('era-day-input'),
                        
                        vitalsModal: D.getElementById('vitals-modal'),
                        vitalsModalCloseBtn: D.getElementById('vitals-modal-close-btn'),
                        vitalsClearBtn: D.getElementById('vitals-clear-btn'),
                        vitalsForm: D.getElementById('vitals-form'),
                        gcsTotalEl: D.getElementById('gcs-total'),
                        pupilR: D.getElementById('pupil-r'),
                        pupilL: D.getElementById('pupil-l'),
                    };
                },

                bindEventListeners() {
                    // この関数は、全てのイベントリスナーをセットアップします。
                    // 実際の処理は `App.handlers` 内の各メソッドに委譲します。
                    const { elements, handlers } = this;
                    
                    // Search
                    elements.searchExecBtn.addEventListener('click', () => handlers.handleSearch());
                    elements.searchInput.addEventListener('keypress', e => { if (e.key === 'Enter') handlers.handleSearch(); });
                    elements.searchClearBtn.addEventListener('click', () => handlers.handleSearchClear());
                    elements.searchHistoryBtn.addEventListener('click', e => { e.stopPropagation(); this.components.searchHistory.toggleDropdown(); });
                    elements.searchNextBtn.addEventListener('click', () => this.renderer.search.navigateToHighlight(1));
                    elements.searchPrevBtn.addEventListener('click', () => this.renderer.search.navigateToHighlight(-1));
                    
                    // Main content and nav clicks (event delegation)
                    elements.contentArea.addEventListener('click', e => handlers.handleContentAreaClick(e));
                    elements.contentArea.addEventListener('change', e => handlers.handleCheckboxChange(e));
                    elements.jumpNav.addEventListener('change', e => handlers.handleCheckboxChange(e));

                    // Header buttons
                    elements.filterFavoritesBtn.addEventListener('click', () => handlers.handleToggleFavoritesFilter());
                    elements.addNewBtn.addEventListener('click', () => this.components.dataModal.openForNew());
                    elements.settingsBtn.addEventListener('click', () => this.utils.showModal(elements.settingsModal));
                    elements.randomBtn.addEventListener('click', () => handlers.handleRandomSelect());
                    
                    // Mobile navigation
                    elements.sidebarToggleBtn.addEventListener('click', () => handlers.handleSidebarToggle());
                    elements.sidebarBackdrop.addEventListener('click', () => handlers.handleSidebarToggle(false));
                    elements.menuBtn.addEventListener('click', e => { e.stopPropagation(); elements.mobileMenu.classList.toggle('hidden'); });
                    elements.mobileAddNewBtn.addEventListener('click', e => { e.preventDefault(); this.components.dataModal.openForNew(); this.utils.hide(elements.mobileMenu); });
                    elements.mobileFilterFavoritesBtn.addEventListener('click', e => { e.preventDefault(); handlers.handleToggleFavoritesFilter(); this.utils.hide(elements.mobileMenu); });
                    elements.mobileRandomBtn.addEventListener('click', e => { e.preventDefault(); handlers.handleRandomSelect(); this.utils.hide(elements.mobileMenu); });
                    elements.mobileSettingsBtn.addEventListener('click', e => { e.preventDefault(); this.utils.showModal(elements.settingsModal); this.utils.hide(elements.mobileMenu); });
                    
                    // Modals
                    elements.modalCloseBtn.addEventListener('click', () => this.utils.hideModal(elements.dataModal));
                    elements.dataForm.addEventListener('submit', e => { e.preventDefault(); this.components.dataModal.submit(); });
                    elements.deleteBtn.addEventListener('click', () => this.components.dataModal.delete());
                    elements.addDiseaseBtn.addEventListener('click', () => this.components.dataModal.addDiseaseForm());
                    
                    elements.settingsModalCloseBtn.addEventListener('click', () => this.utils.hideModal(elements.settingsModal));
                    elements.exportDataBtn.addEventListener('click', () => this.components.settings.exportData());
                    elements.importDataBtn.addEventListener('click', () => elements.importFileInput.click());
                    elements.importFileInput.addEventListener('change', e => this.components.settings.handleFileSelect(e));
                    elements.showRandomBtnToggle.addEventListener('change', e => this.components.settings.toggleRandomButtonVisibility(e.target.checked));
                    
                    elements.compareModalCloseBtn.addEventListener('click', () => this.utils.hideModal(elements.compareModal));

                    // Toggles
                    elements.toggleKeywordsBtn.addEventListener('click', () => handlers.handleToggleVisibility(elements.selectedKeywordsArea, elements.toggleKeywordsBtn));
                    elements.toggleVitalsSummaryBtn.addEventListener('click', () => handlers.handleToggleVisibility(elements.vitalsSummaryArea, elements.toggleVitalsSummaryBtn, true));

                    // Global click listener to close dropdowns
                    document.addEventListener('click', e => {
                        if (elements.searchHistoryBtn && !elements.searchHistoryBtn.parentElement.contains(e.target)) this.utils.hide(elements.searchHistoryDropdown);
                        if (elements.menuBtn && !elements.menuBtn.contains(e.target) && !elements.mobileMenu.contains(e.target)) this.utils.hide(elements.mobileMenu);
                    });
                    
                    // Components with own listeners
                    this.components.stopwatch.bindEventListeners();
                    this.components.vitalsModal.bindEventListeners();
                    this.components.dobModal.bindEventListeners();
                },
                
                // -------------------------------------------------------------------------
                // 5. イベントハンドラ (Event Handlers)
                // -------------------------------------------------------------------------
                handlers: {
                    handleSearch() {
                        App.state.filters.activeKeywords.clear();
                        const searchTerm = App.elements.searchInput.value.trim();
                        App.state.filters.searchTerm = searchTerm;
                        App.components.searchHistory.save(searchTerm);
                        App.renderer.renderAll();
                    },
                    
                    handleSearchClear() {
                        App.elements.searchInput.value = '';
                        this.handleSearch();
                    },

                    handleToggleFavoritesFilter() {
                        const { filters } = App.state;
                        filters.isFavoritesOnly = !filters.isFavoritesOnly;
                        App.elements.filterFavoritesBtn.classList.toggle('active', filters.isFavoritesOnly);
                        App.elements.mobileFilterFavoritesBtn.classList.toggle('active', filters.isFavoritesOnly);
                        App.renderer.renderAll();
                    },
                    
                    handleToggleVisibility(area, button, isCollapsed = false) {
                        const isHidden = area.classList.toggle('hidden');
                        const chevron = button.querySelector('.toggle-chevron');
                        if(isCollapsed) {
                           chevron.classList.toggle('collapsed');
                        } else {
                           chevron.classList.toggle('fa-chevron-down', isHidden);
                           chevron.classList.toggle('fa-chevron-up', !isHidden);
                        }
                    },

                    handleRandomSelect() {
                        const allComplaintCards = App.elements.contentArea.querySelectorAll('.content-card');
                        if (allComplaintCards.length > 0) {
                            const randomIndex = Math.floor(Math.random() * allComplaintCards.length);
                            allComplaintCards[randomIndex].scrollIntoView({ behavior: 'smooth', block: 'center' });
                        }
                    },
                    
                    handleSidebarToggle(forceShow) {
                        if(typeof forceShow === 'boolean') {
                           App.elements.jumpNav.classList.toggle('-translate-x-full', !forceShow);
                           App.elements.sidebarBackdrop.classList.toggle('hidden', !forceShow);
                        } else {
                           App.elements.jumpNav.classList.toggle('-translate-x-full');
                           App.elements.sidebarBackdrop.classList.toggle('hidden');
                        }
                    },
                    
                    handleContentAreaClick(event) {
                        const { target } = event;
                        const editBtn = target.closest('.edit-btn');
                        const favoriteBtn = target.closest('.favorite-btn');
                        const favoriteDiseaseBtn = target.closest('.favorite-disease-btn');
                        
                        if (editBtn) { App.components.dataModal.openForEdit(editBtn.dataset.id); return; }
                        if (favoriteBtn) { App.services.db.toggleFavorite('complaint', favoriteBtn.dataset.id); return; }
                        if (favoriteDiseaseBtn) { App.services.db.toggleFavorite('disease', favoriteDiseaseBtn.dataset.complaintId, favoriteDiseaseBtn.dataset.diseaseName); return; }
                        if (target.classList.contains('content-keyword-tag')) { this.handleKeywordTagClick(target.textContent); }
                    },
                    
                    handleKeywordTagClick(keyword) {
                        const { activeKeywords } = App.state.filters;
                        if (activeKeywords.has(keyword)) {
                            activeKeywords.delete(keyword);
                        } else {
                            activeKeywords.add(keyword);
                        }
                        App.state.filters.searchTerm = '';
                        App.elements.searchInput.value = '';
                        App.renderer.renderAll();
                    },
                    
                    handleKeywordLogicToggle() {
                        const { filters } = App.state;
                        filters.keywordMode = filters.keywordMode === 'OR' ? 'AND' : 'OR';
                        App.renderer.renderAll();
                    },

                    handleClearKeywordFilter() {
                        App.state.filters.activeKeywords.clear();
                        App.state.filters.keywordMode = 'OR';
                        App.renderer.renderAll();
                    },
                    
                    handleCheckboxChange(event) {
                        const checkbox = event.target;
                        if (!checkbox.classList.contains('item-checkbox') && !checkbox.classList.contains('nav-item-checkbox')) return;
                        
                        const { type, id, name } = checkbox.dataset;
                        const uniqueId = type === 'complaint' ? `c_${id}` : `d_${id}_${name.replace(/\s/g, '_')}`;
                        
                        if (checkbox.checked) {
                            App.state.ui.selectedItems.add(uniqueId);
                        } else {
                            App.state.ui.selectedItems.delete(uniqueId);
                        }
                        
                        // Sync checkboxes in main content and nav
                        const mainCheckbox = App.elements.contentArea.querySelector(`.item-checkbox[data-id='${id}'][data-type='${type}']${name ? `[data-name='${name}']` : ''}`);
                        const navCheckbox = App.elements.jumpNav.querySelector(`.nav-item-checkbox[data-id='${id}'][data-type='${type}']${name ? `[data-name='${name}']` : ''}`);

                        if (mainCheckbox && mainCheckbox.checked !== checkbox.checked) mainCheckbox.checked = checkbox.checked;
                        if (navCheckbox && navCheckbox.checked !== checkbox.checked) navCheckbox.checked = checkbox.checked;
                        
                        App.renderer.renderSelectedKeywords();
                    },
                    
                    handleClearAllSelections() {
                        App.state.ui.selectedItems.clear();

                },
                
                // -------------------------------------------------------------------------
                // 6. 外部サービス (Services)
                // -------------------------------------------------------------------------
                services: {
                    auth: {
                        init() {
                            try {
                                const app = initializeApp(App.config.firebaseConfig);
                                App.state.db = getFirestore(app);
                                App.state.auth = getAuth(app);
                                this.listen();

                                console.error("Firebase Initialization Failed:", error);
                                App.elements.loading.innerHTML = `<p class="text-red-500 p-8">アプリケーションの初期化に失敗しました。設定を確認してください。</p>`;

                        },
                        listen() {
                            onAuthStateChanged(App.state.auth, async (user) => {
                                if (user) {
                                    App.state.userId = user.uid;
                                    App.elements.userIdDisplay.textContent = user.uid;
                                    App.services.db.listenForChanges();
                                } else {
                                    App.elements.userIdDisplay.textContent = "匿名ログイン中...";
                                    await this.signIn();
                                }
                            });
                        },
                        async signIn() {
                             try {
                                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                                    await signInWithCustomToken(App.state.auth, __initial_auth_token);
                                } else {
                                    await signInAnonymously(App.state.auth);
                                }
                            } catch (error) {
                                console.error("Authentication failed:", error);
                                if (App.elements.loading) App.elements.loading.innerHTML = '<p class="text-red-500">Authentication Failed.</p>';

                        }
                    },
                    db: {
                        getCollectionRef() {
                            const { db, userId } = App.state;
                            const { appId } = App.config;

                        },
                        listenForChanges() {
                            onSnapshot(this.getCollectionRef(), (snapshot) => {
                                App.utils.hide(App.elements.loading);
                                App.state.isLoading = false;
                                
                                const serverData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                                App.state.dataStore = serverData;
                
                                if (snapshot.empty && App.state.dataStore.length === 0) { 
                                    this.seedInitialData(); 
                                    return;
                                }
                                
                                App.renderer.renderAll();
                            }, (error) => {
                                console.error("Error fetching data:", error);
                                if (App.elements.loading) App.elements.loading.innerHTML = '<p class="text-red-500">データの取得に失敗しました。オフラインの可能性があります。</p>';
                            });
                        },
                        async seedInitialData() {

                            try {
                                const batch = writeBatch(App.state.db);
                                initialData.forEach(item => {
                                    const docRef = doc(this.getCollectionRef());
                                    batch.set(docRef, item);
                                });
                                await batch.commit();
                            } catch (error) {
                                console.error("Error seeding data:", error);
                            }
                        },
                        async toggleFavorite(type, id, diseaseName = null) {
                            const entryIndex = App.state.dataStore.findIndex(e => e.id === id);
                            if (entryIndex === -1) return;
                            
                            const entry = App.state.dataStore[entryIndex];
                            let newFavoriteStatus;
                            let docRef = doc(this.getCollectionRef(), id);
                            let updatePayload = {};

                            if(type === 'complaint') {
                                newFavoriteStatus = !entry.isFavorite;
                                entry.isFavorite = newFavoriteStatus; // Optimistic UI update
                                updatePayload = { isFavorite: newFavoriteStatus };
                            } else { // disease
                                const diseaseIndex = entry.diseases.findIndex(d => d.name === diseaseName);
                                if(diseaseIndex === -1) return;
                                newFavoriteStatus = !entry.diseases[diseaseIndex].isFavorite;
                                entry.diseases[diseaseIndex].isFavorite = newFavoriteStatus; // Optimistic UI update
                                updatePayload = { diseases: entry.diseases };
                            }

                            App.renderer.renderAll(); // Re-render with new state
                
                            try {
                                await updateDoc(docRef, updatePayload);
                            } catch (error) {
                                console.error("Error updating favorite status:", error);
                                // Rollback on error
                                if(type === 'complaint') entry.isFavorite = !newFavoriteStatus;
                                else entry.diseases.find(d => d.name === diseaseName).isFavorite = !newFavoriteStatus;
                                App.renderer.renderAll();
                                App.utils.customAlert("お気に入り状態の更新に失敗しました。");
                            }
                        },
                        async saveData(entryData, id) {
                           try {
                               if (id) {
                                   await setDoc(doc(this.getCollectionRef(), id), entryData);
                               } else {
                                   await addDoc(this.getCollectionRef(), entryData);
                               }
                           } catch (error) {
                               console.error("Error saving data: ", error);
                               await App.utils.customAlert("データの保存に失敗しました。");
                               throw error; // Re-throw to handle in UI
                           }
                        },
                        async deleteData(id) {
                            try {
                                await deleteDoc(doc(this.getCollectionRef(), id));
                            } catch (error) {
                                console.error("Error deleting data: ", error);
                                await App.utils.customAlert("データの削除に失敗しました。");
                                throw error; // Re-throw to handle in UI
                            }
                        },
                        async importData(newData) {
                            try {
                                const querySnapshot = await getDocs(this.getCollectionRef());
                                const batch = writeBatch(App.state.db);
                                querySnapshot.forEach((doc) => batch.delete(doc.ref));
                                newData.forEach(item => {
                                    const newDocRef = doc(this.getCollectionRef());
                                    batch.set(newDocRef, item);
                                });
                                await batch.commit();
                                await App.utils.customAlert("データのインポートが完了しました。", "成功");
                            } catch (error) {
                                console.error("Error importing data: ", error);
                                await App.utils.customAlert("データのインポート中にエラーが発生しました。", "エラー");
                            }
                        }
                    }
                },
                
                // -------------------------------------------------------------------------
                // 7. レンダリング (Renderer)
                // -------------------------------------------------------------------------
                renderer: {
                    renderAll() {
                        this.search.unhighlight();
                        const dataToRender = this.filterAndSortData();
                        this.renderContent(dataToRender);
                        this.renderNav(dataToRender);
                        this.renderSelectedKeywords();
                        this.search.updateNav();
                        this.search.applyHighlights();
                        this.setupIntersectionObserver();
                    },

                    filterAndSortData() {
                        const { dataStore, filters } = App.state;
                        let processedData = [...dataStore];

                        // 1. Filter by favorites if active
                        if (filters.isFavoritesOnly) {
                             processedData = processedData.map(entry => {
                                const favoriteDiseases = (entry.diseases || []).filter(d => d.isFavorite);
                                if (entry.isFavorite) return entry;
                                if (favoriteDiseases.length > 0) return { ...entry, diseases: favoriteDiseases };
                                return null;
                            }).filter(Boolean);
                        }
                        
                        // 2. Filter by keywords or search term
                        if (filters.activeKeywords.size > 0) {
                            const activeKeywords = Array.from(filters.activeKeywords);
                             processedData = processedData.map(entry => {
                                const matchingDiseases = (entry.diseases || []).filter(d => {
                                    const keywords = d.keywords || [];
                                    if (filters.keywordMode === 'OR') {
                                        return activeKeywords.some(filter => keywords.includes(filter));
                                    } else { // AND
                                        return activeKeywords.every(filter => keywords.includes(filter));
                                    }
                                });
                                if (matchingDiseases.length > 0) return { ...entry, diseases: matchingDiseases };
                                return null;
                            }).filter(Boolean);
                        } else if (filters.searchTerm) {
                            const regex = new RegExp(filters.searchTerm.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'i');
                            processedData = processedData.filter(entry => 
                                regex.test(entry.chiefComplaint) || 
                                (entry.diseases || []).some(d => regex.test(d.name) || (d.keywords && d.keywords.some(k => regex.test(k))) || (d.pitfalls && d.pitfalls.some(p => regex.test(p))))
                            );
                        }

                        // 3. Sort the results
                        processedData.sort((a, b) => {
                            if (a.isFavorite && !b.isFavorite) return -1;
                            if (!a.isFavorite && b.isFavorite) return 1;
                            return a.chiefComplaint.localeCompare(b.chiefComplaint, 'ja');
                        });
                        
                        return processedData;
                    },

                    renderNav(data) {
                        const { jumpNav } = App.elements;
                        jumpNav.innerHTML = '';
                        data.forEach((entry, index) => {
                            const complaintId = `complaint-${entry.id}`;
                            const navItem = document.createElement('a');
                            navItem.href = `#${complaintId}`;
                            navItem.className = 'nav-item block text-gray-300 hover:bg-blue-600 hover:text-white font-bold py-3 px-2 rounded-lg transition-colors text-sm flex items-center';
                            const starIcon = entry.isFavorite ? `<i class="fas fa-star text-yellow-400 mr-2"></i>` : '';
                            navItem.innerHTML = `<input type="checkbox" class="nav-item-checkbox" data-type="complaint" data-id="${entry.id}"> ${starIcon}${(index + 1).toString().padStart(2, '0')}. ${entry.chiefComplaint}`;
                            navItem.title = entry.chiefComplaint;
                            navItem.querySelector('.nav-item-checkbox').addEventListener('click', e => e.stopPropagation());
                            navItem.onclick = (e) => { 
                                e.preventDefault(); 
                                document.getElementById(complaintId)?.scrollIntoView({ behavior: 'smooth' }); 
                                App.handlers.handleSidebarToggle(false);
                            };
                            jumpNav.appendChild(navItem);
                        });
                    },

                    renderContent(data) {
                        const { contentArea } = App.elements;
                        contentArea.innerHTML = '';
                        if (data.length === 0) {
                            contentArea.innerHTML = `<div class="text-center p-8 text-gray-400"><i class="fas fa-search-minus fa-3x mb-4"></i><p>該当するデータが見つかりませんでした。</p></div>`;
                            return;
                        }
                        
                        const fragment = document.createDocumentFragment();
                        data.forEach((entry, index) => {
                            // (This part is complex but largely unchanged from the original, focusing on HTML string generation)
                            const complaintId = `complaint-${entry.id}`;
                            const isComplaintChecked = App.state.ui.selectedItems.has(`c_${entry.id}`);
                            const entryDiv = document.createElement('div');
                            entryDiv.className = 'content-card mb-6 bg-gray-800 rounded-xl shadow-md p-5';
                            entryDiv.id = complaintId;
                            
                            const memoHTML = entry.memo ? `<div class="mt-4 pl-6 text-sm text-amber-300 bg-gray-900/50 p-3 rounded-lg border-l-4 border-amber-400"><div class="font-bold mb-1 flex items-center"><i class="fas fa-pencil-alt mr-2"></i>主訴メモ</div><div>${entry.memo.replace(/\n/g, '<br>')}</div></div>` : '';
                            const favoriteClass = entry.isFavorite ? 'fas text-yellow-400' : 'far text-gray-500';
            
                            const diseasesHTML = (entry.diseases || []).map(disease => { 
                                const isDiseaseChecked = App.state.ui.selectedItems.has(`d_${entry.id}_${disease.name.replace(/\s/g, '_')}`);
                                const diseaseFavoriteClass = disease.isFavorite ? 'fas text-yellow-400' : 'far text-gray-500';
                                const diseaseMemoHTML = disease.memo ? `<div class="mt-3 text-sm text-amber-300 bg-gray-900/50 p-2 rounded-lg"><div class="font-bold mb-1 flex items-center"><i class="fas fa-pencil-alt mr-2"></i>疾患メモ</div><div>${disease.memo.replace(/\n/g, '<br>')}</div></div>` : '';
                                return `
                                    <div class="pl-4 border-l-4 border-gray-700">
                                        <div class="flex items-center justify-between">
                                            <div class="flex items-center">
                                                <input type="checkbox" class="item-checkbox" data-type="disease" data-id="${entry.id}" data-name="${disease.name}" ${isDiseaseChecked ? 'checked' : ''}>
                                                <h3 class="text-lg font-semibold text-teal-400">${disease.name}</h3>
                                            </div>
                                            <button class="favorite-disease-btn text-lg" data-complaint-id="${entry.id}" data-disease-name="${disease.name}" title="お気に入り登録"><i class="${diseaseFavoriteClass} fa-star"></i></button>
                                        </div>
                                        <div class="mt-2 pl-8">
                                            <p class="text-sm text-gray-400 mt-1">${disease.description || ''}</p>
                                            ${diseaseMemoHTML}
                                            <h4 class="font-bold text-sm text-gray-300 mt-3"><i class="fas fa-lightbulb text-yellow-400 mr-2"></i>キーワード</h4><div class="flex flex-wrap gap-2 mt-1">${(disease.keywords || []).map(k => `<span class="content-keyword-tag bg-gray-700 text-sm text-gray-200 rounded-full px-3 py-1 hover:bg-gray-500">${k}</span>`).join('')}</div>
                                            <h4 class="font-bold text-sm text-gray-300 mt-3"><i class="fas fa-exclamation-triangle text-red-400 mr-2"></i>落とし穴</h4><ul class="list-disc list-inside mt-1 text-sm text-gray-300 space-y-1">${(disease.pitfalls || []).map(p => `<li>${p}</li>`).join('')}</ul>
                                        </div>
                                    </div>`;
                            }).join('');

                            entryDiv.innerHTML = `
                                <div class="flex justify-between items-center">
                                    <div class="flex items-center">
                                        <input type="checkbox" class="item-checkbox" data-type="complaint" data-id="${entry.id}" ${isComplaintChecked ? 'checked' : ''}>
                                        <h2 class="text-xl md:text-2xl font-bold text-blue-400">${(index + 1).toString().padStart(2, '0')}. ${entry.chiefComplaint}</h2>
                                    </div>
                                    <div class="flex items-center">
                                        <button class="favorite-btn text-xl mr-4" data-id="${entry.id}" title="お気に入り登録"><i class="${favoriteClass} fa-star"></i></button>
                                        <button class="edit-btn text-gray-400 hover:text-white" data-id="${entry.id}"><i class="fas fa-edit"></i></button>
                                    </div>
                                </div>
                                <p class="text-sm text-gray-400 mt-1 ml-10">${entry.description || ''}</p>
                                ${memoHTML}
                                <div class="mt-4 space-y-4 pl-6">${diseasesHTML}</div>`;
                            fragment.appendChild(entryDiv);
                        });
                        contentArea.appendChild(fragment);
                    },
                    
                    renderSelectedKeywords() {
                        const { selectedKeywordsArea } = App.elements;
                        const { dataStore } = App.state;
                        const { selectedItems, activeKeywords } = App.state.filters;

                        selectedKeywordsArea.innerHTML = '';
                        App.utils.show(selectedKeywordsArea.parentElement.parentElement);

                        const allAvailableKeywords = new Set();
                        if (App.state.ui.selectedItems.size === 0) {
                            dataStore.forEach(entry => (entry.diseases || []).forEach(d => (d.keywords || []).forEach(k => allAvailableKeywords.add(k))));
                        } else {
                            App.state.ui.selectedItems.forEach(itemId => {
                                const parts = itemId.split('_'); const type = parts[0]; const entryId = parts[1];
                                const entry = dataStore.find(e => e.id === entryId); if (!entry) return;
                                if (type === 'c') { (entry.diseases || []).forEach(d => (d.keywords || []).forEach(k => allAvailableKeywords.add(k))); } 
                                else if (type === 'd') { const diseaseName = parts.slice(2).join(' ').replace(/_/g, ' '); const disease = (entry.diseases || []).find(d => d.name === diseaseName); if (disease) { (disease.keywords || []).forEach(k => allAvailableKeywords.add(k)); } }
                            });
                        }
                        
                        if(allAvailableKeywords.size === 0) {
                             App.utils.hide(selectedKeywordsArea);
                             return;
                        }
                        App.utils.show(selectedKeywordsArea);

                        [...allAvailableKeywords].sort((a,b) => a.localeCompare(b, 'ja')).forEach(keyword => { 
                            const tag = document.createElement('span'); 
                            tag.className = 'keyword-tag bg-gray-700 hover:bg-gray-600 text-sm py-1 px-3 rounded-full transition-colors'; 
                            if (App.state.filters.activeKeywords.has(keyword)) tag.classList.add('active');
                            tag.textContent = keyword; 
                            tag.onclick = () => App.handlers.handleKeywordTagClick(keyword);
                            selectedKeywordsArea.appendChild(tag); 
                        });
                        
                        const controlsContainer = document.createElement('div');
                        controlsContainer.className = "ml-4 flex items-center space-x-3";
                        
                        if (App.state.filters.activeKeywords.size > 0) {
                            if (App.state.filters.activeKeywords.size > 1) {
                                const switchContainer = document.createElement('div');
                                switchContainer.id = 'logic-switch-container';
                                switchContainer.dataset.mode = App.state.filters.keywordMode;
                                switchContainer.title = "検索ロジックを切り替え";
                                switchContainer.innerHTML = `<div id="switch-bg"></div><span class="switch-label ${App.state.filters.keywordMode === 'OR' ? 'active-logic' : ''}">OR</span><span class="switch-label ${App.state.filters.keywordMode === 'AND' ? 'active-logic' : ''}">AND</span>`;
                                switchContainer.onclick = () => App.handlers.handleKeywordLogicToggle();
                                controlsContainer.appendChild(switchContainer);
                            }
                            const clearBtn = App.utils.createButton('<i class="fas fa-times-circle mr-1"></i> フィルター解除', 'text-sm text-red-500 hover:text-red-400 flex items-center', () => App.handlers.handleClearKeywordFilter());
                            controlsContainer.appendChild(clearBtn);
                        }
                        
                        let diseaseCount = 0;
                        App.state.ui.selectedItems.forEach(itemId => { if(itemId.startsWith('d_')) diseaseCount++; });
                
                        if (diseaseCount >= 2) {
                            const compareBtn = App.utils.createButton('<i class="fas fa-exchange-alt mr-2"></i>選択した疾患を比較', 'ml-auto text-sm bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-1 px-3 rounded-lg flex items-center', () => App.components.compareModal.render());
                            controlsContainer.appendChild(compareBtn);
                        }
                
                        if(App.state.ui.selectedItems.size > 0){
                            const clearSelectionBtn = App.utils.createButton('<i class="fas fa-times mr-2"></i>選択をすべて解除', 'ml-auto text-sm bg-gray-500 hover:bg-gray-600 text-white font-bold py-1 px-3 rounded-lg flex items-center', () => App.handlers.handleClearAllSelections());
                            controlsContainer.appendChild(clearSelectionBtn);
                        }

                        if(controlsContainer.children.length > 0) {
                           selectedKeywordsArea.appendChild(controlsContainer);
                        }
                    },
                    
                    setupIntersectionObserver() {
                        if (App.state.intersectionObserver) App.state.intersectionObserver.disconnect();
                        
                        const options = { root: App.elements.contentArea, rootMargin: '-50% 0px -50% 0px', threshold: 0 };
                        
                        App.state.intersectionObserver = new IntersectionObserver((entries) => {
                            entries.forEach(entry => {
                                const navLink = App.elements.jumpNav.querySelector(`a[href="#${entry.target.id}"]`);
                                if (entry.isIntersecting && navLink) {
                                     document.querySelectorAll('.nav-item').forEach(link => link.classList.remove('active-nav'));
                                     navLink.classList.add('active-nav');
                                }
                            });
                        }, options);
                        document.querySelectorAll('.content-card').forEach(card => App.state.intersectionObserver.observe(card));
                    },

                    search: { // Nested object for search-specific rendering
                        applyHighlights() {
                            const { filters, ui } = App.state;
                            let termToHighlight = [];
                            if (filters.activeKeywords.size > 0) {
                                termToHighlight = [...filters.activeKeywords];
                            } else if (filters.searchTerm) {
                                termToHighlight = [filters.searchTerm];
                            }

                            if(termToHighlight.length > 0) {
                                const regex = new RegExp(`(${termToHighlight.map(t => t.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')).join('|')})`, 'gi');
                                App.elements.contentArea.innerHTML = App.elements.contentArea.innerHTML.replace(regex, `<mark class="highlight">$1</mark>`);
                            }
                            
                            ui.highlightedElements = App.elements.contentArea.querySelectorAll('.highlight');
                            if(ui.highlightedElements.length > 0) {
                                ui.currentHighlightIndex = 0;
                                this.navigateToHighlight(0, false); // Don't scroll on initial highlight
                            }
                        },
                        updateNav() {
                            const { ui } = App.state;
                            const { searchCount, searchPrevBtn, searchNextBtn } = App.elements;
                            const count = ui.highlightedElements.length;
                            searchCount.textContent = `${count > 0 ? ui.currentHighlightIndex + 1 : 0}/${count}`;
                            searchPrevBtn.disabled = count === 0;
                            searchNextBtn.disabled = count === 0;
                        },
                        navigateToHighlight(direction, shouldScroll = true) {
                            const { ui } = App.state;
                            const count = ui.highlightedElements.length;
                            if (count === 0) return;
                            
                            ui.currentHighlightIndex = (ui.currentHighlightIndex + direction + count) % count;

                            ui.highlightedElements.forEach(el => el.classList.remove('current-highlight'));
                            const currentEl = ui.highlightedElements[ui.currentHighlightIndex];
                            currentEl.classList.add('current-highlight');
                            if(shouldScroll) {
                                currentEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
                            }
                            this.updateNav();
                        },
                        unhighlight() {
                            App.state.ui.highlightedElements = [];
                            App.state.ui.currentHighlightIndex = -1;
                            App.elements.contentArea.querySelectorAll('mark.highlight').forEach(el => { el.outerHTML = el.innerHTML; });
                            this.updateNav();
                        },
                    },
                },
                
                // -------------------------------------------------------------------------
                // 8. コンポーネント (Components)
                // -------------------------------------------------------------------------
                components: {
                    stopwatch: {
                        bindEventListeners() { App.elements.stopwatch.addEventListener('click', e => this.handleClick(e)); },
                        handleClick(e) {
                            e.preventDefault();
                            const s = App.state.stopwatch;
                            s.clickCount++;
                            if (s.clickTimer) clearTimeout(s.clickTimer);
                            s.clickTimer = setTimeout(() => {
                                if (s.clickCount === 1) this.toggle();
                                s.clickCount = 0;
                            }, App.config.stopwatchClickDelay);
                            if (s.clickCount === 3) {
                                clearTimeout(s.clickTimer);
                                this.reset();
                                s.clickCount = 0;
                            }
                        },
                        toggle() {
                            const s = App.state.stopwatch;
                            if (s.isRunning) {
                                clearInterval(s.interval);
                                App.elements.stopwatch.classList.remove('running');
                            } else {
                                s.interval = setInterval(() => this.update(), 1000);
                                App.elements.stopwatch.classList.add('running');
                            }
                            s.isRunning = !s.isRunning;
                        },
                        update() {
                            App.state.stopwatch.elapsedSeconds++;
                            const time = App.state.stopwatch.elapsedSeconds;
                            const mins = Math.floor(time / 60).toString().padStart(2, '0');
                            const secs = (time % 60).toString().padStart(2, '0');
                            App.elements.stopwatch.textContent = `${mins}:${secs}`;
                        },
                        reset() {
                            const s = App.state.stopwatch;
                            clearInterval(s.interval);
                            s.isRunning = false;
                            s.elapsedSeconds = 0;
                            App.elements.stopwatch.textContent = "00:00";
                            App.elements.stopwatch.classList.remove('running');
                        },
                    },

                    // 各モーダルやUI部品のロジックをここに集約
                    searchHistory: {
                        init() { /* ... */ },
                        getKey() { return `paramedic_app_search_history_${App.config.appId}`; },
                        get() { return JSON.parse(localStorage.getItem(this.getKey())) || []; },
                        save(term) {
                            if (!term) return;
                            let history = this.get();
                            history = history.filter(item => item !== term);
                            history.unshift(term);
                            if (history.length > App.config.maxHistoryItems) history.pop();
                            localStorage.setItem(this.getKey(), JSON.stringify(history));
                        },
                        clear() {
                            localStorage.removeItem(this.getKey());
                            this.render();
                        },
                        render() {
                            const { searchHistoryDropdown } = App.elements;
                            const history = this.get();
                            searchHistoryDropdown.innerHTML = '';
                            if (history.length === 0) {
                                searchHistoryDropdown.innerHTML = '<div class="p-3 text-sm text-gray-500 text-center">検索履歴はありません。</div>';
                                return;
                            }
                            const list = document.createElement('ul');
                            history.forEach(term => {
                                const item = document.createElement('li');
                                item.className = 'px-4 py-2 hover:bg-gray-700 cursor-pointer text-gray-200';
                                item.textContent = term;
                                item.addEventListener('click', () => { App.elements.searchInput.value = term; App.handlers.handleSearch(); App.utils.hide(searchHistoryDropdown); });
                                list.appendChild(item);
                            });
                            searchHistoryDropdown.appendChild(list);
                            const footer = document.createElement('div');
                            footer.className = 'p-2 border-t border-gray-700 text-center';
                            const clearButton = App.utils.createButton('履歴を消去', 'text-sm text-red-500 hover:text-red-400', e => { e.stopPropagation(); this.clear(); });
                            footer.appendChild(clearButton);
                            searchHistoryDropdown.appendChild(footer);
                        },
                        toggleDropdown() {
                             if(App.elements.searchHistoryDropdown.classList.contains('hidden')) {
                                this.render();
                                App.utils.show(App.elements.searchHistoryDropdown);
                             } else {
                                App.utils.hide(App.elements.searchHistoryDropdown);
                             }
                        }
                    },
                    
                    settings: { /* ... */ },
                    dataModal: { /* ... */ },
                    vitalsModal: { /* ... */ },
                    dobModal: { /* ... */ },
                    compareModal: { /* ... */ },
                    pupilSelector: { /* ... */ },
                },
                
                // -------------------------------------------------------------------------
                // 9. ユーティリティ (Utilities)
                // -------------------------------------------------------------------------
                utils: {
                    initFirebaseConfig() {
                        if (typeof __firebase_config !== 'undefined' && __firebase_config) {
                            App.config.firebaseConfig = JSON.parse(__firebase_config);
                        } else {
                            console.warn("Firebase config not found globally. Using fallback local config.");
                             App.config.firebaseConfig = {
                                apiKey: "AIzaSyC6umJXFGulRAkwdhx-Hoj1_5DbEbSdBOQ",
                                authDomain: "paramedic-app-df696.firebaseapp.com",
                                projectId: "paramedic-app-df696",
                                storageBucket: "paramedic-app-df696.firebasestorage.app",
                                messagingSenderId: "950566286423",
                                appId: "1:950566286423:web:8086a8eb31b63008465f12",
                                measurementId: "G-GHKF63GY9X"
                            };
                        }
                        App.config.appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
                    },
                    show(el) { el.classList.remove('hidden'); },
                    hide(el) { el.classList.add('hidden'); },
                    showModal(el) { el.classList.remove('hidden'); },
                    hideModal(el) { el.classList.add('hidden'); },
                    createButton(html, classes, onClick) {
                        const btn = document.createElement('button');
                        btn.innerHTML = html;
                        btn.className = classes;
                        btn.onclick = onClick;
                        return btn;
                    },
                    customAlert(message, title = '情報') {
                        return new Promise((resolve) => {
                            const { confirmModal, confirmTitle, confirmMessage, alertIcon, confirmButtons } = App.elements;
                            confirmTitle.textContent = title;
                            confirmMessage.textContent = message;
                            alertIcon.innerHTML = `<i class="fas fa-info-circle text-blue-400 text-2xl"></i>`;
                            confirmButtons.innerHTML = `<button id="alert-ok-btn" class="w-full inline-flex justify-center rounded-md border border-transparent shadow-sm px-4 py-2 bg-blue-600 text-base font-medium text-white hover:bg-blue-700 focus:outline-none sm:ml-3 sm:w-auto sm:text-sm">OK</button>`;
                            this.showModal(confirmModal);
                            document.getElementById('alert-ok-btn').onclick = () => { this.hideModal(confirmModal); resolve(true); };
                        });
                    },
                    customConfirm(message, title = '確認') {
                        return new Promise((resolve) => {
                            const { confirmModal, confirmTitle, confirmMessage, alertIcon, confirmButtons } = App.elements;
                            confirmTitle.textContent = title;
                            confirmMessage.textContent = message;
                            alertIcon.innerHTML = `<i class="fas fa-exclamation-triangle text-yellow-400 text-2xl"></i>`;
                            confirmButtons.innerHTML = `
                                <button id="confirm-cancel-btn" class="mt-3 w-full inline-flex justify-center rounded-md border border-gray-500 shadow-sm px-4 py-2 bg-gray-600 text-base font-medium text-white hover:bg-gray-500 focus:outline-none sm:mt-0 sm:w-auto sm:text-sm">キャンセル</button>
                                <button id="confirm-ok-btn" class="w-full inline-flex justify-center rounded-md border border-transparent shadow-sm px-4 py-2 bg-red-600 text-base font-medium text-white hover:bg-red-700 focus:outline-none sm:ml-3 sm:w-auto sm:text-sm">実行</button>`;
                            this.showModal(confirmModal);
                            document.getElementById('confirm-ok-btn').onclick = () => { this.hideModal(confirmModal); resolve(true); };
                            document.getElementById('confirm-cancel-btn').onclick = () => { this.hideModal(confirmModal); resolve(false); };
                        });
                    }
                }
            };

            // アプリケーションの実行開始
            App.init();
        });
    </script>
</body>
