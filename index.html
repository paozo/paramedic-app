<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>救急隊員向け臨床推論サポートアプリ</title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1f2937">
    
    <!-- iOS PWA Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="救急推論">
    <link rel="apple-touch-icon" href="icon-192.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1f2937; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #6b7280; }
        .content-card { transition: all 0.3s ease-in-out; transform-origin: top; }
        .modal { transition: opacity 0.3s ease, transform 0.3s ease; }
        .modal.hidden { opacity: 0; transform: scale(0.95); pointer-events: none; }
        
        .highlight {
            background-color: yellow;
            color: #1f2937;
            padding: 0 2px;
            border-radius: 2px;
        }
        .current-highlight {
            outline: 2px solid #f97316;
            scroll-margin-top: 150px;
        }
        .search-nav-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .item-checkbox {
            transform: scale(1.2);
            margin-right: 12px;
            accent-color: #3b82f6;
        }
        .keyword-tag, .content-keyword-tag {
            cursor: pointer;
        }
        .keyword-tag.active {
            background-color: yellow;
            color: #1f2937;
            font-weight: bold;
        }
        .nav-item {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        /* AND/OR Toggle Switch */
        #logic-switch-container {
            position: relative;
            display: inline-flex;
            background-color: #374151; /* gray-700 */
            border-radius: 9999px;
            padding: 2px;
            cursor: pointer;
        }
        .switch-label {
            padding: 2px 10px;
            font-size: 0.75rem;
            line-height: 1rem;
            font-weight: 500;
            color: #d1d5db; /* gray-300 */
            transition: color 0.2s ease-in-out;
            z-index: 10;
        }
        .switch-label.active-logic {
            color: #111827; /* gray-900 */
        }
        #switch-bg {
            position: absolute;
            top: 2px;
            bottom: 2px;
            left: 2px;
            width: calc(50% - 2px);
            background-color: #fBBF24; /* amber-400 */
            border-radius: 9999px;
            transition: transform 0.2s ease-in-out;
        }
        #logic-switch-container[data-mode="AND"] #switch-bg {
            transform: translateX(100%);
        }
        .favorite-btn .fa-star, .favorite-disease-btn .fa-star {
            transition: color 0.2s ease-in-out, transform 0.2s ease-in-out;
        }
        #filter-favorites-btn.active {
            color: #fBBF24; /* amber-400 */
            background-color: #374151; /* gray-700 */
        }
         #stopwatch {
            transition: background-color 0.2s ease-in-out;
        }
        #stopwatch.running {
             background-color: #166534; /* green-800 */
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-100">

    <div id="app" class="flex h-screen overflow-hidden">
        <nav id="jump-nav" class="w-24 bg-gray-800 p-2 overflow-y-auto hidden md:block"></nav>

        <main class="flex-1 flex flex-col">
            <header class="bg-gray-800/50 backdrop-blur-sm p-4 sticky top-0 z-20 shadow-lg">
                <div class="flex items-center flex-wrap gap-2 md:gap-4 mb-3">
                    <div id="stopwatch" class="bg-gray-700 text-white font-mono text-xl p-2 rounded-lg cursor-pointer" title="クリック: スタート/ストップ | 長押し: リセット">
                        00:00
                    </div>
                    <div class="flex-grow flex items-center bg-gray-700 rounded-lg relative">

                        </div>
                    </div>
                     <div class="flex items-center space-x-2">

                             <button id="search-next-btn" class="search-nav-btn text-white hover:bg-gray-600 p-1 rounded-md" disabled title="次のハイライトへ"><i class="fas fa-arrow-down"></i></button>
                        </div>
                         <button id="filter-favorites-btn" class="bg-gray-600 hover:bg-gray-500 text-white font-bold py-2 px-3 rounded-lg flex-shrink-0" title="お気に入りフィルター">
                            <i class="fas fa-star"></i>
                        </button>
                        <button id="add-new-btn" class="bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-3 rounded-lg flex-shrink-0">
                            <i class="fas fa-plus"></i> <span class="hidden lg:inline">新規</span>
                        </button>
                        <button id="settings-btn" class="bg-gray-600 hover:bg-gray-500 text-white font-bold py-2 px-3 rounded-lg flex-shrink-0" title="データ管理">
                            <i class="fas fa-cog"></i>
                        </button>
                    </div>
                </div>
                <div id="selected-keywords-area" class="flex flex-wrap gap-2 items-center mt-3 min-h-[30px]">
                </div>
            </header>

            <div id="content-area" class="flex-1 overflow-y-auto p-4">
                 <div id="loading" class="text-center p-8">
                    <i class="fas fa-spinner fa-spin text-4xl text-blue-500"></i>
                    <p class="mt-4 text-gray-400">データを読み込んでいます...</p>
                </div>
            </div>
            <footer class="bg-gray-800 p-2 text-center text-xs text-gray-500">
                UserID: <span id="user-id-display">未ログイン</span>
            </footer>
        </main>
    </div>

    <!-- Modals -->
    <div id="data-modal" class="modal hidden fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center z-50 p-4">
        <div class="bg-gray-800 rounded-2xl shadow-xl w-full max-w-2xl max-h-full overflow-y-auto">

                    <label for="chiefComplaint" class="block text-gray-300 text-sm font-bold mb-2">主訴</label>

                </div>

                    <label for="description" class="block text-gray-300 text-sm font-bold mb-2">説明</label>
                    <textarea id="description" rows="2" class="w-full bg-gray-700 text-white rounded-lg py-2 px-3 focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
                </div>
                 <div class="mb-6">
                    <label for="chiefComplaintMemo" class="block text-gray-300 text-sm font-bold mb-2">個人メモ (主訴全体)</label>
                    <textarea id="chiefComplaintMemo" rows="2" class="w-full bg-gray-700 text-white rounded-lg py-2 px-3 focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
                </div>
                <div id="diseases-container"></div>
                <button type="button" id="add-disease-btn" class="mt-2 bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg"><i class="fas fa-plus"></i> 疾患を追加</button>
                <div class="mt-8 flex justify-end space-x-4">
                    <button type="button" id="modal-close-btn" class="bg-gray-600 hover:bg-gray-700 text-white font-bold py-2 px-4 rounded-lg">キャンセル</button>
                    <button type="button" id="delete-btn" class="bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-4 rounded-lg hidden">削除</button>
                    <button type="submit" class="bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-4 rounded-lg">保存</button>
                </div>
            </form>
        </div>
    </div>
    <div id="confirm-modal" class="modal hidden fixed inset-0 bg-black bg-opacity-80 flex items-center justify-center z-50 p-4">
        <div class="bg-gray-800 rounded-lg shadow-xl w-full max-w-md">
            <div class="p-6 text-center">
                <div id="alert-icon" class="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-gray-700 mb-4"></div>
                <h3 id="confirm-title" class="text-lg font-medium leading-6 text-white"></h3>
                <div class="mt-2"><p id="confirm-message" class="text-sm text-gray-400"></p></div>
            </div>
            <div id="confirm-buttons" class="bg-gray-700/50 px-4 py-3 sm:px-6 flex justify-end space-x-3"></div>
        </div>
    </div>
    <div id="settings-modal" class="modal hidden fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center z-50 p-4">
        <div class="bg-gray-800 rounded-2xl shadow-xl w-full max-w-lg">
            <div class="p-6">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-bold text-white">データ管理</h2>
                    <button id="settings-modal-close-btn" class="text-gray-400 hover:text-white text-2xl">&times;</button>
                </div>
                <div class="space-y-4">
                    <div>
                        <h3 class="text-lg font-semibold text-teal-400 mb-2">エクスポート</h3>
                        <p class="text-sm text-gray-400 mb-3">現在の全データをバックアップとしてJSONファイルに保存します。</p>
                        <button id="export-data-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg"><i class="fas fa-download mr-2"></i>データをエクスポート</button>
                    </div>
                    <div class="border-t border-gray-700 my-4"></div>
                    <div>
                        <h3 class="text-lg font-semibold text-red-400 mb-2">インポート</h3>
                        <p class="text-sm text-gray-400 mb-3"><strong class="text-red-500">注意：現在のデータはすべて上書きされます。</strong></p>
                        <button id="import-data-btn" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-4 rounded-lg"><i class="fas fa-upload mr-2"></i>データをインポート</button>
                        <input type="file" id="import-file-input" class="hidden" accept="application/json">
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div id="compare-modal" class="modal hidden fixed inset-0 bg-black bg-opacity-80 flex items-center justify-center z-50 p-4">
        <div class="bg-gray-900 rounded-2xl shadow-xl w-full max-w-6xl max-h-[90vh] flex flex-col">
            <div class="p-4 border-b border-gray-700 flex justify-between items-center">
                <h2 class="text-2xl font-bold text-white">鑑別診断の比較</h2>
                <button id="compare-modal-close-btn" class="text-gray-400 hover:text-white text-2xl">&times;</button>
            </div>
            <div id="compare-content-area" class="flex-grow p-4 overflow-auto flex space-x-4">
            </div>
        </div>
    </div>

    <script>
      // Register Service Worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js').then(registration => {
            console.log('ServiceWorker registration successful with scope: ', registration.scope);
          }).catch(err => {
            console.log('ServiceWorker registration failed: ', err);
          });
        });
      }
    </script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, addDoc, setDoc, deleteDoc, getDocs, writeBatch, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // --- Firebase Config and Initial Data ---
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : { apiKey: "YOUR_API_KEY", authDomain: "YOUR_AUTH_DOMAIN", projectId: "YOUR_PROJECT_ID", storageBucket: "YOUR_STORAGE_BUCKET", messagingSenderId: "YOUR_SENDER_ID", appId: "YOUR_APP_ID" };
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-paramedic-app';
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        let userId = null;
        let dataStore = [];
        const collectionName = 'clinical_cases';
        let dataCollectionRef;
        const initialData = [ { chiefComplaint: "気分不良", description: "身体的な不調や精神的な落ち込みなど、主観的な不快感全般。", memo: "", isFavorite: false, diseases: [ { name: "脳血管障害", description: "脳の血管が詰まったり破れたりすることで脳細胞が障害される病気。", memo: "", isFavorite: false, keywords: ["突然の片麻痺", "顔面神経麻痺", "言語障害", "意識障害", "激しい頭痛", "嘔吐", "めまい"], pitfalls: ["非典型症状（高齢者、後方循環系）", "頭痛軽微なくも膜下出血の見逃し", "TIAの見過ごし"] }, { name: "急性冠症候群", description: "心臓の血管が急に詰まり、心筋に血液が供給されなくなる危険な状態。", memo: "", isFavorite: false, keywords: ["胸痛", "放散痛", "冷や汗", "呼吸困難", "吐き気"], pitfalls: ["非典型的な胸痛（糖尿病患者、高齢者）", "心電図変化がない場合の見逃し", "消化器症状との誤認"] }, { name: "低血糖", description: "血糖値が異常に低くなることで様々な症状を引き起こす状態。", memo: "", isFavorite: false, keywords: ["冷や汗", "動悸", "意識障害", "痙攣", "空腹感"], pitfalls: ["高齢者の非典型的症状", "インスリン・経口血糖降下薬の使用歴確認漏れ", "アルコール摂取後の低血糖"] } ] }, { chiefComplaint: "呼吸困難", description: "息が苦しい、息切れがする、十分に息が吸えないといった主観的な感覚。", memo: "", isFavorite: false, diseases: [ { name: "心不全", description: "心臓のポンプ機能が低下し、全身に必要な血液を送れなくなった状態。", memo: "", isFavorite: false, keywords: ["起坐呼吸", "発作性夜間呼吸困難", "下腿浮腫", "頸静脈怒張", "ピンク色泡沫状痰"], pitfalls: ["喘息との鑑別困難", "右心不全のみの場合の呼吸困難感の欠如", "腎不全との合併"] }, { name: "気管支喘息", description: "気道が慢性的に炎症を起こし、様々な刺激で狭くなる病気。", memo: "", isFavorite: false, keywords: ["喘鳴", "呼気性呼吸困難", "夜間・早朝の増悪", "アトピー素因"], pitfalls: ["心臓喘息との鑑別", "重積発作時の喘鳴減弱（silent chest）", "アナフィラキシーの初期症状"] } ] } ];
        
        // --- DOM Elements ---
        const contentArea = document.getElementById('content-area');
        const jumpNav = document.getElementById('jump-nav');
        const searchInput = document.getElementById('search-input');
        const searchExecBtn = document.getElementById('search-exec-btn');
        const searchClearBtn = document.getElementById('search-clear-btn');
        const searchHistoryBtn = document.getElementById('search-history-btn');
        const searchHistoryDropdown = document.getElementById('search-history-dropdown');
        const searchCount = document.getElementById('search-count');
        const searchPrevBtn = document.getElementById('search-prev-btn');
        const searchNextBtn = document.getElementById('search-next-btn');
        const selectedKeywordsArea = document.getElementById('selected-keywords-area');
        const settingsBtn = document.getElementById('settings-btn');
        const settingsModal = document.getElementById('settings-modal');
        const settingsModalCloseBtn = document.getElementById('settings-modal-close-btn');
        const exportDataBtn = document.getElementById('export-data-btn');
        const importDataBtn = document.getElementById('import-data-btn');
        const importFileInput = document.getElementById('import-file-input');
        const filterFavoritesBtn = document.getElementById('filter-favorites-btn');
        const compareModal = document.getElementById('compare-modal');
        const compareModalCloseBtn = document.getElementById('compare-modal-close-btn');
        const compareContentArea = document.getElementById('compare-content-area');
        const stopwatchEl = document.getElementById('stopwatch');
        
        // --- State Variables ---
        let selectedItems = new Set();
        let highlightedElements = [];
        let currentHighlightIndex = -1;
        let activeKeywordFilters = new Set();
        let keywordFilterMode = 'OR'; // 'OR' or 'AND'
        let isFavoritesFilterActive = false;
        let timerInterval = null;
        let timerRunning = false;
        let elapsedSeconds = 0;
        let longPressTimer = null;
        const MAX_HISTORY_ITEMS = 15;
        const HISTORY_STORAGE_KEY = `paramedic_app_search_history_${appId}`;

        // --- Auth & Data Loading ---
        onAuthStateChanged(auth, async (user) => { if (user) { userId = user.uid; document.getElementById('user-id-display').textContent = userId; dataCollectionRef = collection(db, 'artifacts', appId, 'users', userId, collectionName); setupSnapshotListener(); } else { document.getElementById('user-id-display').textContent = "匿名ログイン中..."; } });
        async function signIn() { try { if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) { await signInWithCustomToken(auth, __initial_auth_token); } else { await signInAnonymously(auth); } } catch (error) { console.error("Authentication failed:", error); const loadingEl = document.getElementById('loading'); if (loadingEl) { loadingEl.innerHTML = '<p class="text-red-500">Authentication Failed.</p>'; } } }
        function setupSnapshotListener() { onSnapshot(dataCollectionRef, (snapshot) => { if (snapshot.empty) { seedInitialData(); return; } const serverData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })); dataStore = serverData; const loadingEl = document.getElementById('loading'); if (loadingEl) { loadingEl.style.display = 'none'; } render(); renderSelectedKeywords(); }, (error) => { console.error("Error fetching data:", error); const loadingEl = document.getElementById('loading'); if (loadingEl) { loadingEl.innerHTML = '<p class="text-red-500">Data loading failed.</p>'; } }); }
        async function seedInitialData() { try { for (const item of initialData) { await addDoc(dataCollectionRef, item); } } catch (error) { console.error("Error seeding data:", error); } }

        // --- Rendering ---
        function render() {
            unhighlight();
            const searchTerm = searchInput.value.trim();
            let dataToRender;
            let termToHighlight;

            let processedData = [...dataStore];

            if (isFavoritesFilterActive) {
                processedData = processedData.map(entry => {
                    const favoriteDiseases = entry.diseases.filter(d => d.isFavorite);
                    if (entry.isFavorite) {
                        return entry;
                    }
                    if (favoriteDiseases.length > 0) {
                        return { ...entry, diseases: favoriteDiseases };
                    }
                    return null;
                }).filter(Boolean);
            }

            processedData.sort((a, b) => {
                if (a.isFavorite && !b.isFavorite) return -1;
                if (!a.isFavorite && b.isFavorite) return 1;
                return a.chiefComplaint.localeCompare(b.chiefComplaint, 'ja');
            });

            if (activeKeywordFilters.size > 0) {
                const filters = Array.from(activeKeywordFilters);
                dataToRender = processedData.map(entry => {
                    const matchingDiseases = entry.diseases.filter(d => {
                        if (keywordFilterMode === 'OR') {
                            return filters.some(filter => d.keywords.includes(filter));
                        } else { // AND
                            return filters.every(filter => d.keywords.includes(filter));
                        }
                    });
                    if (matchingDiseases.length > 0) {
                        return { ...entry, diseases: matchingDiseases };
                    }
                    return null;
                }).filter(Boolean);
                termToHighlight = filters;
            } else if (searchTerm) {
                const regex = new RegExp(searchTerm.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'i');
                dataToRender = processedData.filter(entry => 
                    regex.test(entry.chiefComplaint) || 
                    entry.diseases.some(d => regex.test(d.name) || d.keywords.some(k => regex.test(k)) || d.pitfalls.some(p => regex.test(p)))
                );
                termToHighlight = [searchTerm];
            } else {
                dataToRender = processedData;
                termToHighlight = [];
            }

            contentArea.innerHTML = '';
            jumpNav.innerHTML = '';

            if(dataToRender.length === 0){
                contentArea.innerHTML = `<div class="text-center p-8 text-gray-400"><i class="fas fa-search-minus fa-3x mb-4"></i><p>該当するデータが見つかりませんでした。</p></div>`;
            } else {
                 dataToRender.forEach((entry, index) => {
                    const complaintId = `complaint-${entry.id}`;
                    const navItem = document.createElement('a');
                    navItem.href = `#${complaintId}`;
                    navItem.className = 'nav-item block text-center text-gray-300 hover:bg-blue-600 hover:text-white font-bold py-3 px-1 rounded-lg transition-colors text-sm flex items-center';
                    const starIcon = entry.isFavorite ? `<i class="fas fa-star text-yellow-400 mr-2"></i>` : '';
                    navItem.innerHTML = `${starIcon}${(index + 1).toString().padStart(2, '0')}. ${entry.chiefComplaint.substring(0, 4)}`;
                    navItem.title = entry.chiefComplaint;
                    navItem.onclick = (e) => { e.preventDefault(); document.getElementById(complaintId)?.scrollIntoView({ behavior: 'smooth' }); };
                    jumpNav.appendChild(navItem);

                    const isComplaintChecked = selectedItems.has(`c_${entry.id}`);
                    const entryDiv = document.createElement('div');
                    entryDiv.className = 'content-card mb-6 bg-gray-800 rounded-xl shadow-md p-5';
                    entryDiv.id = complaintId;

        function renderSelectedKeywords() {
            selectedKeywordsArea.innerHTML = '';
            const keywords = new Set();
            
            if (selectedItems.size === 0) {
                dataStore.forEach(entry => entry.diseases.forEach(d => d.keywords.forEach(k => keywords.add(k))));
            } else {
                selectedItems.forEach(itemId => {
                    const parts = itemId.split('_'); const type = parts[0]; const entryId = parts[1];
                    const entry = dataStore.find(e => e.id === entryId); if (!entry) return;
                    if (type === 'c') { entry.diseases.forEach(d => d.keywords.forEach(k => keywords.add(k))); } 
                    else if (type === 'd') { const diseaseName = parts.slice(2).join(' ').replace(/_/g, ' '); const disease = entry.diseases.find(d => d.name === diseaseName); if (disease) { disease.keywords.forEach(k => keywords.add(k)); } }
                });
            }
            
            [...keywords].sort((a,b) => a.localeCompare(b, 'ja')).forEach(keyword => { 
                const tag = document.createElement('span'); 
                tag.className = 'keyword-tag bg-gray-700 hover:bg-gray-600 text-sm py-1 px-3 rounded-full transition-colors'; 
                if (activeKeywordFilters.has(keyword)) {
                    tag.classList.add('active');
                }
                tag.textContent = keyword; 
                tag.onclick = () => handleKeywordTagClick(keyword);
                selectedKeywordsArea.appendChild(tag); 
            });

            const controlsContainer = document.createElement('div');
            controlsContainer.className = "ml-4 flex items-center space-x-3";
            selectedKeywordsArea.appendChild(controlsContainer);
            
            if (activeKeywordFilters.size > 0) {
                if (activeKeywordFilters.size > 1) {
                    const switchContainer = document.createElement('div');
                    switchContainer.id = 'logic-switch-container';
                    switchContainer.dataset.mode = keywordFilterMode;
                    switchContainer.title = "検索ロジックを切り替え";
                    switchContainer.innerHTML = `<div id="switch-bg"></div><span class="switch-label ${keywordFilterMode === 'OR' ? 'active-logic' : ''}">OR</span><span class="switch-label ${keywordFilterMode === 'AND' ? 'active-logic' : ''}">AND</span>`;
                    switchContainer.onclick = toggleLogicMode;
                    controlsContainer.appendChild(switchContainer);
                }
                
                const clearBtn = document.createElement('button');
                clearBtn.className = "text-sm text-red-500 hover:text-red-400 flex items-center";
                clearBtn.innerHTML = `<i class="fas fa-times-circle mr-1"></i> フィルター解除`;
                clearBtn.onclick = clearKeywordFilter;
                controlsContainer.appendChild(clearBtn);
            }
            
            let diseaseCount = 0;
            selectedItems.forEach(itemId => {
                if(itemId.startsWith('d_')) diseaseCount++;
            });

            if (diseaseCount >= 2) {
                const compareBtn = document.createElement('button');
                compareBtn.id = 'compare-btn';
                compareBtn.className = 'ml-auto text-sm bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-1 px-3 rounded-lg flex items-center';
                compareBtn.innerHTML = `<i class="fas fa-exchange-alt mr-2"></i>選択した疾患を比較`;
                compareBtn.onclick = renderComparison;
                controlsContainer.appendChild(compareBtn);
            }

            if(selectedItems.size > 0){
                const clearSelectionBtn = document.createElement('button');
                clearSelectionBtn.id = 'clear-selection-btn';
                clearSelectionBtn.className = 'ml-auto text-sm bg-gray-500 hover:bg-gray-600 text-white font-bold py-1 px-3 rounded-lg flex items-center';
                clearSelectionBtn.innerHTML = `<i class="fas fa-times mr-2"></i>選択をすべて解除`;
                clearSelectionBtn.onclick = clearAllSelections;
                controlsContainer.appendChild(clearSelectionBtn);
            }
        }
        
        function handleCheckboxChange(e) {
            const checkbox = e.target; if (!checkbox.classList.contains('item-checkbox')) return;
            const { type, id, name } = checkbox.dataset; const uniqueId = type === 'complaint' ? `c_${id}` : `d_${id}_${name.replace(/\s/g, '_')}`;
            if (checkbox.checked) { selectedItems.add(uniqueId); } else { selectedItems.delete(uniqueId); }
            renderSelectedKeywords();
        }

        function clearAllSelections() {
            selectedItems.clear();
            render();
            renderSelectedKeywords();
        }

        function handleKeywordTagClick(keyword) {
            if (activeKeywordFilters.has(keyword)) {
                activeKeywordFilters.delete(keyword);
            } else {
                activeKeywordFilters.add(keyword);
            }

            if (activeKeywordFilters.size === 0) {
                clearKeywordFilter();
            } else {
                searchInput.value = '';
                render(); 
                renderSelectedKeywords();
            }
        }

        async function handleFavoriteClick(id) {
            const entryIndex = dataStore.findIndex(e => e.id === id);
            if (entryIndex === -1) return;
            
            const originalStatus = dataStore[entryIndex].isFavorite;
            const newFavoriteStatus = !originalStatus;

            dataStore[entryIndex].isFavorite = newFavoriteStatus;
            render(); 

            try {
                const docRef = doc(dataCollectionRef, id);
                await updateDoc(docRef, { isFavorite: newFavoriteStatus });
            } catch (error) {
                console.error("Error updating favorite status:", error);
                dataStore[entryIndex].isFavorite = originalStatus;
                render();
                await customAlert("お気に入り状態の更新に失敗しました。");
            }
        }

        async function handleDiseaseFavoriteClick(complaintId, diseaseName) {
            const entryIndex = dataStore.findIndex(e => e.id === complaintId);
            if (entryIndex === -1) return;

            const originalEntry = JSON.parse(JSON.stringify(dataStore[entryIndex]));
            const diseaseIndex = originalEntry.diseases.findIndex(d => d.name === diseaseName);
            if (diseaseIndex === -1) return;

            const newFavoriteStatus = !originalEntry.diseases[diseaseIndex].isFavorite;
            
            dataStore[entryIndex].diseases[diseaseIndex].isFavorite = newFavoriteStatus;
            render();
            
            try {
                const docRef = doc(dataCollectionRef, complaintId);
                await updateDoc(docRef, { diseases: dataStore[entryIndex].diseases });
            } catch (error) {
                 console.error("Error updating disease favorite status:", error);
                 dataStore[entryIndex] = originalEntry;
                 render();
                 await customAlert("お気に入り状態の更新に失敗しました。");
            }
        }

        function toggleLogicMode() {
            keywordFilterMode = keywordFilterMode === 'OR' ? 'AND' : 'OR';
            render();
            renderSelectedKeywords();
        }

        function clearKeywordFilter() {
            activeKeywordFilters.clear();
            keywordFilterMode = 'OR';
            render();
            renderSelectedKeywords();
        }

        function performSearch() { 
            clearKeywordFilter();
            const term = searchInput.value.trim(); 
            saveSearchTerm(term); 
            render(); 
        }

        function renderComparison() {
            compareContentArea.innerHTML = '';
            const selectedDiseases = [];
            selectedItems.forEach(itemId => {
                if (itemId.startsWith('d_')) {
                    const parts = itemId.split('_');
                    const entryId = parts[1];
                    const diseaseName = parts.slice(2).join(' ').replace(/_/g, ' ');
                    const entry = dataStore.find(e => e.id === entryId);
                    if(entry) {
                        const disease = entry.diseases.find(d => d.name === diseaseName);
                        if (disease) {
                            selectedDiseases.push(disease);
                        }
                    }
                }
            });

            selectedDiseases.forEach(disease => {

                const pitfallsHTML = disease.pitfalls.map(p => `<li>${p}</li>`).join('') || '<li>なし</li>';
                
                column.innerHTML = `

                    <ul class="list-disc list-inside text-sm space-y-1 mb-4 text-gray-300">
                        ${keywordsHTML}
                    </ul>
                    <h4 class="font-bold text-md text-red-400 mb-2 mt-4">落とし穴</h4>
                    <ul class="list-disc list-inside text-sm space-y-1 text-gray-300">
                        ${pitfallsHTML}
                    </ul>
                `;
                compareContentArea.appendChild(column);
            });

            compareModal.classList.remove('hidden');
        }


        function unhighlight() { contentArea.querySelectorAll('mark.highlight').forEach(el => { el.outerHTML = el.innerHTML; }); highlightedElements = []; currentHighlightIndex = -1; }
        function updateSearchNav() { const count = highlightedElements.length; searchCount.textContent = `${count > 0 ? currentHighlightIndex + 1 : 0} / ${count}`; searchPrevBtn.disabled = count === 0; searchNextBtn.disabled = count === 0; }
        function navigateToHighlight(index) { if (index < 0 || index >= highlightedElements.length) return; highlightedElements.forEach(el => el.classList.remove('current-highlight')); const currentEl = highlightedElements[index]; currentEl.classList.add('current-highlight'); currentEl.scrollIntoView({ behavior: 'smooth', block: 'center' }); currentHighlightIndex = index; updateSearchNav(); }

        // --- Search History ---
        function getSearchHistory() { return JSON.parse(localStorage.getItem(HISTORY_STORAGE_KEY)) || []; }
        function saveSearchTerm(term) { if (!term) return; let history = getSearchHistory(); history = history.filter(item => item !== term); history.unshift(term); if (history.length > MAX_HISTORY_ITEMS) { history.pop(); } localStorage.setItem(HISTORY_STORAGE_KEY, JSON.stringify(history)); }
        function clearSearchHistory() { localStorage.removeItem(HISTORY_STORAGE_KEY); renderSearchHistory(); }
        function renderSearchHistory() { const history = getSearchHistory(); searchHistoryDropdown.innerHTML = ''; if (history.length === 0) { searchHistoryDropdown.innerHTML = '<div class="p-3 text-sm text-gray-500 text-center">検索履歴はありません。</div>'; return; } const list = document.createElement('ul'); history.forEach(term => { const item = document.createElement('li'); item.className = 'px-4 py-2 hover:bg-gray-700 cursor-pointer text-gray-200'; item.textContent = term; item.addEventListener('click', () => { searchInput.value = term; performSearch(); searchHistoryDropdown.classList.add('hidden'); }); list.appendChild(item); }); searchHistoryDropdown.appendChild(list); const footer = document.createElement('div'); footer.className = 'p-2 border-t border-gray-700 text-center'; const clearButton = document.createElement('button'); clearButton.className = 'text-sm text-red-500 hover:text-red-400'; clearButton.textContent = '履歴を消去'; clearButton.addEventListener('click', (e) => { e.stopPropagation(); clearSearchHistory(); }); footer.appendChild(clearButton); searchHistoryDropdown.appendChild(footer); }
        function toggleHistoryDropdown() { if (searchHistoryDropdown.classList.contains('hidden')) { renderSearchHistory(); searchHistoryDropdown.classList.remove('hidden'); } else { searchHistoryDropdown.classList.add('hidden'); } }

        // --- Stopwatch ---
        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60).toString().padStart(2, '0');
            const secs = (seconds % 60).toString().padStart(2, '0');
            return `${mins}:${secs}`;
        }
        function updateTimer() {
            elapsedSeconds++;
            stopwatchEl.textContent = formatTime(elapsedSeconds);
        }
        function handleStopwatchClick() {
            if(longPressTimer) clearTimeout(longPressTimer);
            if (timerRunning) {
                clearInterval(timerInterval);
                timerRunning = false;
                stopwatchEl.classList.remove('running');
            } else {
                timerInterval = setInterval(updateTimer, 1000);
                timerRunning = true;
                stopwatchEl.classList.add('running');
            }
        }
        function resetTimer() {
            clearInterval(timerInterval);
            timerRunning = false;
            elapsedSeconds = 0;
            stopwatchEl.textContent = "00:00";
            stopwatchEl.classList.remove('running');
        }

        searchExecBtn.addEventListener('click', performSearch);
        searchInput.addEventListener('keypress', e => { if (e.key === 'Enter') { performSearch(); e.preventDefault(); } });
        searchClearBtn.addEventListener('click', () => { searchInput.value = ''; performSearch(); });
        searchHistoryBtn.addEventListener('click', (e) => { e.stopPropagation(); toggleHistoryDropdown(); });
        document.addEventListener('click', (e) => { if (searchHistoryBtn && !searchHistoryBtn.parentElement.contains(e.target)) { searchHistoryDropdown.classList.add('hidden'); } });
        searchNextBtn.addEventListener('click', () => { if (highlightedElements.length > 0) navigateToHighlight((currentHighlightIndex + 1) % highlightedElements.length); });
        searchPrevBtn.addEventListener('click', () => { if (highlightedElements.length > 0) navigateToHighlight((currentHighlightIndex - 1 + highlightedElements.length) % highlightedElements.length); });
        settingsBtn.addEventListener('click', () => settingsModal.classList.remove('hidden'));
        settingsModalCloseBtn.addEventListener('click', () => settingsModal.classList.add('hidden'));
        exportDataBtn.addEventListener('click', exportDataAsJSON);
        importDataBtn.addEventListener('click', () => importFileInput.click());

            filterFavoritesBtn.classList.toggle('active', isFavoritesFilterActive);
            render();
        });
        compareModalCloseBtn.addEventListener('click', () => compareModal.classList.add('hidden'));
        stopwatchEl.addEventListener('mousedown', () => { longPressTimer = setTimeout(resetTimer, 1000); });
        stopwatchEl.addEventListener('mouseup', () => { clearTimeout(longPressTimer); });
        stopwatchEl.addEventListener('click', handleStopwatchClick);
        
        contentArea.addEventListener('click', (e) => {
            const editBtn = e.target.closest('.edit-btn');
            const favoriteBtn = e.target.closest('.favorite-btn');
            const favoriteDiseaseBtn = e.target.closest('.favorite-disease-btn');
            
            if (editBtn) { handleEdit(editBtn.dataset.id); return; }
            if (favoriteBtn) { handleFavoriteClick(favoriteBtn.dataset.id); return; }
            if (favoriteDiseaseBtn) { handleDiseaseFavoriteClick(favoriteDiseaseBtn.dataset.complaintId, favoriteDiseaseBtn.dataset.diseaseName); return; }
            if (e.target.classList.contains('content-keyword-tag')) { handleKeywordTagClick(e.target.textContent); }
        });
        contentArea.addEventListener('change', handleCheckboxChange);

        // --- Data Management Functions ---
        function exportDataAsJSON() {
            if (dataStore.length === 0) {
                customAlert("エクスポートするデータがありません。", "情報");
                return;
            }
            const dataToExport = dataStore.map(({ id, ...rest }) => rest);
            const jsonString = JSON.stringify(dataToExport, null, 2);
            const blob = new Blob([jsonString], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            const date = new Date();
            const formattedDate = `${date.getFullYear()}-${(date.getMonth() + 1).toString().padStart(2, '0')}-${date.getDate().toString().padStart(2, '0')}`;
            a.download = `paramedic-data-backup-${formattedDate}.json`;
            a.href = url;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            settingsModal.classList.add('hidden');
        }

        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) { return; }
            const reader = new FileReader();
            reader.onload = async (e) => {
                let importedData;
                try {
                    importedData = JSON.parse(e.target.result);
                } catch (error) {
                    await customAlert("無効なJSONファイルです。ファイルが破損しているか、形式が正しくありません。", "エラー");
                    importFileInput.value = ''; return;
                }
                if (!Array.isArray(importedData) || importedData.some(item => typeof item.chiefComplaint !== 'string' || !Array.isArray(item.diseases))) {
                     await customAlert("ファイルのデータ構造が正しくありません。", "エラー");
                     importFileInput.value = ''; return;
                }
                const confirmed = await customConfirm("現在のデータはすべて上書きされます。この操作は元に戻せません。本当に続行しますか？", "データのインポート確認");
                if (confirmed) {
                    await importData(importedData);
                }
                importFileInput.value = '';
            };
            reader.readAsText(file);
        }

        async function importData(newData) {
            settingsModal.classList.add('hidden');
            try {
                const querySnapshot = await getDocs(dataCollectionRef);
                const batch = writeBatch(db);
                querySnapshot.forEach((doc) => {
                    batch.delete(doc.ref);
                });
                newData.forEach(item => {
                    const newDocRef = doc(collection(db, 'artifacts', appId, 'users', userId, collectionName));
                    batch.set(newDocRef, item);
                });
                await batch.commit();
                await customAlert("データのインポートが完了しました。", "成功");
            } catch (error) {
                console.error("Error importing data: ", error);
                await customAlert("データのインポート中にエラーが発生しました。", "エラー");
            }
        }

        function handleEdit(id) {

            descriptionInput.value = entry.description || '';
            chiefComplaintMemoInput.value = entry.memo || '';
            diseasesContainer.innerHTML = '';
            entry.diseases.forEach(addDiseaseForm);
            deleteBtn.classList.remove('hidden');
            modal.classList.remove('hidden');
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = entryIdInput.value;
            
            const existingEntry = id ? dataStore.find(e => e.id === id) : { isFavorite: false, diseases: [] };

            const diseases = Array.from(document.querySelectorAll('.disease-form-group')).map(group => {
                const name = group.querySelector('.disease-name').value.trim();
                const existingDisease = existingEntry.diseases.find(d => d.name === name);
                return {
                    name: name,
                    description: group.querySelector('.disease-description').value.trim(),
                    keywords: group.querySelector('.disease-keywords').value.split(',').map(s => s.trim()).filter(Boolean),
                    pitfalls: group.querySelector('.disease-pitfalls').value.split(',').map(s => s.trim()).filter(Boolean),
                    memo: group.querySelector('.disease-memo').value.trim(),
                    isFavorite: existingDisease ? existingDisease.isFavorite : false
                };
            }).filter(d => d.name);

            const entryData = {
                chiefComplaint: chiefComplaintInput.value.trim(),
                description: descriptionInput.value.trim(),
                memo: chiefComplaintMemoInput.value.trim(),
                diseases: diseases,
                isFavorite: existingEntry.isFavorite,
            };

            try {
                if (id) {
                    await setDoc(doc(dataCollectionRef, id), entryData);
                } else {
                    await addDoc(dataCollectionRef, entryData);
                }
                modal.classList.add('hidden');
            } catch (error) {
                console.error("Error saving data: ", error);
                await customAlert("データの保存に失敗しました。");
            }
        });

        deleteBtn.addEventListener('click', async () => {
            const id = entryIdInput.value;
            const confirmed = await customConfirm('この主訴データを本当に削除しますか？');
            if (id && confirmed) {
                try {
                    await deleteDoc(doc(dataCollectionRef, id));
                    modal.classList.add('hidden');
                } catch (error) {
                    console.error("Error deleting data: ", error);
                    await customAlert("データの削除に失敗しました。");
                }
            }
        });

        const confirmModal = document.getElementById('confirm-modal');
        const confirmTitle = document.getElementById('confirm-title');
        const confirmMessage = document.getElementById('confirm-message');
        const confirmButtons = document.getElementById('confirm-buttons');
        const alertIcon = document.getElementById('alert-icon');

        function customAlert(message, title = '情報') {
            return new Promise((resolve) => {
                confirmTitle.textContent = title;
                confirmMessage.textContent = message;
                alertIcon.innerHTML = `<i class="fas fa-info-circle text-blue-400 text-2xl"></i>`;
                confirmButtons.innerHTML = `<button id="alert-ok-btn" class="w-full inline-flex justify-center rounded-md border border-transparent shadow-sm px-4 py-2 bg-blue-600 text-base font-medium text-white hover:bg-blue-700 focus:outline-none sm:ml-3 sm:w-auto sm:text-sm">OK</button>`;
                confirmModal.classList.remove('hidden');
                document.getElementById('alert-ok-btn').onclick = () => { confirmModal.classList.add('hidden'); resolve(true); };
            });
        }

        function customConfirm(message, title = '確認') {
            return new Promise((resolve) => {
                confirmTitle.textContent = title;
                confirmMessage.textContent = message;
                alertIcon.innerHTML = `<i class="fas fa-exclamation-triangle text-yellow-400 text-2xl"></i>`;
                confirmButtons.innerHTML = `
                    <button id="confirm-cancel-btn" class="mt-3 w-full inline-flex justify-center rounded-md border border-gray-500 shadow-sm px-4 py-2 bg-gray-600 text-base font-medium text-white hover:bg-gray-500 focus:outline-none sm:mt-0 sm:w-auto sm:text-sm">キャンセル</button>
                    <button id="confirm-ok-btn" class="w-full inline-flex justify-center rounded-md border border-transparent shadow-sm px-4 py-2 bg-red-600 text-base font-medium text-white hover:bg-red-700 focus:outline-none sm:ml-3 sm:w-auto sm:text-sm">実行</button>`;
                confirmModal.classList.remove('hidden');
                document.getElementById('confirm-ok-btn').onclick = () => { confirmModal.classList.add('hidden'); resolve(true); };
                document.getElementById('confirm-cancel-btn').onclick = () => { confirmModal.classList.add('hidden'); resolve(false); };
            });
        }
        
        // --- Initialize ---
        signIn();

    </script>
</body>
</html>
