<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>救急隊員向け臨床推論サポートアプリ</title>
    
    <!-- PWA Manifest & Theme Color -->
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#111827">

    <!-- スタイルシートとフォント -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" xintegrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        :root {
            --bg-dark-900: #111827; --bg-dark-800: #1f2937; --bg-dark-700: #374151; --bg-dark-600: #4b5563;
            --text-dark-100: #f3f4f6; --text-dark-200: #e5e7eb; --text-dark-300: #d1d5db; --text-dark-400: #9ca3af;
            --bg-light-100: #f9fafb; --bg-light-200: #f3f4f6; --bg-light-300: #e5e7eb; --bg-light-400: #d1d5db;
            --text-light-900: #111827; --text-light-700: #374151; --text-light-500: #6b7280;
        }
        body.light-mode {
            --bg-main: var(--bg-light-100); --bg-panel: var(--bg-light-200); --bg-header: var(--bg-light-200);
            --bg-card: white; --bg-input: var(--bg-light-300); --bg-btn: var(--bg-light-300);
            --text-main: var(--text-light-900); --text-sub: var(--text-light-700); --text-placeholder: var(--text-light-500);
            --border-color: var(--bg-light-400);
            --scrollbar-track: var(--bg-light-300); --scrollbar-thumb: #a0aec0;
        }
        body.dark-mode {
            --bg-main: var(--bg-dark-900); --bg-panel: var(--bg-dark-800); --bg-header: #1f2937e6;
            --bg-card: var(--bg-dark-800); --bg-input: var(--bg-dark-700); --bg-btn: var(--bg-dark-600);
            --text-main: var(--text-dark-100); --text-sub: var(--text-dark-300); --text-placeholder: var(--text-dark-400);
            --border-color: var(--bg-dark-700);
            --scrollbar-track: var(--bg-dark-800); --scrollbar-thumb: var(--bg-dark-600);
        }

        html.text-sm { --font-size-base: 13px; --font-size-sm: 11px; --font-size-xs: 10px; --font-size-lg: 15px; --font-size-xl: 17px; --font-size-2xl: 19px; }
        html.text-lg { --font-size-base: 16px; --font-size-sm: 14px; --font-size-xs: 13px; --font-size-lg: 18px; --font-size-xl: 20px; --font-size-2xl: 22px; }
        
        body { font-family: 'Inter', 'Noto Sans JP', sans-serif; -webkit-tap-highlight-color: transparent; font-size: var(--font-size-base); background-color: var(--bg-main); color: var(--text-main); }
        h2 { font-size: var(--font-size-xl); } h3 { font-size: var(--font-size-lg); }
        .text-xs { font-size: var(--font-size-xs); } .text-sm { font-size: var(--font-size-sm); }
        
        ::-webkit-scrollbar { width: 8px; } ::-webkit-scrollbar-track { background: var(--scrollbar-track); } ::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 4px; } ::-webkit-scrollbar-thumb:hover { background: #9ca3af; }
        
        .modal { transition: opacity 0.3s ease-in-out, transform 0.3s ease-in-out; }
        .modal.hidden { opacity: 0; transform: scale(0.95); pointer-events: none; }
        
        .highlight { background-color: yellow; color: var(--text-light-900); padding: 0 2px; border-radius: 2px; }
        .current-highlight { outline: 2px solid #f97316; scroll-margin-top: 150px; }
        
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .item-checkbox, .nav-item-checkbox { transform: scale(1.0); margin-right: 8px; accent-color: #3b82f6; }
        
        .keyword-tag, .content-keyword-tag { cursor: pointer; transition: background-color 0.2s ease, color 0.2s ease; background-color: var(--bg-btn); color: var(--text-main);}
        .keyword-tag.active, .content-keyword-tag.active { background-color: yellow !important; color: #1f2937 !important; font-weight: bold; }
        
        .nav-item { color: var(--text-sub); } .nav-item:hover { background-color: #3b82f6; color: white; }
        .nav-item.active-nav { background-color: #2563eb; color: white; }
        
        .bg-panel { background-color: var(--bg-panel); } .bg-header { background-color: var(--bg-header); } .bg-card { background-color: var(--bg-card); }
        .bg-input { background-color: var(--bg-input); } .bg-btn { background-color: var(--bg-btn); }
        .text-main { color: var(--text-main); } .text-sub { color: var(--text-sub); } .placeholder-color::placeholder { color: var(--text-placeholder); }
        .border-color { border-color: var(--border-color); }
        
        .disease-details.collapsed-fully > *:not(:first-child) { display: none; }
        .disease-details.collapsed-partially > *:not(.disease-title-container):not(.keywords-container) { display: none; }

        h3.disease-title { cursor: pointer; }

        .keyword-count { font-size: 0.65rem; padding-left: 4px; opacity: 0.7; }
        .keyword-count-1 { background-color: #facc15 !important; color: #1f2937 !important; } /* yellow-400 */
        .keyword-count-2 { background-color: #4ade80 !important; color: #1f2937 !important; } /* green-400 */
        .keyword-count-3 { background-color: #60a5fa !important; color: #1f2937 !important; } /* blue-400 */
        .keyword-count-4 { background-color: #a78bfa !important; color: #1f2937 !important; } /* purple-400 */
        .keyword-count-5 { background-color: #f87171 !important; color: #1f2937 !important; } /* red-400 */
        
        .learned-mark { color: #3b82f6; } /* blue-500 */
    </style>
</head>
<body class="dark-mode antialiased text-sm">

    <div id="app" class="flex h-screen overflow-hidden">
        <!-- サイドナビゲーション -->
        <nav id="jump-nav" class="bg-panel w-48 p-2 overflow-y-auto flex flex-col fixed top-0 left-0 h-full z-40 transform -translate-x-full transition-transform md:relative md:w-40 md:translate-x-0 shadow-lg">
            <div id="nav-scroll-area" class="flex-1 overflow-y-auto">
                <!-- Nav items will be injected here -->
            </div>
        </nav>
        <div id="sidebar-backdrop" class="hidden fixed inset-0 bg-black bg-opacity-50 z-30 md:hidden"></div>

        <main class="flex-1 flex flex-col">
            <!-- ヘッダー -->
            <header class="bg-header backdrop-blur-sm p-2 md:p-3 sticky top-0 z-20 shadow-lg">
                <div class="flex flex-wrap items-center gap-2">
                    <button id="sidebar-toggle-btn" class="p-2 text-main hover:text-blue-400 flex-shrink-0" aria-label="ナビゲーションを開く"><i class="fas fa-bars fa-lg"></i></button>
                    
                    <div class="flex items-center space-x-2 bg-input p-1 rounded-lg flex-shrink-0">
                        <input type="number" id="age-input" placeholder="年齢" min="0" max="130" class="w-14 bg-input text-main placeholder-color text-center rounded-md p-1 focus:outline-none focus:ring-2 focus:ring-blue-500" aria-label="年齢">
                        <button id="dob-btn" class="p-1 text-main hover:text-blue-400" aria-label="生年月日から年齢を計算"><i class="fas fa-calendar-alt"></i></button>
                        <div class="flex">
                           <button class="gender-btn bg-btn hover:opacity-80 text-main font-bold py-1 px-2 md:px-3 rounded-l-md" data-gender="male">男</button>
                           <button class="gender-btn bg-btn hover:opacity-80 text-main font-bold py-1 px-2 md:px-3 rounded-r-md" data-gender="female">女</button>
                        </div>
                    </div>
                    
                    <input type="text" id="temp-memo" placeholder="一時メモ..." class="flex-grow min-w-[120px] bg-input text-main placeholder-color rounded-lg p-2 focus:outline-none focus:ring-2 focus:ring-blue-500" aria-label="一時メモ">

                    <div class="flex items-center bg-input rounded-lg relative">
                        <input type="text" id="search-input" placeholder="検索..." class="w-24 md:w-32 bg-transparent text-main placeholder-color rounded-l-lg py-2 pl-4 pr-0 focus:outline-none" aria-label="鑑別検索">
                        <button id="search-clear-btn" class="text-sub hover:text-main px-2" title="検索文字のクリア" aria-label="検索文字のクリア"><i class="fas fa-times"></i></button>
                        <div class="flex items-center text-sub">
                             <button id="search-prev-btn" class="hover:text-main disabled:text-gray-600" title="前の検索結果へ"><i class="fas fa-chevron-left"></i></button>
                             <span id="search-count" class="text-xs px-1">0/0</span>
                             <button id="search-next-btn" class="hover:text-main disabled:text-gray-600" title="次の検索結果へ"><i class="fas fa-chevron-right"></i></button>
                        </div>
                        <button id="search-history-btn" class="text-sub hover:text-main px-2" title="検索履歴の表示" aria-label="検索履歴の表示"><i class="fas fa-history"></i></button>
                        <div id="search-history-dropdown" class="hidden absolute top-full left-0 mt-2 w-full bg-panel border border-color rounded-lg shadow-xl z-30"></div>
                    </div>

                    <button id="search-exec-btn" class="bg-blue-600 hover:bg-blue-700 text-white p-2 rounded-lg flex-shrink-0 w-10 h-10 flex items-center justify-center" title="検索実行" aria-label="検索実行"><i class="fas fa-search"></i></button>
                    
                    <div class="flex-grow"></div>
                    
                    <!-- Right-aligned action buttons -->
                    <div id="action-buttons-group" class="flex items-center gap-2">
                        <button id="add-new-btn" class="bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-3 rounded-lg flex-shrink-0" title="新規追加"><i class="fas fa-plus"></i></button>
                        <button id="collapse-all-btn" class="bg-btn hover:opacity-80 text-main font-bold py-2 px-3 rounded-lg flex-shrink-0 hidden" title="全疾患の開閉"><i class="fas fa-compress-alt"></i></button>
                        <button id="filter-favorites-btn" class="bg-btn hover:opacity-80 text-main font-bold py-2 px-3 rounded-lg flex-shrink-0" title="お気に入りフィルター (ダブルタップで選択解除)" aria-label="お気に入りフィルター"><i class="fas fa-star"></i></button>
                        <button id="clear-selections-btn" class="bg-btn hover:opacity-80 text-main font-bold py-2 px-3 rounded-lg flex-shrink-0" title="選択をすべて解除"><i class="fas fa-check-double"></i></button>
                        <button id="settings-btn" class="bg-btn hover:opacity-80 text-main font-bold py-2 px-3 rounded-lg flex-shrink-0" title="設定"><i class="fas fa-cog"></i></button>
                       
                        <div class="h-6 border-l border-gray-600 mx-1"></div>

                        <button id="random-btn" class="bg-purple-600 hover:bg-purple-700 text-white font-bold py-2 px-3 rounded-lg flex-shrink-0 hidden" title="ランダム表示" aria-label="ランダム表示"><i class="fas fa-dice"></i></button>
                        <div id="stopwatch" class="bg-input text-main font-mono text-lg p-2 rounded-lg cursor-pointer flex-shrink-0" title="クリック: スタート/ストップ | 長押し: リセット">00:00</div>
                        <button id="vitals-btn" class="bg-cyan-600 hover:bg-cyan-700 text-white font-bold py-2 px-3 rounded-lg flex-shrink-0" title="バイタル入力" aria-label="バイタル入力モーダルを開く"><i class="fas fa-wave-square"></i></button>
                        <div class="flex items-center space-x-1 bg-input p-1 rounded-lg">
                            <button id="arrival-btn" class="time-btn bg-btn hover:opacity-80 text-main font-bold py-1 px-2 rounded-md" title="現着時刻を記録">着</button>
                            <button id="contact-btn" class="time-btn bg-btn hover:opacity-80 text-main font-bold py-1 px-2 rounded-md" title="接触時刻を記録">接</button>
                            <button id="departure-btn" class="time-btn bg-btn hover:opacity-80 text-main font-bold py-1 px-2 rounded-md" title="出発時刻を記録">出</button>
                        </div>
                        <button id="keywords-panel-toggle-btn" class="bg-btn hover:opacity-80 text-main font-bold py-2 px-3 rounded-lg flex-shrink-0" aria-label="キーワードパネルを開く"><i class="fas fa-tags fa-lg"></i></button>
                    </div>

                </div>
                
                <div id="vitals-summary-container" class="w-full mt-2 hidden">
                     <div class="flex items-start">
                        <div id="vitals-summary-area" class="flex flex-wrap gap-x-4 gap-y-1 items-center flex-grow text-sub bg-card p-2 rounded-lg border border-color"></div>
                         <button id="toggle-vitals-summary-btn" class="ml-2 text-sub hover:text-main p-2 flex-shrink-0" title="バイタル概要の表示切替" aria-label="バイタル概要の表示切替"><i class="fas fa-chevron-up toggle-chevron"></i></button>
                    </div>
                 </div>
            </header>
            <!-- メインコンテンツ -->
            <div id="content-area" class="flex-1 overflow-y-auto p-2 sm:p-4">
                 <div id="loading" class="text-center p-8">
                    <i class="fas fa-spinner fa-spin text-4xl text-blue-500"></i>
                    <p class="mt-4 text-sub">データを読み込んでいます...</p>
                </div>
            </div>
            
            <footer class="bg-panel p-2 text-center text-xs text-sub">
                UserID: <span id="user-id-display">未ログイン</span>
            </footer>
        </main>

        <!-- キーワードパネル -->
        <aside id="keywords-panel-right" class="bg-panel w-64 flex flex-col fixed top-0 right-0 h-full z-40 transform translate-x-full transition-transform shadow-lg">
            <div class="p-4 border-b border-color flex justify-between items-center">
                <h3 class="text-lg font-bold text-main">キーワードフィルター</h3>
                <button id="keywords-panel-close-btn" class="text-sub hover:text-main"><i class="fas fa-times fa-lg"></i></button>
            </div>
            <div id="keywords-panel-content-area" class="flex-1 p-4 space-y-4 overflow-y-auto"></div>
        </aside>
        <div id="keywords-panel-backdrop" class="hidden fixed inset-0 bg-black bg-opacity-50 z-30"></div>
    </div>

    <!-- Modals -->
    <div id="vitals-modal" class="modal hidden fixed inset-0 bg-black bg-opacity-80 flex items-center justify-center z-50 p-4">
        <div class="bg-panel rounded-lg shadow-xl w-full max-w-4xl max-h-[90vh] flex flex-col text-main">
            <header class="p-4 border-b border-color flex justify-between items-center">
                <h2 class="text-xl font-bold text-cyan-400 flex items-center"><i class="fas fa-wave-square mr-3"></i>バイタルサイン入力</h2>
                <button id="vitals-modal-close-btn" class="text-sub hover:text-main"><i class="fas fa-times fa-lg"></i></button>
            </header>
            <main class="p-4 flex-1 overflow-y-auto">
                <form id="vitals-form" class="space-y-6">
                    <div class="bg-main p-4 rounded-lg">
                        <div class="flex justify-between items-center border-b border-color pb-2 mb-4">
                           <h3 class="font-bold text-lg">外観・様子</h3>
                           <button type="button" id="edit-appearance-tags-btn" class="text-sub hover:text-main"><i class="fas fa-edit"></i></button>
                        </div>
                        <div id="vitals-appearance-tags" class="flex flex-wrap gap-2"></div>
                    </div>
                    <div class="bg-main p-4 rounded-lg">
                        <div class="flex justify-between items-center border-b border-color pb-2 mb-4">
                            <h3 class="font-bold text-lg">心電図所見</h3>
                            <button type="button" id="edit-ecg-tags-btn" class="text-sub hover:text-main"><i class="fas fa-edit"></i></button>
                        </div>
                        <div id="vitals-ecg-tags" class="flex flex-wrap gap-2"></div>
                        <div>
                            <label for="ecg-memo" class="text-sm mt-4 block">心電図自由記載</label>
                            <textarea name="ecg_memo" id="ecg-memo" rows="2" class="w-full bg-input p-2 rounded-md mt-1"></textarea>
                        </div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-4 bg-main p-4 rounded-lg">
                            <h3 class="font-bold text-lg border-b border-color pb-2">意識レベル</h3>
                            <div>
                                <label class="block text-sm font-medium mb-2">JCS (Japan Coma Scale)</label>
                                <div id="vitals-jcs-group" class="grid grid-cols-4 sm:grid-cols-5 gap-2"></div>
                            </div>
                            <div>
                                <label class="block text-sm font-medium mb-2">GCS (Glasgow Coma Scale) - <span id="gcs-total" class="font-bold">3</span>点</label>
                                <div class="space-y-2">
                                    <select id="gcs-e-select" name="gcs_e" class="gcs-select w-full bg-input p-2 rounded-md border border-color focus:ring-2 focus:ring-blue-500"></select>
                                    <select id="gcs-v-select" name="gcs_v" class="gcs-select w-full bg-input p-2 rounded-md border border-color focus:ring-2 focus:ring-blue-500"></select>
                                    <select id="gcs-m-select" name="gcs_m" class="gcs-select w-full bg-input p-2 rounded-md border border-color focus:ring-2 focus:ring-blue-500"></select>
                                </div>
                            </div>
                        </div>

                        <div class="space-y-4 bg-main p-4 rounded-lg">
                             <h3 class="font-bold text-lg border-b border-color pb-2">呼吸・循環</h3>
                             <div class="grid grid-cols-2 gap-4">
                                <div><label for="resp-rate" class="text-sm">呼吸数</label><input name="resp" type="number" id="resp-rate" class="w-full bg-input p-2 mt-1 rounded-md border border-transparent" placeholder="回/分"></div>
                                <div><label for="spo2" class="text-sm">SpO2</label><input name="spo2" type="number" id="spo2" class="w-full bg-input p-2 mt-1 rounded-md border border-transparent" placeholder="%"></div>
                                <div><label for="pulse-rate" class="text-sm">脈拍数</label><input name="pulse" type="number" id="pulse-rate" class="w-full bg-input p-2 mt-1 rounded-md border border-transparent" placeholder="回/分"></div>
                                <div><label for="body-temp" class="text-sm">体温</label><input name="temp" type="number" step="0.1" id="body-temp" class="w-full bg-input p-2 mt-1 rounded-md border border-transparent" placeholder="℃"></div>
                             </div>
                             <div>
                                <h4 class="block text-sm font-medium mt-4">血圧 (mmHg)</h4>
                                <div class="grid grid-cols-2 gap-x-4 mt-2">
                                    <div class="space-y-2 relative">
                                        <div id="pulse-pressure-r" class="absolute right-0 top-0 text-xs"></div>
                                        <label for="bp-sys-r" class="text-xs">収縮期 (右)</label>
                                        <input name="bp_sys_r" type="number" id="bp-sys-r" class="w-full bg-input p-2 rounded-md border border-transparent" placeholder="Sys">
                                        <label for="bp-dia-r" class="text-xs">拡張期 (右)</label>
                                        <input name="bp_dia_r" type="number" id="bp-dia-r" class="w-full bg-input p-2 rounded-md border border-transparent" placeholder="Dia">
                                    </div>
                                    <div class="space-y-2 relative">
                                        <div id="pulse-pressure-l" class="absolute right-0 top-0 text-xs"></div>
                                        <label for="bp-sys-l" class="text-xs">収縮期 (左)</label>
                                        <input name="bp_sys_l" type="number" id="bp-sys-l" class="w-full bg-input p-2 rounded-md border border-transparent" placeholder="Sys">
                                        <label for="bp-dia-l" class="text-xs">拡張期 (左)</label>
                                        <input name="bp_dia_l" type="number" id="bp-dia_l" class="w-full bg-input p-2 rounded-md border border-transparent" placeholder="Dia">
                                    </div>
                                </div>
                                <div id="bp-warnings" class="mt-2 text-xs"></div>
                             </div>
                             <div>
                                <h4 class="block text-sm font-medium mt-4">ショック指数 (SI)</h4>
                                <div id="shock-index-display" class="mt-2"></div>
                             </div>
                        </div>

                        <div class="space-y-4 bg-main p-4 rounded-lg md:col-span-2">
                            <h3 class="font-bold text-lg border-b border-color pb-2 mb-4">瞳孔</h3>
                            <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                                <div class="space-y-4">
                                    <h4 class="font-bold text-center text-lg">右 (R)</h4>
                                    <div>
                                        <label for="pupil-size-r" class="text-sm font-medium">瞳孔サイズ (mm)</label>
                                        <input type="number" id="pupil-size-r" name="pupil_size_r" min="1" max="10" step="0.5" placeholder="mm" class="w-full bg-input p-2 mt-1 rounded-md border border-color focus:ring-2 focus:ring-blue-500">
                                    </div>
                                    <div>
                                        <label for="pupil-reflex-r" class="text-sm font-medium">対光反射</label>
                                        <select id="pupil-reflex-r" name="pupil_reflex_r" class="gcs-select w-full bg-input p-2 mt-1 rounded-md border border-color focus:ring-2 focus:ring-blue-500"></select>
                                    </div>
                                </div>
                                <div class="space-y-4">
                                    <h4 class="font-bold text-center text-lg">左 (L)</h4>
                                    <div>
                                        <label for="pupil-size-l" class="text-sm font-medium">瞳孔サイズ (mm)</label>
                                        <input type="number" id="pupil-size-l" name="pupil_size_l" min="1" max="10" step="0.5" placeholder="mm" class="w-full bg-input p-2 mt-1 rounded-md border border-color focus:ring-2 focus:ring-blue-500">
                                    </div>
                                    <div>
                                        <label for="pupil-reflex-l" class="text-sm font-medium">対光反射</label>
                                        <select id="pupil-reflex-l" name="pupil_reflex_l" class="gcs-select w-full bg-input p-2 mt-1 rounded-md border border-color focus:ring-2 focus:ring-blue-500"></select>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </form>
            </main>
            <footer class="p-4 border-t border-color flex justify-end items-center gap-3">
                <button id="vitals-clear-btn" class="bg-red-800 hover:bg-red-700 text-white font-bold py-2 px-4 rounded-lg">クリア</button>
                <button id="vitals-save-btn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg">保存して閉じる</button>
            </footer>
        </div>
    </div>
    
    <div id="settings-modal" class="modal hidden fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center z-50 p-4">

                },
                bindEventListeners() {
                    const { elements: el, handlers: h } = this;
                    
                    el.searchExecBtn.addEventListener('click', () => h.handleSearch());
                    el.searchInput.addEventListener('keypress', e => { if (e.key === 'Enter') h.handleSearch(); });
                    el.searchClearBtn.addEventListener('click', () => h.handleSearchClear());
                    el.searchNextBtn.addEventListener('click', () => this.renderer.search.navigateToHighlight(1));
                    el.searchPrevBtn.addEventListener('click', () => this.renderer.search.navigateToHighlight(-1));
                    
                    el.contentArea.addEventListener('click', e => h.handleContentAreaClick(e));
                    el.navScrollArea.addEventListener('change', e => h.handleCheckboxChange(e));

                    el.addNewBtn.addEventListener('click', () => this.components.dataModal.openForNew());
                    el.collapseAllBtn.addEventListener('click', () => h.handleCollapseAll());
                    el.filterFavoritesBtn.addEventListener('click', (e) => h.handleFavoriteFilterClick(e));
                    el.clearSelectionsBtn.addEventListener('click', () => h.handleClearAllSelections());
                    el.settingsBtn.addEventListener('click', () => this.components.settings.open());

                    el.randomBtn.addEventListener('click', () => h.handleRandomSelect());
                    el.arrivalBtn.addEventListener('click', () => h.handleTimestampClick('arrival'));
                    el.contactBtn.addEventListener('click', () => h.handleTimestampClick('contact'));
                    el.departureBtn.addEventListener('click', () => h.handleTimestampClick('departure'));

                    el.toggleVitalsSummaryBtn.addEventListener('click', () => h.handleToggleVisibility(el.vitalsSummaryArea, el.toggleVitalsSummaryBtn, true));
                    
                    document.addEventListener('click', e => {
                        if (el.searchHistoryBtn && !el.searchHistoryBtn.parentElement.contains(e.target)) this.utils.hide(el.searchHistoryDropdown);
                    });
                    
                    Object.values(this.components).forEach(component => component.bindEventListeners?.());
                },
                handlers: {
                    handleSearch() {
                        App.state.filters.activeKeywords.clear();
                        const searchTerm = App.elements.searchInput.value.trim();
                        App.state.filters.searchTerm = searchTerm;
                        if (searchTerm) App.components.searchHistory.save(searchTerm);
                        App.renderer.renderAll();
                    },
                    handleSearchClear() {
                        App.elements.searchInput.value = '';
                        this.handleSearch();
                    },
                    handleTimestampClick(type) {
                        const now = new Date();
                        const timeString = now.toTimeString().split(' ')[0].substring(0, 5); // HH:mm
                        App.state.vitals[type] = timeString;
                        App.components.vitalsModal.saveState(); // Save to localStorage
                        App.renderer.renderVitalsSummary();
                        const btn = App.elements[`${type}Btn`];
                        if (btn) {
                            btn.classList.add('active');
                            setTimeout(() => btn.classList.remove('active'), 500);
                        }
                    },
                    handleRandomSelect() {
                        const allComplaintCards = App.elements.contentArea.querySelectorAll('.content-card');
                        if (allComplaintCards.length > 0) {
                            const randomIndex = Math.floor(Math.random() * allComplaintCards.length);
                            allComplaintCards[randomIndex].scrollIntoView({ behavior: 'smooth', block: 'start' });
                        }
                    },
                    handleCollapseAll() {
                        const { ui } = App.state;
                        ui.collapseState = (ui.collapseState + 1) % 3; // Cycle through 0, 1, 2
                        App.renderer.renderAll();
                    },
                    handleFavoriteFilterClick(e) {
                         const currentTime = new Date().getTime();
                         if(currentTime - App.state.lastTap < App.config.doubleTapDelay) {
                            this.handleClearAllSelections();
                            App.state.lastTap = 0; // Prevent further double taps
                         } else {
                            this.handleToggleFavoritesFilter();
                         }
                         App.state.lastTap = currentTime;
                    },
                    handleToggleFavoritesFilter() {
                        App.state.filters.isFavoritesOnly = !App.state.filters.isFavoritesOnly;
                        App.elements.filterFavoritesBtn.classList.toggle('active', App.state.filters.isFavoritesOnly);
                        App.renderer.renderAll();
                    },
                    handleToggleVisibility(area, button, isCollapsed = false) {
                        const isHidden = area.classList.toggle('hidden');
                        const chevron = button.querySelector('.toggle-chevron');
                        if (chevron) {
                            chevron.classList.toggle('collapsed', isHidden);
                        }
                    },
                    handleContentAreaClick(event) {
                        const { target } = event;
                        const actions = {
                            'edit-btn': el => App.components.dataModal.openForEdit(el.dataset.id),
                            'favorite-btn': el => App.services.db.toggleFavorite('complaint', el.dataset.id),
                            'learned-complaint-btn': el => App.services.db.toggleLearnedStatus('complaint', el.dataset.id),
                            'disease-title': el => {
                                const details = el.closest('.disease-title-container').nextElementSibling;
                                if (details) {
                                     details.classList.toggle('collapsed-fully');
                                     details.classList.remove('collapsed-partially');
                                }
                            },
                            'favorite-disease-btn': el => App.services.db.toggleFavorite('disease', el.dataset.complaintId, el.dataset.diseaseName),
                            'learned-disease-btn': el => App.services.db.toggleLearnedStatus('disease', el.dataset.complaintId, el.dataset.diseaseName),
                            'content-keyword-tag': el => this.handleKeywordTagClick(el.textContent.trim().replace(/\d+$/, '')),
                        };
                        for (const className in actions) {
                            const el = target.closest(`.${className}`);
                            if (el) {
                                actions[className](el);
                                return;
                            }
                        }
                    },
                    handleKeywordTagClick(keyword) {
                        const { activeKeywords } = App.state.filters;
                        if (activeKeywords.has(keyword)) activeKeywords.delete(keyword);
                        else activeKeywords.add(keyword);
                        App.state.filters.searchTerm = '';
                        App.elements.searchInput.value = '';
                        App.renderer.renderAll();
                    },
                    handleCheckboxChange(event) {
                        const checkbox = event.target;
                        if (!checkbox.classList.contains('item-checkbox') && !checkbox.classList.contains('nav-item-checkbox')) return;
                        
                        const { type, id, name } = checkbox.dataset;
                        const uniqueId = type === 'complaint' ? `c_${id}` : `d_${id}_${name.replace(/\s/g, '_')}`;
                        
                        if (checkbox.checked) {
                            App.state.ui.selectedItems.add(uniqueId);
                        } else {
                            App.state.ui.selectedItems.delete(uniqueId);
                        }
                        
                        const navCheckboxes = document.querySelectorAll(`.nav-item-checkbox[data-id='${id}']`);
                        navCheckboxes.forEach(cb => { if(cb !== checkbox) cb.checked = checkbox.checked });

                        App.renderer.renderAll();
                    },
                     handleKeywordLogicToggle() {
                        const { filters } = App.state;
                        filters.keywordMode = filters.keywordMode === 'OR' ? 'AND' : 'OR';
                        App.renderer.renderAll();
                    },
                    handleClearAllSelections() {
                        App.state.ui.selectedItems.clear();
                        document.querySelectorAll('.item-checkbox, .nav-item-checkbox').forEach(cb => cb.checked = false);
                        App.renderer.renderAll();
                    },
                    handlePatientInfoChange() {
                        const data = {
                            age: App.elements.ageInput.value,
                            gender: document.querySelector('.gender-btn.active')?.dataset.gender || null
                        };
                        App.utils.saveToStorage(App.config.storageKeys.ageAndGender, data);
                        App.components.vitalsModal.checkAllVitals();
                    },
                },
                pwa: {
                    init() {
                        if ('serviceWorker' in navigator) {
                            window.addEventListener('load', () => {
                                navigator.serviceWorker.register('./sw.js').then(registration => {
                                    console.log('ServiceWorker registration successful with scope: ', registration.scope);
                                }, err => {
                                    console.log('ServiceWorker registration failed: ', err);
                                });
                            });
                        }
                    }
                },
                services: {
                    auth: {
                        init() {
                            try {
                                const app = initializeApp(App.config.firebaseConfig);
                                App.state.db = getFirestore(app);
                                App.state.auth = getAuth(app);
                                this.listen();
                            } catch (error) {
                                console.error("Firebase Initialization Failed:", error);
                                App.elements.loading.innerHTML = `<p class="text-red-500 p-8">アプリケーションの初期化に失敗しました。</p>`;
                            }
                        },
                        listen() {
                            onAuthStateChanged(App.state.auth, async (user) => {
                                if (user) {
                                    App.state.userId = user.uid;
                                    App.elements.userIdDisplay.textContent = user.uid;
                                    App.services.db.listenForChanges();
                                } else {
                                    App.elements.userIdDisplay.textContent = "匿名ログイン中...";
                                    await this.signIn();
                                }
                            });
                        },
                        async signIn() {
                             try {
                                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                                    await signInWithCustomToken(App.state.auth, __initial_auth_token);
                                } else {
                                    await signInAnonymously(App.state.auth);
                                }
                            } catch (error) {
                                console.error("Authentication failed:", error);
                                if (App.elements.loading) App.elements.loading.innerHTML = '<p class="text-red-500">Authentication Failed.</p>';
                            }
                        }
                    },
                    db: {
                        getCollectionRef() {
                            const { db, userId } = App.state;
                            const { appId, collectionName } = App.config;
                            if (!userId) return null;
                            return collection(db, 'artifacts', appId, 'users', userId, collectionName);
                        },
                        listenForChanges() {
                            const collectionRef = this.getCollectionRef();
                            if (!collectionRef) return;
                            onSnapshot(collectionRef, (snapshot) => {
                                App.utils.hide(App.elements.loading);
                                App.state.isLoading = false;
                                
                                const docs = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                                App.state.dataStore = docs;
                
                                App.renderer.renderAll();
                            }, (error) => {
                                console.error("Error fetching data:", error);
                                if (App.elements.loading) App.elements.loading.innerHTML = '<p class="text-red-500">データの取得に失敗しました。</p>';
                            });
                        },
                        async toggleFavorite(type, id, diseaseName = null) {
                            await this.toggleBooleanField(type, id, diseaseName, 'isFavorite');
                        },
                        async toggleLearnedStatus(type, id, diseaseName = null) {
                            await this.toggleBooleanField(type, id, diseaseName, 'isLearned');
                        },
                        async toggleBooleanField(type, id, diseaseName, field) {
                            const entryIndex = App.state.dataStore.findIndex(e => e.id === id);
                            if (entryIndex === -1) return;

                            const entry = JSON.parse(JSON.stringify(App.state.dataStore[entryIndex]));
                            const collectionRef = this.getCollectionRef();
                            if (!collectionRef) return;
                            const docRef = doc(collectionRef, id);

                            let updatePayload = { updatedAt: new Date().toISOString() };

                            if (type === 'complaint') {
                                entry[field] = !entry[field];
                                updatePayload[field] = entry[field];
                            } else {
                                const diseaseIndex = entry.diseases.findIndex(d => d.name === diseaseName);
                                if (diseaseIndex !== -1) {
                                    entry.diseases[diseaseIndex][field] = !entry.diseases[diseaseIndex][field];
                                    updatePayload.diseases = entry.diseases;
                                }
                            }
                            
                            App.state.dataStore[entryIndex] = entry;
                            App.renderer.renderAll();
                
                            try {
                                await updateDoc(docRef, updatePayload);
                            } catch (error) {
                                console.error(`Error updating ${field} status:`, error);
                                // Revert optimistic update
                                App.state.dataStore[entryIndex] = App.state.dataStore.find(e => e.id === id);
                                App.renderer.renderAll();
                                App.utils.customAlert("状態の更新に失敗しました。");
                            }
                        }
                    }
                },
                renderer: {
                    renderAll() {
                        const dataToRender = this.filterAndSortData();
                        this.renderNav(); 
                        this.renderContent(dataToRender);
                        this.renderKeywordsPanel();
                        App.renderer.renderVitalsSummary();
                        this.search.collectAndNavigateHighlights();
                        this.setupIntersectionObserver();
                    },
                    filterAndSortData() {
                        const { dataStore, filters, ui } = App.state;
                        let processedData = JSON.parse(JSON.stringify(dataStore));
                    
                        const selectedComplaintIds = new Set();
                        ui.selectedItems.forEach(item => {
                            if (item.startsWith('c_')) {
                                selectedComplaintIds.add(item.split('_')[1]);
                            }
                        });
                    
                        if (selectedComplaintIds.size > 0) {
                            processedData = processedData.filter(entry => selectedComplaintIds.has(entry.id));
                        }
                    
                        if (filters.isFavoritesOnly) {
                             processedData = processedData.map(entry => {
                                const favoriteDiseases = (entry.diseases || []).filter(d => d.isFavorite);
                                if (entry.isFavorite) return entry;
                                if (favoriteDiseases.length > 0) return { ...entry, diseases: favoriteDiseases };
                                return null;
                            }).filter(Boolean);
                        }
                        
                        if (filters.activeKeywords.size > 0) {
                            const activeKeywords = Array.from(filters.activeKeywords);
                             processedData = processedData.map(entry => {
                                const matchingDiseases = (entry.diseases || []).filter(d => {
                                    const keywords = d.keywords || [];
                                    return filters.keywordMode === 'OR'
                                        ? activeKeywords.some(filter => keywords.includes(filter))
                                        : activeKeywords.every(filter => keywords.includes(filter));
                                });
                                if (matchingDiseases.length > 0) return { ...entry, diseases: matchingDiseases };
                                return null;
                            }).filter(Boolean);
                        } else if (filters.searchTerm) {
                            const keywords = filters.searchTerm.trim().toLowerCase().split(/\s+/).filter(Boolean);
                            if (keywords.length > 0) {
                                processedData = processedData.filter(entry => {
                                    const entryText = [
                                        entry.chiefComplaint,
                                        entry.description,
                                        entry.memo,
                                        ...(entry.diseases || []).flatMap(d => [
                                            d.name,
                                            d.description,
                                            d.memo,
                                            ...(d.keywords || []),
                                            ...(d.pitfalls || [])
                                        ])
                                    ].join(' ').toLowerCase();
                                    
                                    return keywords.every(k => entryText.includes(k));
                                });
                            }
                        }
                        
                        processedData.sort((a, b) => a.chiefComplaint.localeCompare(b.chiefComplaint, 'ja'));
                        
                        return processedData;
                    },
                    renderNav() {
                        const { navScrollArea } = App.elements;
                        const { dataStore, ui } = App.state;
                        const navData = [...dataStore].sort((a, b) => a.chiefComplaint.localeCompare(b.chiefComplaint, 'ja'));
                        navScrollArea.innerHTML = '';
                        const fragment = document.createDocumentFragment();
                        navData.forEach(entry => {
                            const complaintId = `complaint-${entry.id}`;
                            const navItem = document.createElement('a');
                            navItem.href = `#${complaintId}`;
                            navItem.className = 'nav-item flex items-center rounded-lg transition-colors';
                            const isChecked = ui.selectedItems.has(`c_${entry.id}`);
                            const starIcon = entry.isFavorite ? `<i class="fas fa-star text-yellow-400 mr-2"></i>` : '';
                            navItem.innerHTML = `<input type="checkbox" class="nav-item-checkbox" data-type="complaint" data-id="${entry.id}" ${isChecked ? 'checked' : ''}> ${starIcon}${entry.chiefComplaint}`;
                            navItem.title = entry.chiefComplaint;
                            navItem.querySelector('.nav-item-checkbox').addEventListener('click', e => { e.stopPropagation(); App.handlers.handleCheckboxChange(e); });
                            navItem.addEventListener('click', (e) => { 
                                e.preventDefault(); 
                                const targetEl = document.getElementById(complaintId);
                                if (targetEl) targetEl.scrollIntoView({ behavior: 'smooth' }); 
                                App.components.sidebar.toggle(false);
                            });
                            fragment.appendChild(navItem);
                        });
                        navScrollArea.appendChild(fragment);
                    },
                    renderContent(data) {
                        const { contentArea, collapseAllBtn } = App.elements;
                        const { searchTerm, activeKeywords } = App.state.filters;
                        const { collapseState, selectedItems } = App.state.ui;
                        
                        const icon = collapseAllBtn.querySelector('i');
                        if (icon) {
                            if (collapseState === 2) icon.className = 'fas fa-expand';
                            else if (collapseState === 1) icon.className = 'fas fa-compress-arrows-alt';
                            else icon.className = 'fas fa-compress';
                        }
                        
                        contentArea.innerHTML = '';
                        if (data.length === 0 && !App.state.isLoading) {
                            contentArea.innerHTML = `<div class="text-center p-8 text-sub"><i class="fas fa-folder-open fa-3x mb-4"></i><p>データがありません。<br>「+」ボタンから新しい主訴を追加してください。</p></div>`;
                            return;
                        }
                        
                        const fragment = document.createDocumentFragment();
                        data.forEach(entry => {
                            const originalData = App.state.dataStore.find(d => d.id === entry.id);
                             if (!originalData) return;
                            const complaintId = `complaint-${entry.id}`;
                            const isComplaintChecked = selectedItems.has(`c_${entry.id}`); 
                            const entryDiv = document.createElement('div');
                            entryDiv.className = 'content-card bg-card mb-6 rounded-xl shadow-md p-4';
                            entryDiv.id = complaintId;
                            
                            const memoHTML = originalData.memo ? `<div class="mt-4 pl-6 text-sm text-amber-300 bg-main p-3 rounded-lg"><i class="fas fa-pencil-alt fa-fw mr-2 text-amber-400"></i>${App.utils.highlightText(originalData.memo, searchTerm).replace(/\n/g, '<br>')}</div>` : '';
                            const favoriteClass = originalData.isFavorite ? 'fas fa-star text-yellow-400' : 'far text-sub';
                            const learnedClass = originalData.isLearned ? 'fas fa-bookmark learned-mark' : 'far fa-bookmark text-sub';
            
                            const diseasesHTML = (entry.diseases || []).map(disease => { 
                                const diseaseFavoriteClass = disease.isFavorite ? 'fas fa-star text-yellow-400' : 'far text-sub';
                                const diseaseLearnedClass = disease.isLearned ? 'fas fa-bookmark learned-mark' : 'far fa-bookmark text-sub';

                                let detailsClass = '';
                                if(collapseState === 1) detailsClass = 'collapsed-partially';
                                if(collapseState === 2) detailsClass = 'collapsed-fully';
                                
                                const diseaseMemoHTML = disease.memo ? `<div class="mt-3 text-sm text-amber-300 bg-main p-2 rounded-lg"><i class="fas fa-pencil-alt fa-fw mr-2 text-amber-400"></i>${App.utils.highlightText(disease.memo, searchTerm).replace(/\n/g, '<br>')}</div>` : '';
                                return `
                                    <div class="pl-4 border-l-4 border-color">
                                        <div class="disease-title-container flex items-center justify-between">
                                            <h3 class="disease-title text-lg font-semibold text-teal-400 flex-grow">${App.utils.highlightText(disease.name, searchTerm)}</h3>
                                            <div class="flex items-center ml-2">
                                                <button class="learned-disease-btn text-lg mr-2" data-complaint-id="${entry.id}" data-disease-name="${disease.name}" title="覚えたマーク"><i class="${diseaseLearnedClass}"></i></button>
                                                <button class="favorite-disease-btn text-lg" data-complaint-id="${entry.id}" data-disease-name="${disease.name}" title="お気に入り登録"><i class="${diseaseFavoriteClass} fa-star"></i></button>
                                            </div>
                                        </div>
                                        <div class="disease-details mt-2 pl-8 ${detailsClass}">
                                            <p class="text-sm text-sub mt-1">${App.utils.highlightText(disease.description || '', searchTerm)}</p>
                                            ${diseaseMemoHTML}
                                            <div class="keywords-container">
                                                <h4 class="font-bold text-sm mt-3"><i class="fas fa-lightbulb text-yellow-400 mr-2"></i>キーワード</h4><div class="flex flex-wrap gap-2 mt-1">${(disease.keywords || []).map(k => `<span class="content-keyword-tag text-sm rounded-full px-3 py-1 hover:opacity-80 ${activeKeywords.has(k) ? 'active' : ''}">${App.utils.highlightText(k, searchTerm)}</span>`).join('')}</div>
                                            </div>
                                            <h4 class="font-bold text-sm mt-3"><i class="fas fa-exclamation-triangle text-red-400 mr-2"></i>落とし穴</h4><ul class="list-disc list-inside mt-1 text-sm space-y-1">${(disease.pitfalls || []).map(p => `<li>${App.utils.highlightText(p, searchTerm)}</li>`).join('')}</ul>
                                        </div>
                                    </div>`;
                            }).join('<div class="my-4"></div>');

                            entryDiv.innerHTML = `
                                <div class="flex justify-between items-center">
                                    <div class="flex items-center">
                                        <input type="checkbox" class="item-checkbox" data-type="complaint" data-id="${entry.id}" ${isComplaintChecked ? 'checked' : ''}>
                                        <h2 class="text-xl md:text-2xl font-bold text-blue-400">${App.utils.highlightText(originalData.chiefComplaint, searchTerm)}</h2>
                                    </div>
                                    <div class="flex items-center">
                                         <button class="learned-complaint-btn text-xl mr-4" data-id="${entry.id}" title="覚えたマーク"><i class="${learnedClass}"></i></button>
                                        <button class="favorite-btn text-xl mr-4" data-id="${entry.id}" title="お気に入り登録"><i class="${favoriteClass} fa-star"></i></button>
                                        <button class="edit-btn text-sub hover:text-main" data-id="${entry.id}"><i class="fas fa-edit"></i></button>
                                    </div>
                                </div>
                                <p class="text-sm text-sub mt-1 ml-10">${App.utils.highlightText(originalData.description || '', searchTerm)}</p>
                                ${memoHTML}
                                <div class="mt-4 space-y-4">${diseasesHTML}</div>`;
                            fragment.appendChild(entryDiv);
                        });
                        contentArea.appendChild(fragment);
                    },
                    renderKeywordsPanel() {
                        const { keywordsPanelContentArea } = App.elements;
                        const { ui, dataStore, filters } = App.state;
                        if (!keywordsPanelContentArea) return;
                        
                        keywordsPanelContentArea.innerHTML = '';
                        
                        const selectedComplaintIds = new Set();
                        ui.selectedItems.forEach(item => { if (item.startsWith('c_')) selectedComplaintIds.add(item.split('_')[1]); });
                        
                        const sourceData = selectedComplaintIds.size > 0 
                            ? dataStore.filter(entry => selectedComplaintIds.has(entry.id))
                            : dataStore;

                        const allKeywords = new Set();
                        sourceData.forEach(entry => (entry.diseases || []).forEach(d => (d.keywords || []).forEach(k => allKeywords.add(k))));
                        
                        const keywordCounts = {};
                        if (selectedComplaintIds.size > 0) {
                            allKeywords.forEach(k => {
                                let count = 0;
                                sourceData.forEach(entry => {
                                    if ((entry.diseases || []).some(d => (d.keywords || []).includes(k))) {
                                        count++;
                                    }
                                });
                                keywordCounts[k] = count;
                            });
                        }

                        if (allKeywords.size > 0) {
                            const fragment = document.createDocumentFragment();
                            const keywordTags = document.createElement('div');
                            keywordTags.className = 'flex flex-wrap gap-2';
                            
                            [...allKeywords].sort((a, b) => a.localeCompare(b, 'ja')).forEach(keyword => {
                                const count = keywordCounts[keyword] || 0;
                                let colorClass = '';
                                if(count > 0 && selectedComplaintIds.size > 0){ // Only color if complaints are selected
                                     if (count >= 5) colorClass = 'keyword-count-5';
                                     else if (count >= 4) colorClass = 'keyword-count-4';
                                     else if (count >= 3) colorClass = 'keyword-count-3';
                                     else if (count >= 2) colorClass = 'keyword-count-2';
                                     else if (count >= 1) colorClass = 'keyword-count-1';
                                }

                                const tag = document.createElement('span');
                                tag.className = `keyword-tag bg-btn hover:opacity-80 text-sm py-1 px-3 rounded-full transition-colors ${filters.activeKeywords.has(keyword) ? 'active' : ''} ${colorClass}`;
                                tag.textContent = keyword;
                                if(count > 0 && selectedComplaintIds.size > 1){

                        App.state.intersectionObserver = new IntersectionObserver((entries) => {
                             const intersectingEntry = entries.find(e => e.isIntersecting);
                             if (intersectingEntry) {
                                 const navLink = App.elements.navScrollArea.querySelector(`a[href="#${intersectingEntry.target.id}"]`);
                                 if (navLink) {
                                     document.querySelectorAll('.nav-item').forEach(link => link.classList.remove('active-nav'));

                    search: {
                        collectAndNavigateHighlights() {
                            const { ui, filters } = App.state;
                            
                            this.unhighlight();
        
                            if (!filters.searchTerm) {
                                ui.highlightedElements = [];
                                ui.currentHighlightIndex = -1;
                                this.updateNav();
                                return;
                            }
        
                            ui.highlightedElements = Array.from(App.elements.contentArea.querySelectorAll('.highlight'));
                            
                            if (ui.highlightedElements.length > 0) {
                                ui.currentHighlightIndex = -1; 
                                this.navigateToHighlight(1);
                            } else {
                                ui.currentHighlightIndex = -1;
                                this.updateNav();
                            }
                        },
        
                        navigateToHighlight(direction) {
                            const { ui } = App.state;
                            const { highlightedElements } = ui;
                            if (highlightedElements.length === 0) return;
        
                            if (ui.currentHighlightIndex >= 0 && highlightedElements[ui.currentHighlightIndex]) {
                                highlightedElements[ui.currentHighlightIndex].classList.remove('current-highlight');
                            }
        
                            ui.currentHighlightIndex += direction;
        
                            if (ui.currentHighlightIndex >= highlightedElements.length) {
                                ui.currentHighlightIndex = 0;
                            }
                            if (ui.currentHighlightIndex < 0) {
                                ui.currentHighlightIndex = highlightedElements.length - 1;
                            }
        
                            const newElement = highlightedElements[ui.currentHighlightIndex];
                            if (newElement) {
                                newElement.classList.add('current-highlight');
                                newElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
                            }
        
                            this.updateNav();
                        },
                        
                        unhighlight() {
                            const current = App.elements.contentArea.querySelector('.current-highlight');
                            if (current) {
                                current.classList.remove('current-highlight');
                            }
                        },
        
                        updateNav() {
                            const { ui } = App.state;
                            const { searchCount, searchPrevBtn, searchNextBtn } = App.elements;
                            const count = ui.highlightedElements.length;
                            const currentIndex = count > 0 ? ui.currentHighlightIndex + 1 : 0;
                            
                            searchCount.textContent = `${currentIndex}/${count}`;
                            searchPrevBtn.disabled = count === 0;
                            searchNextBtn.disabled = count === 0;
                        }

                        bindEventListeners() {
                           App.elements.sidebarToggleBtn.addEventListener('click', () => this.toggle());
                           App.elements.sidebarBackdrop.addEventListener('click', () => this.toggle(false));
                        },
                        handleTouchStart(e) {
                            const s = App.state.sidebar;
                            const isOpen = !App.elements.jumpNav.classList.contains('-translate-x-full');
                            if (!isOpen && e.touches[0].clientX < 40) {
                                s.isDragging = true;
                                s.touchStartX = e.touches[0].clientX;
                            }
                            if(isOpen && e.target === App.elements.sidebarBackdrop) {
                                s.isDragging = true;
                                s.touchStartX = e.touches[0].clientX;
                            }
                        },
                        handleTouchMove(e) {
                            const s = App.state.sidebar;
                            if (!s.isDragging) return;
                            e.preventDefault();
                            
                            s.touchCurrentX = e.touches[0].clientX;
                            const diff = s.touchCurrentX - s.touchStartX;
                            const navWidth = App.elements.jumpNav.offsetWidth;
                            const isOpen = !App.elements.jumpNav.classList.contains('-translate-x-full');

                            if (!isOpen && diff > 0) {
                                App.elements.jumpNav.style.transition = 'none';
                                App.elements.jumpNav.style.transform = `translateX(${Math.min(diff - navWidth, 0)}px)`;
                            } else if (isOpen && diff < 0) {
                                App.elements.jumpNav.style.transition = 'none';
                                App.elements.jumpNav.style.transform = `translateX(${Math.max(diff, -navWidth)}px)`;
                            }
                        },
                        handleTouchEnd() {
                            const s = App.state.sidebar;
                            if (!s.isDragging) return;
                            s.isDragging = false;
                            
                            const diff = s.touchCurrentX - s.touchStartX;
                            const isOpen = !App.elements.jumpNav.classList.contains('-translate-x-full');
                            
                            App.elements.jumpNav.style.transition = '';
                            App.elements.jumpNav.style.transform = '';

                            if (Math.abs(diff) > App.config.swipeThreshold) this.toggle(!isOpen);
                             else this.toggle(isOpen);
                        },
                        toggle(forceShow) {
                            const { jumpNav, sidebarBackdrop } = App.elements;
                            const shouldShow = typeof forceShow === 'boolean' ? forceShow : jumpNav.classList.contains('-translate-x-full');

                    stopwatch: {
                        bindEventListeners() {
                           const el = App.elements.stopwatch;
                           el.addEventListener('mousedown', e => this.handlePress(e));
                           el.addEventListener('mouseup', e => this.handleRelease(e));
                           el.addEventListener('mouseleave', e => this.handleRelease(e, true));
                           el.addEventListener('touchstart', e => this.handlePress(e));
                           el.addEventListener('touchend', e => this.handleRelease(e));
                        },
                        handlePress(e) {
                            e.preventDefault();
                            App.state.stopwatch.pressTimer = setTimeout(() => {
                                this.reset(true);
                                App.state.stopwatch.pressTimer = null; 
                            }, App.config.stopwatchResetDelay);
                        },
                        handleRelease(e, isMouseLeave = false) {
                            if (App.state.stopwatch.pressTimer) {
                                clearTimeout(App.state.stopwatch.pressTimer);
                                App.state.stopwatch.pressTimer = null;
                                if (!isMouseLeave) this.toggle();
                            }
                        },
                        toggle() {
                            const s = App.state.stopwatch;
                            s.isRunning = !s.isRunning;
                            if (s.isRunning) {
                                s.interval = setInterval(() => this.update(), 1000);
                                App.elements.stopwatch.classList.add('running');
                            } else {
                                clearInterval(s.interval);
                                App.elements.stopwatch.classList.remove('running');
                            }
                        },
                        update() {
                            App.state.stopwatch.elapsedSeconds++;
                            const time = App.state.stopwatch.elapsedSeconds;
                            const mins = Math.floor(time / 60).toString().padStart(2, '0');
                            const secs = (time % 60).toString().padStart(2, '0');
                            App.elements.stopwatch.textContent = `${mins}:${secs}`;
                        },
                        reset(showAlert = false) {
                            const s = App.state.stopwatch;
                            clearInterval(s.interval);
                            s.isRunning = false;
                            s.elapsedSeconds = 0;
                            App.elements.stopwatch.textContent = "00:00";
                            App.elements.stopwatch.classList.remove('running');
                            if(showAlert) App.utils.customAlert("ストップウォッチをリセットしました。");

                        exportCSV() {
                            const data = App.state.dataStore;
                            if (data.length === 0) {
                                App.utils.customAlert('エクスポートするデータがありません。');
                                return;
                            }

                            const flattenedData = [];
                            data.forEach(entry => {
                                if (entry.diseases && entry.diseases.length > 0) {
                                    entry.diseases.forEach(disease => {
                                        flattenedData.push({
                                            chiefComplaint: entry.chiefComplaint || '',
                                            description: entry.description || '',
                                            memo: entry.memo || '',
                                            diseaseName: disease.name || '',
                                            diseaseDescription: disease.description || '',
                                            diseaseKeywords: (disease.keywords || []).join(';'),
                                            diseasePitfalls: (disease.pitfalls || []).join(';'),
                                            diseaseMemo: disease.memo || ''
                                        });
                                    });
                                } else {
                                     flattenedData.push({
                                        chiefComplaint: entry.chiefComplaint || '',
                                        description: entry.description || '',
                                        memo: entry.memo || '',
                                        diseaseName: '', diseaseDescription: '', diseaseKeywords: '', diseasePitfalls: '', diseaseMemo: ''
                                     });
                                }
                            });
                            
                            const header = Object.keys(flattenedData[0]).join(',');
                            const csv = flattenedData.map(row => 
                                Object.values(row).map(value => `"${String(value).replace(/"/g, '""')}"`).join(',')
                            ).join('\n');
                            
                            const csvContent = `${header}\n${csv}`;
                            const blob = new Blob([`\uFEFF${csvContent}`], { type: 'text/csv;charset=utf-8;' });
                            const url = URL.createObjectURL(blob);
                            const a = document.createElement('a');
                            a.href = url;
                            a.download = `paramedic_data_${new Date().toISOString().slice(0,10)}.csv`;
                            a.click();
                            URL.revokeObjectURL(url);
                        },
                        handleCSVFileSelect(event) {
                            const file = event.target.files[0];
                            if (!file) return;
                            const reader = new FileReader();
                            reader.onload = async (e) => {
                                try {
                                    const csvString = e.target.result;
                                    const confirmed = await App.utils.customConfirm('現在のデータをすべて上書きして、CSVからインポートしますか？この操作は元に戻せません。', 'インポートの確認');
                                    if (confirmed) {
                                        this.importCSV(csvString);
                                    }
                                } catch (error) {
                                    App.utils.customAlert('ファイルの読み込みに失敗しました。');
                                    console.error("Import error:", error);
                                }
                            };
                             reader.onerror = () => {
                                App.utils.customAlert('ファイルの読み込み中にエラーが発生しました。');
                            };
                            reader.readAsText(file, 'Shift_JIS');
                        },
                        async importCSV(csvString) {
                            try {
                                const lines = csvString.trim().split('\n');
                                const header = lines[0].split(',').map(h => h.trim().replace(/"/g, ''));
                                const rows = lines.slice(1).map(line => {
                                    const data = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/); 
                                    const rowData = {};
                                    header.forEach((key, i) => {
                                        rowData[key] = (data[i] || '').trim().replace(/(^"|"$)/g, '').replace(/""/g, '"');
                                    });
                                    return rowData;
                                });

                                const groupedByComplaint = rows.reduce((acc, row) => {
                                    const complaint = row.chiefComplaint;
                                    if (!acc[complaint]) {
                                        acc[complaint] = {
                                            chiefComplaint: complaint,
                                            description: row.description || '',
                                            memo: row.memo || '',
                                            createdAt: new Date().toISOString(),
                                            updatedAt: new Date().toISOString(),
                                            isFavorite: false,
                                            diseases: []
                                        };
                                    }
                                    if (row.diseaseName) {
                                        acc[complaint].diseases.push({
                                            name: row.diseaseName,
                                            description: row.diseaseDescription || '',
                                            keywords: (row.diseaseKeywords || '').split(';').map(k => k.trim()).filter(Boolean),
                                            pitfalls: (row.diseasePitfalls || '').split(';').map(p => p.trim()).filter(Boolean),
                                            memo: row.diseaseMemo || '',
                                            isFavorite: false
                                        });
                                    }
                                    return acc;
                                }, {});

                                const finalData = Object.values(groupedByComplaint);

                                const collectionRef = App.services.db.getCollectionRef();
                                if (!collectionRef) return;

                                const snapshot = await getDocs(collectionRef);
                                const deleteBatch = writeBatch(App.state.db);
                                snapshot.docs.forEach(d => deleteBatch.delete(d.ref));
                                await deleteBatch.commit();

                                const addBatch = writeBatch(App.state.db);
                                finalData.forEach(item => {
                                    const docRef = doc(collectionRef);
                                    addBatch.set(docRef, item);
                                });
                                await addBatch.commit();
                                
                                App.utils.customAlert('データのインポートが完了しました。');
                                this.close();

                            } catch (error) {
                                App.utils.customAlert('CSVデータの解析またはインポート中にエラーが発生しました。ファイルの形式を確認してください。');
                                console.error("CSV Import failed:", error);
                            }
                        }

                            el.eraBtns.querySelectorAll('.era-btn').forEach(btn => {
                                btn.addEventListener('click', (e) => {
                                    el.eraBtns.querySelectorAll('.era-btn').forEach(b => b.classList.remove('active'));
                                    e.currentTarget.classList.add('active');
                                });
                            });
                        },
                        calculateAge() {
                            const eraBtn = App.elements.eraBtns.querySelector('.active');
                            if (!eraBtn) {
                                App.utils.customAlert('元号を選択してください。');
                                return;
                            }
                            const era = eraBtn.dataset.era;
                            const year = parseInt(App.elements.eraYearInput.value);
                            const month = parseInt(App.elements.eraMonthInput.value);
                            const day = parseInt(App.elements.eraDayInput.value);
                            if (isNaN(year) || isNaN(month) || isNaN(day)) {
                                App.utils.customAlert('年月日を正しく入力してください。');
                                return;
                            }
                            let birthYear;
                            switch (era) {
                                case 'M': birthYear = 1867 + year; break;
                                case 'T': birthYear = 1911 + year; break;
                                case 'S': birthYear = 1925 + year; break;
                                case 'H': birthYear = 1988 + year; break;
                                case 'R': birthYear = 2018 + year; break;
                                default: return;
                            }
                            const today = new Date();
                            const birthDate = new Date(birthYear, month - 1, day);
                            let age = today.getFullYear() - birthDate.getFullYear();
                            const m = today.getMonth() - birthDate.getMonth();
                            if (m < 0 || (m === 0 && today.getDate() < birthDate.getDate())) age--;
                            App.elements.ageInput.value = age;
                            App.handlers.handlePatientInfoChange();
                            App.utils.hideModal(App.elements.dobEraModal);
                        }

                        try { return JSON.parse(item); } catch (e) { return item; }
                    },
                    saveToStorage(key, value) {
                        localStorage.setItem(key, typeof value === 'object' ? JSON.stringify(value) : value);
                    },
                    escapeRegExp(string) {
                        if (typeof string !== 'string') return '';
                        return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); 
                    },
                    highlightText(text, term) {
                        if (!term || !text) return String(text); 
                        const keywords = term.trim().split(/\s+/).filter(Boolean);
                        if (keywords.length === 0) return String(text);
                
                        const regex = new RegExp(keywords.map(k => App.utils.escapeRegExp(k)).join('|'), 'gi');
                        
                        return String(text).replace(regex, `<mark class="highlight">$&</mark>`);
                    },
                    getAgeCategory(age) {
                        if (age === null || age === undefined) return null;
                        const thresholds = App.state.vitalThresholds;
                        if (!thresholds || thresholds.length === 0) return null;
                        
                        // Sort by age to handle overlaps correctly
                        const sortedThresholds = [...thresholds].sort((a,b) => a.age[0] - b.age[0]);

                        for (const category of sortedThresholds) {
                            if (age >= category.age[0] && age <= category.age[1]) {
                                return category;
                            }
                        }
                        return null;
                    },
                    checkVitalSign(type, value, age, vitals) {
                        if (value === null || value === undefined || value === '') return 0;
                        let val = parseFloat(value);
                        if(isNaN(val)) return 0;

                        const category = this.getAgeCategory(age);
                        
                        // Special checks that don't depend on age category
                        if (type === 'pupils') {
                            if (vitals.pupil_reflex_l === '0' || vitals.pupil_reflex_r === '0') return 2; // Danger for no reflex
                            if (vitals.pupil_size_l !== vitals.pupil_size_r) return 1; // Warning for anisocoria
                            return 0;
                        }

                        if (type === 'gcs') return (val < 15) ? ((val < 9) ? 2 : 1) : 0;
                        if (type === 'jcs') return (value !== '清明') ? ((parseInt(value) >= 100) ? 2 : 1) : 0;
                        
                        if (!category || !category[type]) return 0;
                        const t = category[type];

                        // Danger checks first
                        if ((t.lowDanger !== undefined && val < t.lowDanger) || (t.highDanger !== undefined && val > t.highDanger)) return 2;
                        // Then warning checks
                        if ((t.lowWarning !== undefined && val < t.lowWarning) || (t.highWarning !== undefined && val > t.highWarning)) return 1;
                        
                        return 0; // Normal
                    },
                }
            };

            App.init();
        });
    </script>
